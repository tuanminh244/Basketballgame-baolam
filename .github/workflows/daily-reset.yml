name: Daily Reset Engine
on:
  schedule:
    # 17:00 UTC tương đương 00:00 giờ Asia/Ho_Chi_Minh
    - cron: '0 17 * * *'
  workflow_dispatch:

# Khai báo operational intent an toàn chống Overlap
concurrency:
  group: daily-reset
  cancel-in-progress: false

jobs:
  run-daily-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install Dependencies
        run: npm ci

      - name: Execute Daily Reset Script
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
        run: node scripts/daily_reset.js
