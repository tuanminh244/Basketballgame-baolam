name: Approval Cleanup Engine
on:
  schedule:
    # 18:00 UTC tương đương 01:00 sáng Asia/Ho_Chi_Minh
    - cron: '0 18 * * *'
  workflow_dispatch:

# Khai báo operational intent an toàn chống Overlap
concurrency:
  group: approval-cleanup
  cancel-in-progress: false

jobs:
  run-cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Maintenance Cleanup Script
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
        run: node scripts/cleanup.js
