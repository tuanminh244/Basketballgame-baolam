name: Economy Engine
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# Khai báo operational intent an toàn chống Overlap
concurrency:
  group: economy-engine
  cancel-in-progress: false

jobs:
  run-approval-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # Safety net cấp job (ngăn burn minutes vô hạn)

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Task Approval Engine
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.NEXT_PUBLIC_FIREBASE_DATABASE_URL }}
        run: node scripts/task_approval.js
