name: Task Approval Economy Engine

on:
  schedule:
    - cron: "*/5 * * * *"

  workflow_dispatch:

concurrency:
  group: economy-engine-cron
  cancel-in-progress: false

jobs:
  run-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./scripts
        run: npm install

      - name: Run Task Approval Engine
        working-directory: ./scripts
        run: node task_approval.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}