<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Power Up - Bảo Lâm Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF8C00;
            --secondary: #FFD700;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 500px; width: 100%; }
        .hidden { display: none !important; }
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 15px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-player { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
        .btn-admin { background: #475569; color: white; }
        .btn-confirm { background: #10b981; color: white; margin-top: 15px; }
        
        .stats-header { text-align: center; margin-bottom: 10px; }
        .level-badge {
            background: var(--primary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
        }
        .exp-bar { width: 100%; height: 12px; background: #334155; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .exp-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0%; }
        
        .skill-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .skill-card { background: #0f172a; padding: 10px; border-radius: 15px; text-align: center; border: 1px solid #1e293b; }
        .skill-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        
        .mission-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            margin: 8px 0;
            border-radius: 10px;
        }
        .mission-item input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--primary); }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
        }
        .sync-status { font-size: 0.7rem; color: #94a3b8; text-align: center; margin-top: 10px; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="container">
        <!-- Màn hình đăng nhập -->
        <div id="login-screen" class="card">
            <h1 style="text-align: center; color: var(--primary);">🏀 POWER UP</h1>
            <p style="text-align: center; color: #94a3b8;">Hệ thống rèn luyện Bảo Lâm</p>
            <button class="btn btn-player" onclick="login('player')">BẢO LÂM (XEM ĐIỂM)</button>
            <button class="btn btn-admin" onclick="promptAdmin()">BỐ (CẬP NHẬT)</button>
        </div>

        <!-- Màn hình chính -->
        <div id="main-game" class="hidden">
            <div class="card stats-header">
                <div class="level-badge" id="lvl-display">LV. 1</div>
                <h2 id="rank-name" style="margin: 10px 0; color: var(--secondary);">ROOKIE</h2>
                <div class="exp-bar"><div id="exp-fill" class="exp-fill"></div></div>
                <div style="display:flex; justify-content: space-around; font-weight: bold;">
                    <span>🪙 <span id="coin-count">0</span></span>
                    <span>🔥 Ngày <span id="day-count">1</span>/10</span>
                </div>
            </div>

            <div class="skill-grid">
                <div class="skill-card">🚀 Speed<br><span class="skill-val" id="val-speed">0s</span></div>
                <div class="skill-card">⬆️ Jump<br><span class="skill-val" id="val-jump">0cm</span></div>
                <div class="skill-card">🔋 Stamina<br><span class="skill-val" id="val-stamina">0m</span></div>
            </div>

            <div class="card">
                <h3 style="margin-top: 0;">🎯 Nhiệm vụ hôm nay</h3>
                <div id="mission-list"></div>
            </div>

            <!-- Panel của Bố -->
            <div id="admin-panel" class="card hidden" style="background: #1e1b4b; border-color: var(--primary);">
                <h3 style="color: var(--primary); margin-top: 0;">🛠 BẢNG ĐIỀU KHIỂN CỦA BỐ</h3>
                <label>Tốc độ chạy (s):</label>
                <input type="number" id="in-speed" step="0.1" placeholder="Ví dụ: 6.5">
                <label>Bật nhảy (cm):</label>
                <input type="number" id="in-jump" placeholder="Ví dụ: 35">
                <label>Chạy bền (m):</label>
                <input type="number" id="in-stamina" placeholder="Ví dụ: 1000">
                <button class="btn btn-confirm" onclick="confirmDay()">XÁC NHẬN HOÀN THÀNH NGÀY</button>
            </div>

            <div class="sync-status">● Đang kết nối Realtime Cloud...</div>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Cấu hình Firebase của Bố
        const firebaseConfig = {
            apiKey: "AIzaSyDjFDmzfSSz-8yKMOs3mGHkytWF8FY343c",
            authDomain: "baolam-basketball.firebaseapp.com",
            projectId: "baolam-basketball",
            storageBucket: "baolam-basketball.firebasestorage.app",
            messagingSenderId: "604111487763",
            appId: "1:604111487763:web:cf9adcd1d09b3d883050e6",
            measurementId: "G-BXD76FX8EE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'bao_lam_game_data');

        window.state = { level: 1, exp: 0, coins: 0, currentDay: 1, days: {}, user: 'player' };

        // Lưu dữ liệu lên mây
        window.saveToCloud = (data) => {
            set(dbRef, data);
        };

        // Lắng nghe dữ liệu thay đổi từ máy khác
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const oldLevel = window.state.level;
                window.state = data;
                if (window.state.level > oldLevel) {
                    celebrate(); // Hiệu ứng pháo hoa khi lên cấp
                }
                updateUI();
                document.querySelector('.sync-status').innerHTML = "● Đã đồng bộ với Cloud (" + new Date().toLocaleTimeString() + ")";
            } else {
                initFirstTime();
            }
        });
    </script>

    <script>
        const ADMIN_PASS = "123456";

        function promptAdmin() {
            if(prompt("Mật khẩu của Bố:") === ADMIN_PASS) login('admin');
            else alert("Sai mật khẩu rồi Bố ơi!");
        }

        function login(role) {
            window.state.user = role;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-game').classList.remove('hidden');
            if(role === 'admin') document.getElementById('admin-panel').classList.remove('hidden');
            updateUI();
        }

        function initFirstTime() {
            let daysData = {};
            for(let i=1; i<=10; i++) {
                daysData[i] = { completed: false, tasks: [false, false, false], metrics: {s:0, j:0, m:0} };
            }
            window.state = { level: 1, exp: 0, coins: 0, currentDay: 1, days: daysData };
            window.saveToCloud(window.state);
        }

        function updateUI() {
            const s = window.state;
            document.getElementById('lvl-display').innerText = "LV. " + s.level;
            document.getElementById('coin-count').innerText = s.coins;
            document.getElementById('day-count').innerText = s.currentDay;
            document.getElementById('exp-fill').style.width = (s.exp % 100) + "%";
            
            // Xếp hạng dựa trên Level
            const ranks = ["ROOKIE", "STARTER", "ALL-STAR", "MVP", "HALL OF FAME"];
            document.getElementById('rank-name').innerText = ranks[Math.min(Math.floor(s.level/2), 4)];

            const day = s.days[s.currentDay];
            document.getElementById('val-speed').innerText = day.metrics.s + "s";
            document.getElementById('val-jump').innerText = day.metrics.j + "cm";
            document.getElementById('val-stamina').innerText = day.metrics.m + "m";

            const list = document.getElementById('mission-list');
            list.innerHTML = "";
            const taskNames = ["🏀 Bóng rổ & Thể lực", "🎹 Luyện tập Piano", "📚 Hoàn thành bài tập"];
            taskNames.forEach((t, i) => {
                list.innerHTML += `
                    <div class="mission-item">
                        <input type="checkbox" ${day.tasks[i]?'checked':''} onchange="toggleTask(${i})" ${window.state.user!=='admin'?'disabled':''}>
                        <span>${t}</span>
                    </div>`;
            });
        }

        function toggleTask(idx) {
            window.state.days[window.state.currentDay].tasks[idx] = !window.state.days[window.state.currentDay].tasks[idx];
            window.saveToCloud(window.state);
        }

        function confirmDay() {
            const s = window.state;
            const d = s.days[s.currentDay];
            
            d.metrics.s = document.getElementById('in-speed').value || 0;
            d.metrics.j = document.getElementById('in-jump').value || 0;
            d.metrics.m = document.getElementById('in-stamina').value || 0;
            d.completed = true;
            
            // Logic tính EXP: Hoàn thành 1 ngày nhận 50 EXP. 100 EXP lên 1 Level
            s.exp += 50;
            s.coins += 20;
            
            if (s.exp >= s.level * 100) {
                s.level++;
            }

            if(s.currentDay < 10) {
                s.currentDay++;
                alert("Tuyệt vời! Đã mở khóa Ngày " + s.currentDay);
            } else {
                alert("Chúc mừng Bảo Lâm đã hoàn thành chặng đường 10 ngày!");
            }
            
            window.saveToCloud(s);
        }

        function celebrate() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FF8C00', '#FFD700', '#ffffff']
            });
        }
    </script>
</body>
</html>

```
