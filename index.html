<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏀 Basketball Power Up v2</title>
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --or: #FF6B00; --orl: #FF9A3C; --ye: #FFD600;
  --dk: #0D0D1A; --dkr: #080810; --cd: #161628; --cd2: #1E1E35;
  --bl: #00C2FF; --gr: #00E676; --pu: #B44FFF; --rd: #FF3D5A;
  --tx: #F0F0FF; --mu: #8888AA;
  --radius: 14px; --transition: 0.22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nunito',system-ui,-apple-system,sans-serif;
  background:var(--dkr); color:var(--tx); min-height:100vh;
  overflow-x:hidden;
  background-image:
    radial-gradient(ellipse 90% 50% at 50% -10%,rgba(255,107,0,.12) 0%,transparent 60%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.018'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
}
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@700;800;900&display=swap');
.ff-display{font-family:'Black Han Sans','Arial Black',Impact,sans-serif;}

/* ═══════════════════════════════════════════
SPLASH / LOGIN
═══════════════════════════════════════════ */
#splash{
display:flex;flex-direction:column;align-items:center;justify-content:center;
min-height:100vh;padding:1.5rem;text-align:center;position:relative;overflow:hidden;
}
.splash-step{width:100%;max-width:400px;}
.splash-ring{
position:absolute;border-radius:50%;border:1px solid rgba(255,107,0,.07);
pointer-events:none;
}
.splash-ball{font-size:5.5rem;animation:bounce 1.3s ease-in-out infinite;filter:drop-shadow(0 0 28px rgba(255,107,0,.7));margin-bottom:.8rem;}
.splash-title{
font-family:‘Black Han Sans’,Impact,sans-serif;
font-size:clamp(2rem,9vw,4rem);line-height:1;letter-spacing:-1px;margin-bottom:.3rem;
background:linear-gradient(135deg,var(–or),var(–ye),var(–or));
background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
animation:shimmer 3s linear infinite;
}
.splash-sub{font-size:.85rem;color:var(–mu);letter-spacing:3px;text-transform:uppercase;font-weight:800;margin-bottom:2rem;}
.splash-section-title{font-size:.7rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(–orl);margin-bottom:.75rem;}
.player-list{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.player-btn{
display:flex;align-items:center;gap:.8rem;
background:var(–cd);border:1px solid rgba(255,255,255,.07);border-radius:var(–radius);
padding:.9rem 1rem;cursor:pointer;transition:all var(–transition);text-align:left;
width:100%;color:var(–tx);
}
.player-btn:hover{border-color:var(–or);background:rgba(255,107,0,.08);}
.player-btn-avatar{
width:38px;height:38px;border-radius:50%;flex-shrink:0;
display:flex;align-items:center;justify-content:center;font-size:1.2rem;
}
.player-btn-info{flex:1;}
.player-btn-name{font-weight:900;font-size:1rem;}
.player-btn-stats{font-size:.72rem;color:var(–mu);font-weight:700;margin-top:.1rem;}
.player-btn-arrow{color:var(–mu);font-size:1.2rem;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1rem;}
.role-card{
background:var(–cd);border:2px solid rgba(255,255,255,.07);border-radius:18px;
padding:1.5rem 1rem;cursor:pointer;transition:all var(–transition);text-align:center;
}
.role-card:hover{transform:translateY(-3px);}
.role-card.father:hover,.role-card.father:active{border-color:var(–or);background:rgba(255,107,0,.08);}
.role-card.child:hover,.role-card.child:active{border-color:var(–bl);background:rgba(0,194,255,.08);}
.role-icon{font-size:2.8rem;margin-bottom:.5rem;}
.role-name{font-weight:900;font-size:1.05rem;margin-bottom:.25rem;}
.role-desc{font-size:.72rem;color:var(–mu);font-weight:700;}
.pwd-input{
width:100%;padding:1rem;background:var(–cd);border:2px solid rgba(255,255,255,.1);
border-radius:var(–radius);color:var(–tx);font-size:1.5rem;font-weight:900;
text-align:center;letter-spacing:.5rem;font-family:monospace;outline:none;
transition:border-color var(–transition);margin-bottom:1rem;
}
.pwd-input:focus{border-color:var(–or);}
.pwd-error{color:var(–rd);font-size:.85rem;font-weight:700;margin-bottom:.7rem;min-height:1.2em;}
.new-player-input{
width:100%;padding:.9rem 1rem;background:var(–cd);border:2px solid rgba(255,255,255,.08);
border-radius:var(–radius);color:var(–tx);font-size:1rem;font-weight:800;
font-family:inherit;outline:none;transition:border-color var(–transition);margin-bottom:.75rem;
}
.new-player-input:focus{border-color:var(–or);}

/* ═══════════════════════════════════════════
BUTTONS
═══════════════════════════════════════════ */
.btn{
display:block;width:100%;padding:.95rem 1rem;border:none;border-radius:var(–radius);
font-family:inherit;font-weight:900;font-size:1rem;cursor:pointer;
transition:all var(–transition);text-align:center;
}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(–or),var(–orl));color:#fff;box-shadow:0 6px 24px rgba(255,107,0,.35);}
.btn-primary:hover{box-shadow:0 10px 32px rgba(255,107,0,.55);transform:translateY(-2px);}
.btn-secondary{background:var(–cd2);color:var(–tx);border:1px solid rgba(255,255,255,.08);}
.btn-secondary:hover{background:var(–cd);border-color:rgba(255,255,255,.15);}
.btn-success{background:linear-gradient(135deg,var(–gr),#00BFA5);color:#000;}
.btn-success:hover{box-shadow:0 8px 24px rgba(0,230,118,.3);transform:translateY(-2px);}
.btn-danger{background:linear-gradient(135deg,var(–rd),#c62a47);color:#fff;}
.btn-sm{padding:.55rem .9rem;font-size:.8rem;width:auto;display:inline-flex;align-items:center;gap:.3rem;}
.btn-ghost{background:transparent;color:var(–mu);border:1px solid rgba(255,255,255,.08);}
.btn-ghost:hover{color:var(–tx);border-color:rgba(255,255,255,.2);}
.btn[disabled],.btn-locked{opacity:.5;cursor:not-allowed;pointer-events:none;}
.btn-back{
display:inline-flex;align-items:center;gap:.4rem;background:none;border:none;
color:var(–mu);font-size:.85rem;font-weight:800;cursor:pointer;padding:.5rem 0;
transition:color var(–transition);
}
.btn-back:hover{color:var(–tx);}

/* ═══════════════════════════════════════════
TOPBAR
═══════════════════════════════════════════ */
#topbar{
position:sticky;top:0;z-index:100;
background:rgba(8,8,16,.96);backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,107,0,.18);
padding:.65rem .9rem;display:flex;align-items:center;gap:.6rem;
}
.tb-player{display:flex;align-items:center;gap:.55rem;flex:1;min-width:0;}
.tb-avatar{
width:36px;height:36px;border-radius:50%;flex-shrink:0;
display:flex;align-items:center;justify-content:center;font-size:1.1rem;
}
.tb-info{min-width:0;}
.tb-name{font-weight:900;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-lv{font-size:.65rem;color:var(–orl);font-weight:800;white-space:nowrap;}
.tb-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0;}
.coin-pill{
display:flex;align-items:center;gap:.3rem;background:var(–cd);
border-radius:20px;padding:.28rem .6rem;font-weight:900;font-size:.85rem;
border:1px solid rgba(255,214,0,.15);
}
.exp-mini{width:72px;}
.exp-mini-lbl{font-size:.55rem;color:var(–mu);font-weight:800;text-transform:uppercase;}
.exp-mini-bar{height:6px;background:var(–cd2);border-radius:3px;overflow:hidden;margin-top:2px;}
.exp-mini-fill{height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:3px;transition:width .7s ease;}
.tb-btns{display:flex;gap:.3rem;}
.icon-btn{
width:34px;height:34px;border-radius:10px;background:var(–cd);border:1px solid rgba(255,255,255,.07);
display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;
transition:all var(–transition);color:var(–mu);
}
.icon-btn:hover{background:var(–cd2);color:var(–tx);}
.role-badge{
display:inline-flex;align-items:center;gap:.25rem;padding:.2rem .55rem;
border-radius:20px;font-size:.6rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;
}
.role-badge.father{background:rgba(255,107,0,.15);color:var(–orl);border:1px solid rgba(255,107,0,.25);}
.role-badge.child{background:rgba(0,194,255,.12);color:var(–bl);border:1px solid rgba(0,194,255,.2);}

/* ═══════════════════════════════════════════
NAV
═══════════════════════════════════════════ */
#nav-bar{
display:flex;overflow-x:auto;gap:.35rem;padding:.65rem .9rem;
background:var(–dk);border-bottom:1px solid rgba(255,255,255,.05);
scrollbar-width:none;flex-shrink:0;
}
#nav-bar::-webkit-scrollbar{display:none;}
.nav-tab{
flex-shrink:0;padding:.45rem .8rem;border-radius:20px;
font-weight:900;font-size:.75rem;cursor:pointer;border:none;
background:var(–cd2);color:var(–mu);transition:all var(–transition);
white-space:nowrap;
}
.nav-tab.active{background:var(–or);color:#fff;}
.nav-tab.done{background:rgba(0,230,118,.12);color:var(–gr);}
.nav-tab.done.active{background:var(–gr);color:#000;}

/* ═══════════════════════════════════════════
CONTENT AREA
═══════════════════════════════════════════ */
#content{padding:.9rem;padding-bottom:5rem;}
.section-title{
font-size:.65rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;
color:var(–orl);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem;
}
.section-title::after{content:’’;flex:1;height:1px;background:rgba(255,255,255,.05);}
.card{
background:var(–cd);border-radius:18px;padding:1.25rem;
border:1px solid rgba(255,255,255,.05);margin-bottom:.8rem;
}
.card-glow{border-color:rgba(255,107,0,.2);background:linear-gradient(135deg,rgba(255,107,0,.06),rgba(180,79,255,.04));}

/* ═══════════════════════════════════════════
DASHBOARD
═══════════════════════════════════════════ */
.hero-card{
background:linear-gradient(135deg,rgba(255,107,0,.14),rgba(180,79,255,.08));
border:1px solid rgba(255,107,0,.22);border-radius:20px;padding:1.4rem;
margin-bottom:.9rem;text-align:center;position:relative;overflow:hidden;
}
.hero-card::before{content:‘🏀’;position:absolute;font-size:8rem;opacity:.05;right:-1rem;top:-1rem;pointer-events:none;}
.hero-badge{
display:inline-block;background:linear-gradient(135deg,var(–or),var(–ye));
color:#000;font-weight:900;font-size:.7rem;padding:.22rem .7rem;
border-radius:20px;letter-spacing:2px;text-transform:uppercase;margin-bottom:.5rem;
}
.hero-name{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:2rem;margin-bottom:.2rem;}
.hero-subtitle{color:var(–orl);font-size:.82rem;font-weight:800;margin-bottom:1rem;}
.exp-bar{height:14px;background:rgba(255,255,255,.07);border-radius:7px;overflow:hidden;position:relative;}
.exp-bar-fill{
height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:7px;
transition:width .9s cubic-bezier(.4,0,.2,1);position:relative;
}
.exp-bar-fill::after{
content:’’;position:absolute;right:0;top:0;bottom:0;width:6px;
background:rgba(255,255,255,.5);border-radius:3px;animation:pulse 1.5s ease-in-out infinite;
}
.exp-bar-lbl{display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:var(–mu);margin-bottom:.35rem;}
.skills-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:.9rem;}
.skill-card{
background:var(–cd2);border-radius:14px;padding:.85rem .6rem;
text-align:center;border:1px solid rgba(255,255,255,.04);transition:transform var(–transition);
}
.skill-card:hover{transform:translateY(-2px);}
.skill-icon{font-size:1.7rem;margin-bottom:.25rem;}
.skill-nm{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(–mu);margin-bottom:.35rem;}
.skill-num{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.5rem;line-height:1;}
.skill-bar-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-top:.4rem;overflow:hidden;}
.skill-bar{height:100%;border-radius:3px;transition:width .7s ease;}
.stats-trio{display:flex;justify-content:space-around;text-align:center;gap:.5rem;margin-bottom:1rem;}
.stat-big{flex:1;}
.stat-big-num{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:2.3rem;line-height:1;}
.stat-big-lbl{font-size:.65rem;color:var(–mu);font-weight:800;text-transform:uppercase;margin-top:.2rem;}
.progress-bar-wrap{margin-top:1rem;}
.progress-bar{height:10px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:5px;transition:width .8s ease;}

/* ═══════════════════════════════════════════
DAY VIEW
═══════════════════════════════════════════ */
.day-header{
border-radius:18px;padding:1.2rem 1.4rem;margin-bottom:.9rem;
position:relative;overflow:hidden;
}
.day-header::after{
content:attr(data-day);position:absolute;right:.8rem;top:50%;transform:translateY(-50%);
font-family:‘Black Han Sans’,Impact,sans-serif;font-size:5rem;color:rgba(255,255,255,.08);pointer-events:none;
}
.day-label{font-size:.65rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;opacity:.8;margin-bottom:.2rem;}
.day-title{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.65rem;line-height:1.1;}
.day-sub{font-size:.82rem;opacity:.75;margin-top:.2rem;}
.mission-card{
background:var(–cd);border-radius:14px;padding:.95rem;
margin-bottom:.5rem;display:flex;align-items:center;gap:.8rem;
border:1px solid rgba(255,255,255,.05);transition:all var(–transition);cursor:pointer;
}
.mission-card.done{background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.2);}
.mission-card:hover:not(.done):not(.locked-action){background:rgba(255,255,255,.03);}
.mission-check{
width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.14);
flex-shrink:0;display:flex;align-items:center;justify-content:center;
font-size:1rem;transition:all var(–transition);
}
.mission-card.done .mission-check{background:var(–gr);border-color:var(–gr);animation:checkPop .3s cubic-bezier(.4,0,.2,1);}
.mission-icon{font-size:1.4rem;}
.mission-info{flex:1;}
.mission-name{font-weight:900;font-size:.92rem;}
.mission-desc{font-size:.73rem;color:var(–mu);margin-top:.12rem;}
.mission-reward{
background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.2);
border-radius:8px;padding:.18rem .5rem;font-size:.68rem;font-weight:900;
color:var(–ye);white-space:nowrap;flex-shrink:0;
}
.stats-input-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.55rem;margin-bottom:.5rem;}
.stat-group label{display:block;font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(–mu);margin-bottom:.28rem;}
.stat-inp{
width:100%;padding:.6rem .4rem;background:var(–cd2);border:1px solid rgba(255,255,255,.07);
border-radius:10px;color:var(–tx);font-family:inherit;font-weight:900;font-size:1rem;
text-align:center;outline:none;transition:border-color var(–transition);
}
.stat-inp:focus{border-color:var(–or);box-shadow:0 0 0 3px rgba(255,107,0,.12);}
.stat-inp:disabled{opacity:.45;cursor:not-allowed;}
.stat-unit{font-size:.6rem;color:var(–mu);text-align:center;margin-top:.18rem;}
.stat-delta{font-size:.65rem;font-weight:800;text-align:center;margin-top:.15rem;min-height:1em;}
.dlt-good{color:var(–gr);} .dlt-bad{color:var(–rd);} .dlt-neu{color:var(–mu);}
.pvp-card{
background:linear-gradient(135deg,rgba(180,79,255,.12),rgba(0,194,255,.08));
border:1px solid rgba(180,79,255,.22);border-radius:16px;padding:1.1rem;margin-bottom:.55rem;
}
.pvp-title{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.05rem;margin-bottom:.5rem;}
.pvp-desc{font-size:.82rem;color:var(–mu);margin-bottom:.9rem;}
.pvp-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
.pvp-btn{
padding:.7rem;border:2px solid transparent;border-radius:12px;
font-weight:900;font-size:.9rem;cursor:pointer;transition:all var(–transition);
font-family:inherit;
}
.pvp-win{background:var(–gr);color:#000;}
.pvp-lose{background:var(–cd2);color:var(–mu);border-color:rgba(255,255,255,.08);}
.pvp-win.sel{box-shadow:0 0 0 3px rgba(0,230,118,.4);transform:scale(1.02);}
.pvp-lose.sel{color:var(–tx);border-color:rgba(255,255,255,.25);}
.pvp-btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-complete{
width:100%;padding:.95rem;border:none;border-radius:14px;
font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.25rem;cursor:pointer;
transition:all var(–transition);letter-spacing:1px;margin-top:.3rem;
background:linear-gradient(135deg,var(–or),var(–orl));
color:#fff;box-shadow:0 6px 20px rgba(255,107,0,.32);
}
.btn-complete:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,0,.5);}
.btn-complete:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-complete.completed{background:linear-gradient(135deg,var(–gr),#00BFA5);box-shadow:0 6px 20px rgba(0,230,118,.28);cursor:default;}
.edit-bar{
display:flex;align-items:center;justify-content:space-between;
background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.18);
border-radius:12px;padding:.6rem .9rem;margin-bottom:.7rem;
}
.edit-bar-lbl{font-size:.78rem;font-weight:800;color:var(–orl);}

/* ═══════════════════════════════════════════
PROGRESS / CHART
═══════════════════════════════════════════ */
.chart-card{background:var(–cd);border-radius:16px;padding:1rem;margin-bottom:.8rem;border:1px solid rgba(255,255,255,.05);}
.chart-title{font-weight:900;font-size:.82rem;margin-bottom:.65rem;}
.mini-chart{height:90px;display:flex;align-items:flex-end;gap:3px;padding:0 .3rem;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar-val{font-size:.55rem;font-weight:900;color:var(–tx);white-space:nowrap;}
.bar-body{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .6s ease;}
.bar-lbl{font-size:.58rem;color:var(–mu);font-weight:800;}
.day-log-row{
display:flex;align-items:center;gap:.75rem;background:var(–cd2);
border-radius:12px;padding:.65rem .9rem;margin-bottom:.4rem;
}
.day-log-num{
width:30px;height:30px;border-radius:8px;background:var(–cd);
display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.85rem;flex-shrink:0;
}
.day-log-num.done{background:var(–gr);color:#000;}
.day-log-stats{flex:1;font-size:.75rem;color:var(–mu);font-weight:700;}
.day-log-title{font-weight:900;font-size:.85rem;margin-bottom:.1rem;}

/* ═══════════════════════════════════════════
BADGES
═══════════════════════════════════════════ */
.badges-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;}
.badge-card{
background:var(–cd2);border-radius:14px;padding:.85rem .6rem;
text-align:center;border:1px solid rgba(255,255,255,.04);transition:all var(–transition);
}
.badge-card.unlocked{background:rgba(255,214,0,.07);border-color:rgba(255,214,0,.28);}
.badge-card.unlocked.new-unlock{animation:badgePop .5s cubic-bezier(.4,0,.2,1);}
.badge-ico{font-size:2rem;margin-bottom:.28rem;filter:grayscale(1);opacity:.28;transition:all var(–transition);}
.badge-card.unlocked .badge-ico{filter:grayscale(0);opacity:1;}
.badge-nm{font-size:.62rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(–mu);}
.badge-card.unlocked .badge-nm{color:var(–ye);}
.badge-ds{font-size:.58rem;color:var(–mu);margin-top:.18rem;}

/* ═══════════════════════════════════════════
REWARDS
═══════════════════════════════════════════ */
.reward-card{
background:var(–cd);border-radius:16px;padding:1.1rem;margin-bottom:.65rem;
border:1px solid rgba(255,255,255,.05);

}

function createDefaultPlayer(name) {
  return {
    name,
    exp: 0,
    coins: 0,
    avatarIdx: Math.floor(Math.random() * AVATARS.length),
    days: Array.from({length:10}, (_,i) => ({
      dayNum: i+1,
      completed: false,
      completedAt: null,
      missions: {}, // { speed: bool, jump: bool, stamina: bool }
      pvpResult: null, // 'win' | 'lose' | null
      stats: { speed:'', jump:'', stamina:'' },
      recordsAwarded: {}, // tracks which skills had records awarded this day
      reward: null, // assigned on completion
    })),
    achievements: {}, // { [id]: timestamp }
    rewards: [], // list of reward entries
  };
}

function getPlayer() { return ALL_PLAYERS[SESSION.currentPlayer]; }

function isFather() { return SESSION.role === 'father'; }

function canEdit() { return isFather() && !SESSION.editMode === false || isFather(); }

/* ═══════════════════════════════════════════════════════════════════
   4. GAME LOGIC
═══════════════════════════════════════════════════════════════════ */

function getLevel(p) { return Math.min(10, Math.floor((p || getPlayer()).exp / EXP_PER_LV)); }
function getLevelTitle(p) { return LEVEL_TITLES[getLevel(p)]; }
function getExpInLevel(p) { return (p || getPlayer()).exp % EXP_PER_LV; }
function getExpPct(p) { return (getExpInLevel(p) / EXP_PER_LV) * 100; }

function getSkillLevel(p, skill) {
  return Math.min(10, p.days.filter(d => d.missions[skill]).length);
}

function addExp(p, amount) {
  const prev = getLevel(p);
  p.exp += amount;
  const next = getLevel(p);
  updateTopBar();
  if (next > prev) {
    playSound('levelup');
    setTimeout(() => showLevelUp(next, getLevelTitle(p)), 600);
  }
}

function addCoins(p, amount) {
  p.coins += amount;
  playSound('coin');
  updateTopBar();
}

function getPrevStat(p, dayNum, skill) {
  for (let i = dayNum-2; i >= 0; i--) {
    const v = parseFloat(p.days[i].stats[skill]);
    if (!isNaN(v) && v > 0) return v;
  }
  return null;
}

function getDeltaHtml(skill, val, prev) {
  if (!val || !prev || isNaN(parseFloat(val))) return '';
  const curr = parseFloat(val), diff = curr - prev;
  const lowerBetter = skill === 'speed' || skill === 'stamina';
  const good = lowerBetter ? diff < 0 : diff > 0;
  const sign = diff > 0 ? '+' : '';
  const cls = diff === 0 ? 'dlt-neu' : good ? 'dlt-good' : 'dlt-bad';
  const tag = diff === 0 ? '=' : good ? '▲ RECORD!' : '▽';
  return `<span class="${cls}">${sign}${diff.toFixed(1)} ${tag}</span>`;
}

/* ═══════════════════════════════════════════════════════════════════
   5. REWARD SYSTEM
═══════════════════════════════════════════════════════════════════ */

/**
 * Calculate day reward based on mission completion percentage.
 * Physical missions (3) × 80% weight + PvP (1) × 20% weight = 100%
 * <70% → none | 70–89% → small | 90–100% → big
 */
function calcReward(dayData) {
  const physDone = ['speed','jump','stamina'].filter(s => dayData.missions[s]).length;
  const pvpDone = dayData.pvpResult !== null ? 1 : 0;
  const pct = Math.round((physDone / 3) * 80 + pvpDone * 20);

  if (pct < 70) return { type:'none', pct, gameTime:null, money:null };
  if (pct < 90) return { type:'small', pct, gameTime:'30 min', money:'20.000đ' };
  return { type:'big', pct, gameTime:'1 hour', money:'50.000đ' };
}

function getUnredeemedRewards(p) {
  return p.rewards.filter(r => r.type !== 'none' && !r.redeemed);
}

/* ═══════════════════════════════════════════════════════════════════
   6. SOUND SYSTEM (Web Audio API)
═══════════════════════════════════════════════════════════════════ */

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return _audioCtx;
}

function playTone(freq, duration, type = 'sine', gain = 0.3) {
  if (!SETTINGS.soundEnabled) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gn = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gn.gain.setValueAtTime(gain, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function playSound(type) {
  if (!SETTINGS.soundEnabled) return;
  const sounds = {
    coin: () => { playTone(880, .1); setTimeout(() => playTone(1100, .1), 80); },
    levelup: () => {
      [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, .2), i*120));
    },
    achievement: () => {
      [659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, .25,'square',.2), i*100));
    },
    complete: () => {
      [523,659,784].forEach((f,i) => setTimeout(() => playTone(f, .3,'sine',.25), i*80));
    },
    click: () => playTone(440, .05, 'square', .1),
    record: () => { playTone(880, .15); setTimeout(() => playTone(1320, .2), 100); },
    error: () => { playTone(200, .15, 'sawtooth', .2); },
  };
  sounds[type] && sounds[type]();
}

function toggleSound() {
  SETTINGS.soundEnabled = !SETTINGS.soundEnabled;
  saveSettings();
  document.getElementById('sound-btn').textContent = SETTINGS.soundEnabled ? '🔊' : '🔇';
  showToast(SETTINGS.soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF');
}

}

function buildNav() {
  const p = getPlayer();

    {id:'progress',label:'📊 Stats'},
    {id:'badges',label:'🏆 Badges'},
    {id:'rewards',label:'🎁 Rewards'},

    ...Array.from({length:10},(_,i) => ({id:`day${i+1}`,label:`D${i+1}`,dayIdx:i})),
  ];
  document.getElementById('nav-bar').innerHTML = tabs.map(t => {
    let cls = 'nav-tab';
    if (t.dayIdx !== undefined && p && p.days[t.dayIdx].completed) cls += ' done';
    if (SESSION.currentTab === t.id) cls += ' active';
    return `<button class="${cls}" onclick="renderTab('${t.id}')">${t.label}</button>`;
  }).join('');
}

function renderTab(id) {
  SESSION.currentTab = id;
  SESSION.editMode = false;
  buildNav();
  playSound('click');
  const area = document.getElementById('content');
  const p = getPlayer();
  if (id === 'dashboard') area.innerHTML = buildDashboard(p);
  else if (id === 'progress') area.innerHTML = buildProgress(p);
  else if (id === 'badges') area.innerHTML = buildBadges(p);
  else if (id === 'rewards') area.innerHTML = buildRewards(p);
  else if (id === 'admin') area.innerHTML = buildAdmin();
  else if (id.startsWith('day')) {
    const dn = parseInt(id.replace('day',''));
    area.innerHTML = buildDayView(p, dn);

    area.querySelectorAll('.stat-inp').forEach(inp => inp.addEventListener('change', onStatChange));

  const day = p.days[dayIdx];
  const theme = DAY_THEMES[dayIdx];
  const missions = DAY_MISSIONS[dayIdx];
  const done = p.days.filter(d=>d.completed).length;
  const isLocked = dayNum > done + 1;

  if (isLocked) return `
    <div class="day-header" data-day="${dayNum}" style="background:linear-gradient(135deg,#1e1e30,#2a2a3a)">
      <div class="day-label">DAY ${dayNum}</div>
      <div class="day-title ff-display">🔒 LOCKED</div>
      <div style="font-size:.82rem;color:rgba(255,255,255,.5);margin-top:.2rem">Complete Day ${dayNum-1} to unlock!</div>
    </div>
    <div style="text-align:center;padding:3rem 1rem;color:var(--mu)">
      <div style="font-size:4rem;margin-bottom:1rem">🔐</div>
      <div style="font-weight:900;font-size:1.1rem;margin-bottom:.4rem">Keep grinding!</div>
      <div style="font-size:.88rem">Finish the previous day to unlock this challenge.</div>
    </div>`;

  if (dayNum === 10 && day.completed && !SESSION.editMode) return buildFinalBoss(p);

  const phys = missions.filter(m=>m.id!=='pvp');
  const physDone = phys.filter(m=>day.missions[m.id]).length;
  const pvp = missions.find(m=>m.id==='pvp');
  const allPhysDone = physDone === phys.length;
  const canComplete = allPhysDone;
  const isEditable = isFather();
  const childLock = !isFather();

  return `
  <div class="day-header" data-day="${dayNum}" style="background:${theme.color}">
    <div class="day-label">${dayNum===10?'👑 FINAL BOSS · ':''}DAY ${dayNum} / 10</div>
    <div class="day-title ff-display">${theme.title}</div>
    <div class="day-sub">${theme.sub}</div>
  </div>

  ${day.completed && isFather() && !SESSION.editMode ? `
  <div class="edit-bar">
    <span class="edit-bar-lbl">✅ Day completed · ${new Date(day.completedAt).toLocaleDateString()}</span>
    <button class="btn btn-sm btn-ghost" onclick="requestEditMode(${dayNum})">✏️ Edit</button>
  </div>` : ''}

  ${SESSION.editMode ? `
  <div class="edit-bar" style="border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.07)">
    <span class="edit-bar-lbl" style="color:var(--rd)">✏️ EDIT MODE – Changes save automatically</span>
    <button class="btn btn-sm btn-ghost" onclick="exitEditMode(${dayNum})">✓ Done</button>
  </div>` : ''}

  ${phys.map(m => buildMissionCard(m, day, dayNum, childLock)).join('')}

  <div class="section-title" style="margin-top:.9rem">TODAY'S STATS</div>
  <div class="card">
    <div class="stats-input-grid">
      ${buildStatInput(p, dayNum, 'speed', '⚡', 'sec', !isEditable && !SESSION.editMode || (day.completed && !SESSION.editMode && !isFather()))}
      ${buildStatInput(p, dayNum, 'jump', '🦘', 'cm', !isEditable && !SESSION.editMode || (day.completed && !SESSION.editMode && !isFather()))}
      ${buildStatInput(p, dayNum, 'stamina', '🔁', 'min', !isEditable && !SESSION.editMode || (day.completed && !SESSION.editMode && !isFather()))}
    </div>
    ${!isEditable ? `<div style="font-size:.72rem;color:var(--mu);font-weight:700;text-align:center;margin-top:.3rem">🔒 Stats entered by Dad</div>` : ''}
  </div>

  <button class="btn-complete ${!canComplete?'':''}" onclick="${childLock?'childAction()':!canComplete?'showToast(\"⚡ Complete all missions first!\")':'confirmCompleteDay('+dayNum+')'}" ${day.completed?'disabled':''}>

  return `
  <div class="mission-card ${isDone?'done':''}${lock}" onclick="${clickFn}">

      <div class="mission-desc">${m.desc}</div>

    <div class="mission-reward">+${m.exp} EXP</div>

}

function buildStatInput(p, dayNum, skill, icon, unit, isDisabled) {
  const day = p.days[dayNum-1];
  const val = day.stats[skill];
  const prev = getPrevStat(p, dayNum, skill);
  const delta = getDeltaHtml(skill, val, prev);
  const labels = {speed:'⚡ Speed',jump:'🦘 Jump',stamina:'🔁 Stamina'};
  return `
  <div class="stat-group">
    <label>${labels[skill]}</label>
    <input type="number" class="stat-inp" data-day="${dayNum}" data-skill="${skill}"
      placeholder="0.0" value="${val}" step="0.1" min="0" ${isDisabled?'disabled':''}>
    <div class="stat-unit">${unit}</div>
    <div class="stat-delta" id="delta-${dayNum}-${skill}">${delta}</div>
  </div>`;
}

function buildPvpCard(pvp, day, dayNum, childLock) {
  const res = day.pvpResult;
  const disabled = childLock ? 'disabled' : '';
  return `

    <div class="pvp-desc">${pvp.desc}</div>
    <div class="pvp-grid">
      <button class="pvp-btn pvp-win ${res==='win'?'sel':''}" ${disabled} onclick="${childLock?'childAction()':'setPvpResult('+dayNum+',\'win\')'}">🏆 I WON! +${pvp.coins}🪙</button>
      <button class="pvp-btn pvp-lose ${res==='lose'?'sel':''}" ${disabled} onclick="${childLock?'childAction()':'setPvpResult('+dayNum+',\'lose\')'}">💪 Dad Won (+5🪙)</button>
    </div>
  </div>`;
}

        ${d.stats.jump?` · 🦘${d.stats.jump}cm`:' · 🦘–'}
        ${d.stats.stamina?` · 🔁${d.stats.stamina}min`:' · 🔁–'}

    <div style="font-size:.78rem;font-weight:800;color:${d.completed?'var(--gr)':'var(--mu)'}">${d.completed?'✅':'–'}</div>
  </div>`).join('')}`;
}

function buildChart(title, vals, color, lowerBetter) {
  const filt = vals.filter(v=>v!==null);
  if (!filt.length) return `<div class="chart-card"><div class="chart-title">${title}</div><div style="text-align:center;color:var(--mu);font-size:.8rem;padding:.75rem">No data yet – complete some days!</div></div>`;
  const max = Math.max(...filt), min = Math.min(...filt), range = max-min || 1;
  return `
  <div class="chart-card">
    <div class="chart-title">${title}</div>
    <div class="mini-chart">
      ${vals.map((v,i) => {
        if (v===null) return `<div class="bar-wrap"><div style="flex:1"></div><div class="bar-lbl">D${i+1}</div></div>`;
        const prev = filt.slice(0, filt.indexOf(v)).at(-1);
        const good = prev!==undefined && (lowerBetter ? v<prev : v>prev);
        const pct = lowerBetter ? 1-(v-min)/range : (v-min)/range;
        const h = Math.max(8, Math.min(88, pct*100));
        return `<div class="bar-wrap">
          <div class="bar-val">${v}</div>
          <div class="bar-body" style="height:${h}%;background:${good?'var(--gr)':color};opacity:${v===null?.2:1}"></div>
          <div class="bar-lbl">D${i+1}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function redeemReward(dayNum) {

  r.redeemed = true; r.redeemedAt = Date.now();

  playSound('achievement');
  showLevelUp('🎁', 'REWARD REDEEMED!', `Day ${dayNum}: ${r.gameTime||''} ${r.money ? '+ '+r.money : ''}`);
  renderTab('rewards');
}

function childAction() {
  showToast('🔒 Only Dad can do this!');
  playSound('error');

/** Toggle a mission checkbox (father only) */
function toggleMission(dayNum, skill) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer();
  const day = p.days[dayNum-1];
  if (day.completed && !SESSION.editMode) return;

  const m = DAY_MISSIONS[dayNum-1].find(m=>m.id===skill);
  if (day.missions[skill]) {
    // Untick: refund EXP & coins
    day.missions[skill] = false;
    p.exp = Math.max(0, p.exp - m.exp);
    p.coins = Math.max(0, p.coins - m.coins);
  } else {
    // Tick: award EXP & coins
    day.missions[skill] = true;
    addExp(p, m.exp);
    addCoins(p, m.coins);
    playSound('complete');
    spawnConfetti(3);
  }
  checkAchievements(p);
  savePlayers();
  updateTopBar();
  renderTab(`day${dayNum}`);
}

/** Set 1v1 result */
function setPvpResult(dayNum, result) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer();
  const day = p.days[dayNum-1];
  if (day.completed && !SESSION.editMode) return;

  const pvp = DAY_MISSIONS[dayNum-1].find(m=>m.id==='pvp');
  const prev = day.pvpResult;

  // Refund previous
  if (prev === 'win') { p.exp = Math.max(0,p.exp-pvp.exp); p.coins = Math.max(0,p.coins-pvp.coins); }
  if (prev === 'lose') { p.exp = Math.max(0,p.exp-5); p.coins = Math.max(0,p.coins-5); }

  day.pvpResult = result;
  if (result === 'win') {
    addExp(p, pvp.exp); addCoins(p, pvp.coins);
    showToast('🏆 WIN! +' + pvp.exp + ' EXP +' + pvp.coins + '🪙');
    unlockAchievement(p, 'clutch_player');
    playSound('achievement');
  } else {
    addExp(p, 5); addCoins(p, 5);
    showToast('💪 Good fight! +5 EXP');
    playSound('coin');
  }
  savePlayers();
  renderTab(`day${dayNum}`);
}

/** Stat input handler (father only) */
function onStatChange(e) {
  if (!isFather() && !SESSION.editMode) return;
  const dayNum = parseInt(e.target.dataset.day);
  const skill = e.target.dataset.skill;
  const rawVal = e.target.value.trim();
  const val = parseFloat(rawVal);

  if (rawVal !== '' && (isNaN(val) || val < 0)) {
    showToast('❌ Invalid value!'); playSound('error');
    e.target.value = '';
    return;
  }

  const p = getPlayer();
  const day = p.days[dayNum-1];
  day.stats[skill] = rawVal;

  // Check for record (only award once per skill per day)
  const prev = getPrevStat(p, dayNum, skill);
  if (rawVal && prev) {
    const lowerBetter = skill==='speed'||skill==='stamina';
    const improved = lowerBetter ? val<prev : val>prev;
    if (improved && !day.recordsAwarded[skill]) {
      day.recordsAwarded[skill] = true;
      addCoins(p, 15);
      playSound('record');
      showToast('🔥 NEW RECORD! +15🪙');
      if (skill==='speed') unlockAchievement(p,'speed_hunter');
      if (skill==='jump') unlockAchievement(p,'jump_booster');
      if (skill==='stamina') unlockAchievement(p,'iron_energy');
      unlockAchievement(p,'record_breaker');
    } else if (improved && day.recordsAwarded[skill]) {
      // Allow updating the record stat without re-awarding coins
    }
  }

  // Update delta display
  const deltaEl = document.getElementById(`delta-${dayNum}-${skill}`);
  if (deltaEl) deltaEl.innerHTML = getDeltaHtml(skill, rawVal, prev);

  savePlayers();
}

/** Request to edit a completed day */
function requestEditMode(dayNum) {
  showPasswordModal('Enter admin password to edit:', (pwd) => {
    if (pwd !== ADMIN_PWD) { showToast('❌ Wrong password!'); playSound('error'); return; }
    SESSION.editMode = true;
    renderTab(`day${dayNum}`);
  });
}

function exitEditMode(dayNum) {
  SESSION.editMode = false;
  renderTab(`day${dayNum}`);
}

/** Confirm day completion */
function confirmCompleteDay(dayNum) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer();
  const day = p.days[dayNum-1];
  const phys = DAY_MISSIONS[dayNum-1].filter(m=>m.id!=='pvp');
  if (!phys.every(m=>day.missions[m.id])) { showToast('❌ Complete all missions first!'); return; }

  // Calculate reward before completing
  const reward = calcReward(day);
  const rewardMsg = reward.type==='none' ? 'No reward this time – try harder tomorrow!' :
    reward.type==='small' ? `🎮 ${reward.gameTime} gaming + 💰 ${reward.money} earned!` :
    `🏆 ${reward.gameTime} gaming + 💰 ${reward.money} – AMAZING!`;

  openModal(`
    <div class="modal-title ff-display">✅ COMPLETE DAY ${dayNum}?</div>
    <div style="text-align:center;margin-bottom:1.2rem">
      <div style="font-size:3rem;margin-bottom:.5rem">${reward.type==='big'?'🏆':reward.type==='small'?'⭐':'💪'}</div>
      <div style="font-weight:900;font-size:1rem;margin-bottom:.4rem">${reward.pct}% completion</div>
      <div style="font-size:.88rem;color:var(--mu);font-weight:700">${rewardMsg}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <button class="btn btn-secondary" onclick="closeModal()">← Back</button>
      <button class="btn btn-primary" onclick="closeModal();completeDay(${dayNum})">Confirm ✓</button>
    </div>`);
}

function completeDay(dayNum) {
  if (!isFather()) return;
  const p = getPlayer();
  const day = p.days[dayNum-1];

  // Award completion EXP & coins
  addExp(p, 20); addCoins(p, 10);
  day.completed = true;
  day.completedAt = Date.now();
  SESSION.editMode = false;

  // Calculate & store reward
  const reward = calcReward(day);
  reward.dayNum = dayNum;
  reward.redeemed = false;
  reward.redeemedAt = null;
  p.rewards.push(reward);

  checkAchievements(p);
  savePlayers();
  spawnConfetti(40);
  playSound('complete');

  if (dayNum === 10) {
    unlockAchievement(p, 'champion');
    setTimeout(() => showLevelUp('👑','CHAMPION!','You completed the 10 Day Challenge! GOAT status achieved!'), 800);
  } else {
    setTimeout(() => showLevelUp('🏀',`DAY ${dayNum} DONE!`,`${reward.type!=='none'?'Reward earned! ':''}Day ${dayNum+1} is now unlocked!`), 600);
  }
  renderTab(`day${dayNum}`);
}

/* ═══════════════════════════════════════════════════════════════════
   17. ACHIEVEMENTS
═══════════════════════════════════════════════════════════════════ */

function unlockAchievement(p, id) {
  if (p.achievements[id]) return;
  p.achievements[id] = Date.now();
  const a = ACHIEVEMENTS.find(a=>a.id===id);
  if (a) { savePlayers(); showAchievementToast(a); playSound('achievement'); }
}

function checkAchievements(p) {
  const done = p.days.filter(d=>d.completed).length;
  if (done >= 1) unlockAchievement(p,'first_day');
  if (done >= 5) unlockAchievement(p,'halfway');
  if (done >= 10) unlockAchievement(p,'champion');
  // Streak
  let streak=0, max=0;
  p.days.forEach(d => { if(d.completed){streak++;max=Math.max(max,streak);}else{streak=0;} });
  if (max>=3) unlockAchievement(p,'streak_3');
  if (max>=5) unlockAchievement(p,'streak_5');
}

  openModal(`
    <div class="modal-title ff-display">⇄ SWITCH PLAYER?</div>
    <div style="text-align:center;color:var(--mu);font-size:.9rem;font-weight:700;margin-bottom:1.2rem">Return to player select screen.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">
      <button class="btn btn-secondary" onclick="closeModal()">Stay</button>
      <button class="btn btn-primary" onclick="closeModal();goToSplash()">Switch →</button>
    </div>`);
}

function goToSplash() {
  SESSION.currentPlayer = null; SESSION.role = null; SESSION.editMode = false;
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('splash').style.display = '';
  document.getElementById('step-password').style.display = 'none';
  document.getElementById('login-pwd').value = '';
  document.getElementById('pwd-error').textContent = '';
  renderPlayerList();
  showStep('welcome');
}

/* ═══════════════════════════════════════════════════════════════════
   19. SYNC: EXPORT / IMPORT
═══════════════════════════════════════════════════════════════════ */

function showExportModal() {
  const json = JSON.stringify(ALL_PLAYERS, null, 2);
  openModal(`
    <div class="modal-title ff-display">📤 EXPORT DATA</div>
    <div style="font-size:.78rem;color:var(--mu);font-weight:700;margin-bottom:.6rem">Copy this JSON and paste it on your other device using Import.</div>
    <textarea class="sync-textarea" id="export-ta" readonly>${json}</textarea>

```
<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.7rem">
  <button class="btn btn-secondary" onclick="closeModal()">Close</button>
  <button class="btn btn-primary" onclick="
    const ta=document.getElementById('export-ta');
    ta.select();ta.setSelectionRange(0,99999);
    navigator.clipboard.writeText(ta.value).then(()=>showToast('✅ Copied to clipboard!')).catch(()=>{ta.select();document.execCommand('copy');showToast('✅ Copied!');});
  ">📋 Copy</button>
</div>`);
```

}

function showImportModal() {
openModal(` <div class="modal-title ff-display">📥 IMPORT DATA</div> <div style="font-size:.78rem;color:var(--mu);font-weight:700;margin-bottom:.6rem">Paste exported JSON here. Choose merge or replace.</div> <textarea class="sync-textarea" id="import-ta" placeholder="Paste JSON here..."></textarea> <div id="import-err" style="color:var(--rd);font-size:.78rem;font-weight:700;margin:.4rem 0;min-height:1em"></div> <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.3rem"> <button class="btn btn-secondary" onclick="importData('merge')">🔀 Merge</button> <button class="btn btn-danger" onclick="importData('replace')">♻️ Replace</button> </div> <div style="font-size:.7rem;color:var(--mu);margin-top:.5rem;font-weight:700">Merge: add new players, keep existing. Replace: overwrite ALL data.</div>`);
}

function importData(mode) {
const raw = document.getElementById(‘import-ta’).value.trim();
let parsed;
try { parsed = JSON.parse(raw); } catch(e) {
document.getElementById(‘import-err’).textContent = ‘❌ Invalid JSON! Check the data.’;
playSound(‘error’); return;
}
if (typeof parsed !== ‘object’ || Array.isArray(parsed)) {
document.getElementById(‘import-err’).textContent = ‘❌ Invalid format. Must be player data object.’;
return;
}
// Validate structure
for (const [k,v] of Object.entries(parsed)) {
if (typeof v.exp !== ‘number’ || !Array.isArray(v.days)) {
document.getElementById(‘import-err’).textContent = `❌ Invalid player data for "${k}"`;
return;
}
}
if (mode === ‘replace’) {
ALL_PLAYERS = parsed;
} else {
// Merge: keep existing, add new
for (const [k,v] of Object.entries(parsed)) {
if (!ALL_PLAYERS[k]) ALL_PLAYERS[k] = v;
}
}
savePlayers();
closeModal();
renderPlayerList();
showToast(`✅ Import successful! (${Object.keys(parsed).length} players)`);
playSound(‘achievement’);
if (SESSION.currentPlayer && !ALL_PLAYERS[SESSION.currentPlayer]) {
goToSplash();
} else {
renderTab(‘dashboard’);
updateTopBar();
}
}

/* ═══════════════════════════════════════════════════════════════════
20. VISUAL FX
═══════════════════════════════════════════════════════════════════ */

let _toastTimeout;
function showToast(msg) {
const t = document.getElementById(‘toast’);
t.textContent = msg; t.classList.add(‘show’);
clearTimeout(_toastTimeout);
_toastTimeout = setTimeout(() => t.classList.remove(‘show’), 2300);
}

let _achTimeout;
function showAchievementToast(a) {
const t = document.getElementById(‘achievement-toast’);
t.innerHTML = `${a.icon} Achievement: <strong>${a.name}</strong>`;
t.classList.add(‘show’);
clearTimeout(_achTimeout);
_achTimeout = setTimeout(() => t.classList.remove(‘show’), 3000);
}

function showLevelUp(emoji, title, msg) {
document.getElementById(‘lu-emoji’).textContent = emoji;
document.getElementById(‘lu-title’).textContent = title;
document.getElementById(‘lu-msg’).textContent = msg;
document.getElementById(‘levelup-overlay’).classList.add(‘show’);
}
function closeLevelUp() { document.getElementById(‘levelup-overlay’).classList.remove(‘show’); }

function spawnConfetti(count = 40) {
const colors = [’#FF6B00’,’#FFD600’,’#00E676’,’#00C2FF’,’#B44FFF’,’#FF3D5A’];
for (let i = 0; i < count; i++) {
const el = document.createElement(‘div’);
el.className = ‘confetti’;
el.style.cssText = `left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;animation-duration:${1.2+Math.random()*2}s;animation-delay:${Math.random()*0.6}s;`;
document.body.appendChild(el);
setTimeout(() => el.remove(), 3500);
}
}
