<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Basketball Power Up v3</title>
<style>
/* BUG FIX: @import MUST be the very first rule in a CSS block */
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@700;800;900&display=swap');

/* ===== DESIGN TOKENS ===== */
:root {
–or: #FF6B00; –orl: #FF9A3C; –ye: #FFD600;
–dk: #0D0D1A; –dkr: #080810; –cd: #161628; –cd2: #1E1E35;
–bl: #00C2FF; –gr: #00E676; –pu: #B44FFF; –rd: #FF3D5A;
–tx: #F0F0FF; –mu: #8888AA;
–radius: 14px; –tr: 0.22s cubic-bezier(.4,0,.2,1);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
font-family:‘Nunito’,system-ui,-apple-system,sans-serif;
background:var(–dkr); color:var(–tx); min-height:100vh; overflow-x:hidden;
background-image:
radial-gradient(ellipse 90% 50% at 50% -10%, rgba(255,107,0,.12) 0%, transparent 60%),
url(“data:image/svg+xml,%3Csvg width=‘60’ height=‘60’ viewBox=‘0 0 60 60’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cg fill=’%23ffffff’ fill-opacity=‘0.018’%3E%3Cpath d=‘M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z’/%3E%3C/g%3E%3C/svg%3E”);
}
.ff { font-family:‘Black Han Sans’,‘Arial Black’,Impact,sans-serif; }

/* ===== SPLASH / LOGIN ===== */
#splash {
display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
min-height:100vh; padding:2rem 1.5rem; text-align:center; position:relative;
overflow-x:hidden; overflow-y:auto;
}
.splash-step { width:100%; max-width:400px; margin:auto; padding-bottom:1rem; }
.splash-ring { position:absolute; border-radius:50%; border:1px solid rgba(255,107,0,.07); pointer-events:none; }
.splash-ball { font-size:4rem; animation:bounce 1.3s ease-in-out infinite; filter:drop-shadow(0 0 28px rgba(255,107,0,.7)); margin-bottom:.5rem; }
.splash-title {
font-family:‘Black Han Sans’,Impact,sans-serif;
font-size:clamp(2rem,9vw,4rem); line-height:1; letter-spacing:-1px; margin-bottom:.3rem;
background:linear-gradient(135deg,var(–or),var(–ye),var(–or)); background-size:200%;
-webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3s linear infinite;
}
.splash-sub { font-size:.85rem; color:var(–mu); letter-spacing:3px; text-transform:uppercase; font-weight:800; margin-bottom:1.2rem; }
.splash-stl { font-size:.7rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(–orl); margin-bottom:.75rem; }
.player-list { display:flex; flex-direction:column; gap:.5rem; margin-bottom:1rem; }
.player-btn {
display:flex; align-items:center; gap:.8rem;
background:var(–cd); border:1px solid rgba(255,255,255,.07); border-radius:var(–radius);
padding:.9rem 1rem; cursor:pointer; transition:all var(–tr); text-align:left; width:100%; color:var(–tx);
}
.player-btn:hover { border-color:var(–or); background:rgba(255,107,0,.08); }
.player-btn-av { width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.player-btn-info { flex:1; }
.player-btn-name { font-weight:900; font-size:1rem; }
.player-btn-stats { font-size:.72rem; color:var(–mu); font-weight:700; margin-top:.1rem; }
.role-grid { display:grid; grid-template-columns:1fr 1fr; gap:.75rem; margin-bottom:1rem; }
.role-card {
background:var(–cd); border:2px solid rgba(255,255,255,.07); border-radius:18px;
padding:1.5rem 1rem; cursor:pointer; transition:all var(–tr); text-align:center;
}
.role-card:hover { transform:translateY(-3px); }
.role-card.father:hover { border-color:var(–or); background:rgba(255,107,0,.08); }
.role-card.child:hover { border-color:var(–bl); background:rgba(0,194,255,.08); }
.role-icon { font-size:2.8rem; margin-bottom:.5rem; }
.role-name { font-weight:900; font-size:1.05rem; margin-bottom:.25rem; }
.role-desc { font-size:.72rem; color:var(–mu); font-weight:700; }
.pwd-input {
width:100%; padding:1rem; background:var(–cd); border:2px solid rgba(255,255,255,.1);
border-radius:var(–radius); color:var(–tx); font-size:1.5rem; font-weight:900;
text-align:center; letter-spacing:.5rem; font-family:monospace; outline:none;
transition:border-color var(–tr); margin-bottom:1rem;
}
.pwd-input:focus { border-color:var(–or); }
.pwd-error { color:var(–rd); font-size:.85rem; font-weight:700; margin-bottom:.7rem; min-height:1.2em; }
.new-player-input {
width:100%; padding:.9rem 1rem; background:var(–cd); border:2px solid rgba(255,255,255,.08);
border-radius:var(–radius); color:var(–tx); font-size:1rem; font-weight:800;
font-family:inherit; outline:none; transition:border-color var(–tr); margin-bottom:.75rem;
}
.new-player-input:focus { border-color:var(–or); }

/* ===== BUTTONS ===== */
.btn {
display:block; width:100%; padding:.95rem 1rem; border:none; border-radius:var(–radius);
font-family:inherit; font-weight:900; font-size:1rem; cursor:pointer;
transition:all var(–tr); text-align:center;
}
.btn:active { transform:scale(.97); }
.btn-primary { background:linear-gradient(135deg,var(–or),var(–orl)); color:#fff; box-shadow:0 6px 24px rgba(255,107,0,.35); }
.btn-primary:hover { box-shadow:0 10px 32px rgba(255,107,0,.55); transform:translateY(-2px); }
.btn-secondary { background:var(–cd2); color:var(–tx); border:1px solid rgba(255,255,255,.08); }
.btn-secondary:hover { background:var(–cd); }
.btn-success { background:linear-gradient(135deg,var(–gr),#00BFA5); color:#000; }
.btn-success:hover { box-shadow:0 8px 24px rgba(0,230,118,.3); transform:translateY(-2px); }
.btn-danger { background:linear-gradient(135deg,var(–rd),#c62a47); color:#fff; }
.btn-sm { padding:.55rem .9rem; font-size:.8rem; width:auto; display:inline-flex; align-items:center; gap:.3rem; }
.btn-ghost { background:transparent; color:var(–mu); border:1px solid rgba(255,255,255,.08); }
.btn-ghost:hover { color:var(–tx); border-color:rgba(255,255,255,.2); }
.btn-back { display:inline-flex; align-items:center; gap:.4rem; background:none; border:none; color:var(–mu); font-size:.85rem; font-weight:800; cursor:pointer; padding:.5rem 0; transition:color var(–tr); }
.btn-back:hover { color:var(–tx); }

/* ===== TOPBAR ===== */
#topbar {
position:sticky; top:0; z-index:100;
background:rgba(8,8,16,.96); backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,107,0,.18);
padding:.65rem .9rem; display:flex; align-items:center; gap:.6rem;
}
.tb-player { display:flex; align-items:center; gap:.55rem; flex:1; min-width:0; }
.tb-av { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
.tb-info { min-width:0; }
.tb-name { font-weight:900; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tb-lv { font-size:.65rem; color:var(–orl); font-weight:800; }
.tb-right { display:flex; align-items:center; gap:.5rem; flex-shrink:0; }
.coin-pill { display:flex; align-items:center; gap:.3rem; background:var(–cd); border-radius:20px; padding:.28rem .6rem; font-weight:900; font-size:.85rem; border:1px solid rgba(255,214,0,.15); }
.exp-mini { width:72px; }
.exp-mini-lbl { font-size:.55rem; color:var(–mu); font-weight:800; text-transform:uppercase; }
.exp-mini-bar { height:6px; background:var(–cd2); border-radius:3px; overflow:hidden; margin-top:2px; }
.exp-mini-fill { height:100%; background:linear-gradient(90deg,var(–or),var(–ye)); border-radius:3px; transition:width .7s ease; }
.tb-btns { display:flex; gap:.3rem; }
.icon-btn { width:34px; height:34px; border-radius:10px; background:var(–cd); border:1px solid rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:1rem; cursor:pointer; transition:all var(–tr); color:var(–mu); }
.icon-btn:hover { background:var(–cd2); color:var(–tx); }
.role-badge { display:inline-flex; align-items:center; gap:.25rem; padding:.2rem .55rem; border-radius:20px; font-size:.6rem; font-weight:900; letter-spacing:1px; text-transform:uppercase; flex-shrink:0; }
.role-badge.father { background:rgba(255,107,0,.15); color:var(–orl); border:1px solid rgba(255,107,0,.25); }
.role-badge.child { background:rgba(0,194,255,.12); color:var(–bl); border:1px solid rgba(0,194,255,.2); }
/* Sync status dot */
#sync-dot { width:8px; height:8px; border-radius:50%; background:var(–mu); flex-shrink:0; transition:background .4s; }
#sync-dot.syncing { background:var(–ye); animation:pulse 1s ease-in-out infinite; }
#sync-dot.synced { background:var(–gr); }
#sync-dot.error { background:var(–rd); }

/* ===== NAV ===== */
#nav-bar { display:flex; overflow-x:auto; gap:.35rem; padding:.65rem .9rem; background:var(–dk); border-bottom:1px solid rgba(255,255,255,.05); scrollbar-width:none; flex-shrink:0; }
#nav-bar::-webkit-scrollbar { display:none; }
.nav-tab { flex-shrink:0; padding:.45rem .8rem; border-radius:20px; font-weight:900; font-size:.75rem; cursor:pointer; border:none; background:var(–cd2); color:var(–mu); transition:all var(–tr); white-space:nowrap; }
.nav-tab.active { background:var(–or); color:#fff; }
.nav-tab.done { background:rgba(0,230,118,.12); color:var(–gr); }
.nav-tab.done.active { background:var(–gr); color:#000; }

/* ===== CONTENT ===== */
#content { padding:.9rem; padding-bottom:5rem; }
.section-title { font-size:.65rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; color:var(–orl); margin-bottom:.7rem; display:flex; align-items:center; gap:.5rem; }
.section-title::after { content:’’; flex:1; height:1px; background:rgba(255,255,255,.05); }
.card { background:var(–cd); border-radius:18px; padding:1.25rem; border:1px solid rgba(255,255,255,.05); margin-bottom:.8rem; }
.card-glow { border-color:rgba(255,107,0,.2); background:linear-gradient(135deg,rgba(255,107,0,.06),rgba(180,79,255,.04)); }

/* ===== DASHBOARD ===== */
.hero-card { background:linear-gradient(135deg,rgba(255,107,0,.14),rgba(180,79,255,.08)); border:1px solid rgba(255,107,0,.22); border-radius:20px; padding:1.4rem; margin-bottom:.9rem; text-align:center; position:relative; overflow:hidden; }
.hero-card::before { content:‘🏀’; position:absolute; font-size:8rem; opacity:.05; right:-1rem; top:-1rem; pointer-events:none; }
.hero-badge { display:inline-block; background:linear-gradient(135deg,var(–or),var(–ye)); color:#000; font-weight:900; font-size:.7rem; padding:.22rem .7rem; border-radius:20px; letter-spacing:2px; text-transform:uppercase; margin-bottom:.5rem; }
.hero-name { font-family:‘Black Han Sans’,Impact,sans-serif; font-size:2rem; margin-bottom:.2rem; }
.hero-subtitle { color:var(–orl); font-size:.82rem; font-weight:800; margin-bottom:1rem; }
.exp-bar-lbl { display:flex; justify-content:space-between; font-size:.72rem; font-weight:800; color:var(–mu); margin-bottom:.35rem; }
.exp-bar { height:14px; background:rgba(255,255,255,.07); border-radius:7px; overflow:hidden; position:relative; }
.exp-bar-fill { height:100%; background:linear-gradient(90deg,var(–or),var(–ye)); border-radius:7px; transition:width .9s cubic-bezier(.4,0,.2,1); position:relative; }
.exp-bar-fill::after { content:’’; position:absolute; right:0; top:0; bottom:0; width:6px; background:rgba(255,255,255,.5); border-radius:3px; animation:pulse 1.5s ease-in-out infinite; }
.skills-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.55rem; margin-bottom:.9rem; }
.skill-card { background:var(–cd2); border-radius:14px; padding:.85rem .6rem; text-align:center; border:1px solid rgba(255,255,255,.04); transition:transform var(–tr); }
.skill-card:hover { transform:translateY(-2px); }
.skill-icon { font-size:1.7rem; margin-bottom:.25rem; }
.skill-nm { font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:var(–mu); margin-bottom:.35rem; }
.skill-num { font-family:‘Black Han Sans’,Impact,sans-serif; font-size:1.5rem; line-height:1; }
.skill-bar-wrap { height:5px; background:rgba(255,255,255,.07); border-radius:3px; margin-top:.4rem; overflow:hidden; }
.skill-bar { height:100%; border-radius:3px; transition:width .7s ease; }
.stats-trio { display:flex; justify-content:space-around; text-align:center; gap:.5rem; margin-bottom:1rem; }
.stat-big { flex:1; }
.stat-big-num { font-family:‘Black Han Sans’,Impact,sans-serif; font-size:2.3rem; line-height:1; }
.stat-big-lbl { font-size:.65rem; color:var(–mu); font-weight:800; text-transform:uppercase; margin-top:.2rem; }
.progress-bar-wrap { margin-top:1rem; }
.progress-bar { height:10px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,var(–or),var(–ye)); border-radius:5px; transition:width .8s ease; }

/* ===== DAY VIEW ===== */
.day-header { border-radius:18px; padding:1.2rem 1.4rem; margin-bottom:.9rem; position:relative; overflow:hidden; }
.day-header::after { content:attr(data-day); position:absolute; right:.8rem; top:50%; transform:translateY(-50%); font-family:‘Black Han Sans’,Impact,sans-serif; font-size:5rem; color:rgba(255,255,255,.08); pointer-events:none; }
.day-label { font-size:.65rem; font-weight:900; letter-spacing:3px; text-transform:uppercase; opacity:.8; margin-bottom:.2rem; }
.day-title { font-family:‘Black Han Sans’,Impact,sans-serif; font-size:1.65rem; line-height:1.1; }
.day-sub { font-size:.82rem; opacity:.75; margin-top:.2rem; }
.mission-card { background:var(–cd); border-radius:14px; padding:.95rem; margin-bottom:.5rem; display:flex; align-items:center; gap:.8rem; border:1px solid rgba(255,255,255,.05); transition:all var(–tr); cursor:pointer; }
.mission-card.done { background:rgba(0,230,118,.06); border-color:rgba(0,230,118,.2); }
.mission-card:hover:not(.done) { background:rgba(255,255,255,.03); }
.mission-check { width:28px; height:28px; border-radius:8px; border:2px solid rgba(255,255,255,.14); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1rem; transition:all var(–tr); }
.mission-card.done .mission-check { background:var(–gr); border-color:var(–gr); animation:checkPop .3s cubic-bezier(.4,0,.2,1); }
.mission-icon { font-size:1.4rem; }
.mission-info { flex:1; }
.mission-name { font-weight:900; font-size:.92rem; }
.mission-desc { font-size:.73rem; color:var(–mu); margin-top:.12rem; }
.mission-reward { background:rgba(255,214,0,.1); border:1px solid rgba(255,214,0,.2); border-radius:8px; padding:.18rem .5rem; font-size:.68rem; font-weight:900; color:var(–ye); white-space:nowrap; flex-shrink:0; }
.stats-input-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.55rem; margin-bottom:.5rem; }
.stat-group label { display:block; font-size:.62rem; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(–mu); margin-bottom:.28rem; }
.stat-inp { width:100%; padding:.6rem .4rem; background:var(–cd2); border:1px solid rgba(255,255,255,.07); border-radius:10px; color:var(–tx); font-family:inherit; font-weight:900; font-size:1rem; text-align:center; outline:none; transition:border-color var(–tr); }
.stat-inp:focus { border-color:var(–or); box-shadow:0 0 0 3px rgba(255,107,0,.12); }
.stat-inp:disabled { opacity:.45; cursor:not-allowed; }
.stat-unit { font-size:.6rem; color:var(–mu); text-align:center; margin-top:.18rem; }
.stat-delta { font-size:.65rem; font-weight:800; text-align:center; margin-top:.15rem; min-height:1em; }
.dlt-good { color:var(–gr); } .dlt-bad { color:var(–rd); } .dlt-neu { color:var(–mu); }
.pvp-card { background:linear-gradient(135deg,rgba(180,79,255,.12),rgba(0,194,255,.08)); border:1px solid rgba(180,79,255,.22); border-radius:16px; padding:1.1rem; margin-bottom:.55rem; }
.pvp-title { font-family:‘Black Han Sans’,Impact,sans-serif; font-size:1.05rem; margin-bottom:.5rem; }
.pvp-desc { font-size:.82rem; color:var(–mu); margin-bottom:.9rem; }
.pvp-grid { display:grid; grid-template-columns:1fr 1fr; gap:.55rem; }
.pvp-btn { padding:.7rem; border:2px solid transparent; border-radius:12px; font-weight:900; font-size:.9rem; cursor:pointer; transition:all var(–tr); font-family:inherit; }
.pvp-win { background:var(–gr); color:#000; }
.pvp-lose { background:var(–cd2); color:var(–mu); border-color:rgba(255,255,255,.08); }
.pvp-win.sel { box-shadow:0 0 0 3px rgba(0,230,118,.4); transform:scale(1.02); }
.pvp-lose.sel { color:var(–tx); border-color:rgba(255,255,255,.25); }
.pvp-btn:disabled { opacity:.4; cursor:not-allowed; }
.btn-complete { width:100%; padding:.95rem; border:none; border-radius:14px; font-family:‘Black Han Sans’,Impact,sans-serif; font-size:1.25rem; cursor:pointer; transition:all var(–tr); letter-spacing:1px; margin-top:.3rem; background:linear-gradient(135deg,var(–or),var(–orl)); color:#fff; box-shadow:0 6px 20px rgba(255,107,0,.32); }
.btn-complete:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,107,0,.5); }
.btn-complete:disabled { opacity:.45; cursor:not-allowed; transform:none; }
.btn-complete.completed { background:linear-gradient(135deg,var(–gr),#00BFA5); box-shadow:0 6px 20px rgba(0,230,118,.28); cursor:default; }
.edit-bar { display:flex; align-items:center; justify-content:space-between; background:rgba(255,107,0,.07); border:1px solid rgba(255,107,0,.18); border-radius:12px; padding:.6rem .9rem; margin-bottom:.7rem; }
.edit-bar-lbl { font-size:.78rem; font-weight:800; color:var(–orl); }
.locked-tip { font-size:.72rem; color:var(–mu); font-weight:700; text-align:center; margin-top:.3rem; }

/* ===== PROGRESS / CHART ===== */
.chart-card { background:var(–cd); border-radius:16px; padding:1rem; margin-bottom:.8rem; border:1px solid rgba(255,255,255,.05); }
.chart-title { font-weight:900; font-size:.82rem; margin-bottom:.65rem; }
.mini-chart { height:90px; display:flex; align-items:flex-end; gap:3px; padding:0 .3rem; }
.bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bar-val { font-size:.55rem; font-weight:900; color:var(–tx); white-space:nowrap; }
.bar-body { width:100%; border-radius:4px 4px 0 0; min-height:4px; transition:height .6s ease; }
.bar-lbl { font-size:.58rem; color:var(–mu); font-weight:800; }
.day-log-row { display:flex; align-items:center; gap:.75rem; background:var(–cd2); border-radius:12px; padding:.65rem .9rem; margin-bottom:.4rem; }
.day-log-num { width:30px; height:30px; border-radius:8px; background:var(–cd); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:.85rem; flex-shrink:0; }
.day-log-num.done { background:var(–gr); color:#000; }
.day-log-stats { flex:1; font-size:.75rem; color:var(–mu); font-weight:700; }
.day-log-title { font-weight:900; font-size:.85rem; margin-bottom:.1rem; }

/* ===== BADGES ===== */
.badges-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; }
.badge-card { background:var(–cd2); border-radius:14px; padding:.85rem .6rem; text-align:center; border:1px solid rgba(255,255,255,.04); transition:all var(–tr); }
.badge-card.unlocked { background:rgba(255,214,0,.07); border-color:rgba(255,214,0,.28); }
.badge-ico { font-size:2rem; margin-bottom:.28rem; filter:grayscale(1); opacity:.28; transition:all var(–tr); }
.badge-card.unlocked .badge-ico { filter:grayscale(0); opacity:1; }
.badge-nm { font-size:.62rem; font-weight:900; text-transform:uppercase; letter-spacing:.5px; color:var(–mu); }
.badge-card.unlocked .badge-nm { color:var(–ye); }
.badge-ds { font-size:.58rem; color:var(–mu); margin-top:.18rem; }

/* ===== REWARDS ===== */
.reward-card { background:var(–cd); border-radius:16px; padding:1.1rem; margin-bottom:.65rem; border:1px solid rgba(255,255,255,.05); }
.reward-card.redeemed { opacity:.55; }
.reward-card.big { border-color:rgba(255,214,0,.25); background:rgba(255,214,0,.04); }
.reward-card.small { border-color:rgba(0,194,255,.2); background:rgba(0,194,255,.03); }
.reward-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:.6rem; }
.reward-day { font-size:.65rem; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:var(–mu); }
.reward-type-badge { padding:.2rem .6rem; border-radius:20px; font-size:.65rem; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
.reward-type-badge.big { background:rgba(255,214,0,.15); color:var(–ye); }
.reward-type-badge.small { background:rgba(0,194,255,.12); color:var(–bl); }
.reward-items { display:flex; gap:.55rem; margin-bottom:.75rem; flex-wrap:wrap; }

    else if (status === 'synced') sp.textContent = 'Cloud: connected';
    else if (status === 'error') sp.textContent = 'Cloud: offline - using local data';
    else sp.textContent = 'Cloud: connecting...';
  }
}

function fbEndpoint() {
  if (!FB_URL) return null;
  const base = FB_URL.replace(/\/$/, '');
  const auth = FB_SECRET ? '?auth=' + FB_SECRET : '';
  return base + FB_PATH + '.json' + auth;
}

async function syncToFirebase() {
  if (!FB_URL || _isSyncing) return;
  _isSyncing = true;
  setSyncStatus('syncing');
  try {
    const url = fbEndpoint();
    const res = await fetch(url, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(ALL_PLAYERS),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
  } finally {
    _isSyncing = false;
  }
}

async function loadFromFirebase() {
  if (!FB_URL) { setSyncStatus('idle'); return false; }
  setSyncStatus('syncing');
  try {
    const url = fbEndpoint();
    const res = await fetch(url, {method:'GET', headers:{'Accept':'application/json'}});
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data && typeof data === 'object' && !Array.isArray(data) && Object.keys(data).length > 0) {
      // Validate each player entry
      let valid = true;
      for (const [k,v] of Object.entries(data)) {
        if (!v || typeof v.exp !== 'number' || !Array.isArray(v.days)) { valid = false; break; }
      }
      if (valid) {
        // Merge: cloud wins for existing keys, keep any local-only players
        for (const [k,v] of Object.entries(data)) { ALL_PLAYERS[k] = v; }
        localStorage.setItem(LS_KEY, JSON.stringify(ALL_PLAYERS));
        setSyncStatus('synced');
        return true;
      }
    }
    setSyncStatus('synced'); // empty db is valid
    return false;
  } catch(e) {
    setSyncStatus('error');
    return false; // fallback to localStorage (already loaded)
  }
}

/* =============================================================
   PART 4 - GAME LOGIC
============================================================= */
function getPlayer() { return ALL_PLAYERS[SESSION.currentPlayer] || null; }
function isFather() { return SESSION.role === 'father'; }

function getLevel(p) { return Math.min(10, Math.floor((p||getPlayer()).exp / EXP_PER_LV)); }
function getLvTitle(p) { return LEVEL_TITLES[getLevel(p||getPlayer())]; }
function getExpInLv(p) { return (p||getPlayer()).exp % EXP_PER_LV; }
function getExpPct(p) { return (getExpInLv(p||getPlayer()) / EXP_PER_LV) * 100; }
function getSkillLv(p, skill) { return Math.min(10, p.days.filter(d => d.missions[skill]).length); }

function addExp(p, amt) {
  const prev = getLevel(p);
  p.exp += amt;
  updateTopBar();
  if (getLevel(p) > prev) {
    playSound('levelup');
    setTimeout(() => showLevelUp('⚡', 'LEVEL ' + getLevel(p) + '!', 'You are now a ' + getLvTitle(p) + '!'), 600);
  }
}

function addCoins(p, amt) {
  p.coins += amt;
  playSound('coin');
  updateTopBar();
}

function getPrevStat(p, dayNum, skill) {
  for (let i = dayNum-2; i >= 0; i--) {
    const v = parseFloat(p.days[i].stats[skill]);
    if (!isNaN(v) && v > 0) return v;
  }
  return null;
}

function getDeltaHtml(skill, val, prev) {
  if (!val || prev === null || isNaN(parseFloat(val))) return '';
  const cur = parseFloat(val), diff = cur - prev;
  const lowerBetter = skill === 'speed' || skill === 'stamina';
  const good = lowerBetter ? diff < 0 : diff > 0;
  const sign = diff > 0 ? '+' : '';
  const cls = diff === 0 ? 'dlt-neu' : good ? 'dlt-good' : 'dlt-bad';
  const tag = diff === 0 ? '=' : good ? 'RECORD!' : 'lower';
  return '<span class="' + cls + '">' + sign + diff.toFixed(1) + ' ' + tag + '</span>';
}

/* =============================================================
   PART 5 - REWARD SYSTEM
============================================================= */
function calcReward(dayData) {
  const physDone = ['speed','jump','stamina'].filter(s => dayData.missions[s]).length;
  const pvpDone = dayData.pvpResult !== null ? 1 : 0;
  const pct = Math.round((physDone / 3) * 80 + pvpDone * 20);
  if (pct < 70) return {type:'none', pct, gameTime:null, money:null};
  if (pct < 90) return {type:'small', pct, gameTime:'30 min', money:'20.000d'};
  return {type:'big', pct, gameTime:'1 hour', money:'50.000d'};
}

function getUnredeemed(p) {
  return (p.rewards||[]).filter(r => r.type !== 'none' && !r.redeemed);
}

/* =============================================================
   PART 6 - SOUND SYSTEM
============================================================= */
let _audioCtx = null;
function getCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return _audioCtx;
}

function playTone(freq, dur, type, gain) {
  if (!SETTINGS.soundEnabled) return;
  type = type || 'sine'; gain = gain || 0.3;
  try {
    const ctx = getCtx(); if (!ctx) return;
    const osc = ctx.createOscillator();
    const gn = ctx.createGain();
    osc.connect(gn); gn.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gn.gain.setValueAtTime(gain, ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start(); osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

function playSound(type) {
  if (!SETTINGS.soundEnabled) return;
  if (type === 'coin') { playTone(880,.1); setTimeout(()=>playTone(1100,.1),80); }
  else if (type === 'levelup') { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.2),i*120)); }
  else if (type === 'achievement') { [659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,.25,'square',.2),i*100)); }
  else if (type === 'complete') { [523,659,784].forEach((f,i)=>setTimeout(()=>playTone(f,.3,'sine',.25),i*80)); }
  else if (type === 'click') { playTone(440,.05,'square',.1); }
  else if (type === 'record') { playTone(880,.15); setTimeout(()=>playTone(1320,.2),100); }
  else if (type === 'error') { playTone(200,.15,'sawtooth',.2); }
}

function toggleSound() {
  SETTINGS.soundEnabled = !SETTINGS.soundEnabled;
  saveSettings();
  document.getElementById('sound-btn').textContent = SETTINGS.soundEnabled ? '🔊' : '🔇';
  showToast(SETTINGS.soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF');
}

function renderPlayerList() {

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectPlayer(name) {
  if (!ALL_PLAYERS[name]) { showToast('❌ Player not found!'); return; }
  SESSION.currentPlayer = name;
  const greet = document.getElementById('role-greeting');
  if (greet) greet.textContent = 'HEY, ' + name.toUpperCase() + '!';
  showStep('role');
  playSound('click');
}

function createPlayer() {
  const inp = document.getElementById('new-player-name');
  const errEl = document.getElementById('new-player-err');
  const name = inp ? inp.value.trim() : '';
  if (errEl) errEl.textContent = '';
  if (!name) {
    if (errEl) errEl.textContent = '❌ Please enter a player name!';
    if (inp) inp.focus();
    return;
  }
  if (ALL_PLAYERS[name]) {
    if (errEl) errEl.textContent = '❌ Player "' + name + '" already exists!';
    return;
  }
  ALL_PLAYERS[name] = createDefaultPlayer(name);
  savePlayers();
  SESSION.currentPlayer = name;
  if (inp) inp.value = '';
  const greet = document.getElementById('role-greeting');
  if (greet) greet.textContent = 'HEY, ' + name.toUpperCase() + '!';
  showStep('role');
  playSound('click');
}

function loginAsFather() {

function buildNav() {
  const p = getPlayer();

    {id:'dashboard',label:'🏠 Home'},
    {id:'progress',label:'📊 Stats'},

    {id:'rewards',label:'🎁 Rewards'},

  for (let i=0;i<10;i++) tabs.push({id:'day'+(i+1), label:'D'+(i+1), dayIdx:i});

    let cls = 'nav-tab';

    if (SESSION.currentTab === t.id) cls += ' active';

  SESSION.currentTab = id;
  SESSION.editMode = false;

  if (!p) return;
  if (id === 'dashboard') area.innerHTML = buildDashboard(p);

  else if (id === 'badges') area.innerHTML = buildBadges(p);

/* =============================================================
   PART 10 - DAY VIEW
============================================================= */
function buildDayView(p, dayNum) {
  const dayIdx = dayNum - 1;
  const day = p.days[dayIdx];
  const theme = DAY_THEMES[dayIdx];
  const missions = DAY_MISSIONS[dayIdx];
  const done = p.days.filter(d=>d.completed).length;
  const isLocked = dayNum > done + 1;

  if (isLocked) {
    return '<div class="day-header" data-day="' + dayNum + '" style="background:linear-gradient(135deg,#1e1e30,#2a2a3a)">'
      + '<div class="day-label">DAY ' + dayNum + '</div>'
      + '<div class="day-title ff">🔒 LOCKED</div>'
      + '<div style="font-size:.82rem;color:rgba(255,255,255,.5);margin-top:.2rem">Complete Day ' + (dayNum-1) + ' to unlock!</div>'
      + '</div>'
      + '<div style="text-align:center;padding:3rem 1rem;color:var(--mu)">'
      + '<div style="font-size:4rem;margin-bottom:1rem">🔐</div>'
      + '<div style="font-weight:900;font-size:1.1rem;margin-bottom:.4rem">Keep grinding!</div>'
      + '<div style="font-size:.88rem">Finish the previous day to unlock this challenge.</div>'
      + '</div>';
  }

  if (dayNum === 10 && day.completed && !SESSION.editMode) return buildFinalBoss(p);

  const phys = missions.filter(m=>m.id!=='pvp');
  const physDone = phys.filter(m=>day.missions[m.id]).length;
  const pvp = missions.find(m=>m.id==='pvp');
  const canComplete = physDone === phys.length;
  const childLock = !isFather();
  const isDisabled = childLock || (day.completed && !SESSION.editMode);

  let html = '<div class="day-header" data-day="' + dayNum + '" style="background:' + theme.color + '">'
    + '<div class="day-label">' + (dayNum===10?'👑 FINAL BOSS - ':'') + 'DAY ' + dayNum + ' / 10</div>'
    + '<div class="day-title ff">' + theme.title + '</div>'
    + '<div class="day-sub">' + theme.sub + '</div>'
    + '</div>';

  if (day.completed && isFather() && !SESSION.editMode) {
    html += '<div class="edit-bar">'
      + '<span class="edit-bar-lbl">✅ Day completed - ' + new Date(day.completedAt||Date.now()).toLocaleDateString() + '</span>'
      + '<button class="btn btn-sm btn-ghost" onclick="requestEditMode(' + dayNum + ')">✏️ Edit</button>'
      + '</div>';
  }
  if (SESSION.editMode) {
    html += '<div class="edit-bar" style="border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.07)">'
      + '<span class="edit-bar-lbl" style="color:var(--rd)">✏️ EDIT MODE - Changes save automatically</span>'
      + '<button class="btn btn-sm btn-ghost" onclick="exitEditMode(' + dayNum + ')">Done</button>'
      + '</div>';
  }

  html += '<div class="section-title">MISSIONS</div>';
  phys.forEach(m => { html += buildMissionCard(m, day, dayNum, childLock); });

  const statDisabled = isDisabled && !(isFather() && SESSION.editMode);
  html += '<div class="section-title" style="margin-top:.9rem">TODAY\'S STATS</div>'
    + '<div class="card">'
    + '<div class="stats-input-grid">'
    + buildStatInput(p, dayNum, 'speed', '⚡', 'sec', statDisabled)
    + buildStatInput(p, dayNum, 'jump', '🦘', 'cm', statDisabled)
    + buildStatInput(p, dayNum, 'stamina', '🔁', 'min', statDisabled)
    + '</div>'
    + (!isFather() ? '<div class="locked-tip">🔒 Stats entered by Dad</div>' : '')
    + '</div>';

  html += '<div class="section-title">1V1 BATTLE</div>'
    + buildPvpCard(pvp, day, dayNum, childLock);

  if (!day.completed) {
    if (childLock) {
      html += '<button class="btn-complete" onclick="childAction()">🔒 Ask Dad to complete</button>';
    } else if (!canComplete) {
      html += '<button class="btn-complete" onclick="showToast(\'Complete all missions first!\')">⚡ FINISH MISSIONS FIRST</button>';
    } else {
      html += '<button class="btn-complete" onclick="confirmCompleteDay(' + dayNum + ')">🔥 COMPLETE DAY ' + dayNum + '</button>';
    }
  } else {
    html += '<button class="btn-complete completed" disabled>✅ DAY ' + dayNum + ' COMPLETE!</button>';
  }

  return html;
}

function buildMissionCard(m, day, dayNum, childLock) {
  const isDone = !!day.missions[m.id];
  const clickFn = childLock ? 'childAction()' : 'toggleMission(' + dayNum + ',\'' + m.id + '\')';
  return '<div class="mission-card ' + (isDone?'done':'') + '" onclick="' + clickFn + '">'
    + '<div class="mission-check">' + (isDone?'✓':'') + '</div>'
    + '<div class="mission-icon">' + m.icon + '</div>'
    + '<div class="mission-info">'
    + '<div class="mission-name">' + m.name + '</div>'
    + '<div class="mission-desc">' + m.desc + '</div>'
    + '</div>'
    + '<div class="mission-reward">+' + m.exp + ' EXP</div>'
    + '</div>';
}

function buildStatInput(p, dayNum, skill, icon, unit, isDisabled) {
  const day = p.days[dayNum-1];
  const val = day.stats[skill] || '';
  const prev = getPrevStat(p, dayNum, skill);
  const delta = getDeltaHtml(skill, val, prev);
  const labels = {speed:'⚡ Speed', jump:'🦘 Jump', stamina:'🔁 Stamina'};
  return '<div class="stat-group">'
    + '<label>' + labels[skill] + '</label>'
    + '<input type="number" class="stat-inp" data-day="' + dayNum + '" data-skill="' + skill + '"'
    + ' placeholder="0.0" value="' + escHtml(val) + '" step="0.1" min="0"' + (isDisabled?' disabled':'') + '>'
    + '<div class="stat-unit">' + unit + '</div>'
    + '<div class="stat-delta" id="delta-' + dayNum + '-' + skill + '">' + delta + '</div>'
    + '</div>';
}

function buildChart(title, vals, color, lowerBetter) {
  const filt = vals.filter(v=>v!==null);
  if (!filt.length) {
    return '<div class="chart-card"><div class="chart-title">' + title + '</div>'
      + '<div style="text-align:center;color:var(--mu);font-size:.8rem;padding:.75rem">No data yet - complete some days!</div></div>';
  }
  const maxV = Math.max(...filt), minV = Math.min(...filt), range = maxV-minV || 1;
  let bars = '';
  vals.forEach((v,i) => {
    if (v===null) {
      bars += '<div class="bar-wrap"><div style="flex:1"></div><div class="bar-lbl">D' + (i+1) + '</div></div>';
      return;
    }
    // Find previous non-null
    const prevVals = filt.slice(0, filt.indexOf(v));
    const prevV = prevVals.length ? prevVals[prevVals.length-1] : undefined;
    const good = prevV !== undefined && (lowerBetter ? v < prevV : v > prevV);
    const pct = lowerBetter ? 1-(v-minV)/range : (v-minV)/range;
    const h = Math.max(8, Math.min(88, pct*100));
    bars += '<div class="bar-wrap">'
      + '<div class="bar-val">' + v + '</div>'
      + '<div class="bar-body" style="height:' + h + '%;background:' + (good?'var(--gr)':color) + '"></div>'
      + '<div class="bar-lbl">D' + (i+1) + '</div>'
      + '</div>';
  });
  return '<div class="chart-card"><div class="chart-title">' + title + '</div>'
    + '<div class="mini-chart">' + bars + '</div></div>';
}

    + '<div class="reward-header">'
    + '<div class="reward-day">DAY ' + r.dayNum + ' - ' + r.pct + '% completion</div>'
    + (r.type!=='none' ? '<div class="reward-type-badge ' + r.type + '">' + label + '</div>' : '')
    + '</div>';
  if (r.type !== 'none') {
    html += '<div class="reward-items">'
      + (r.gameTime ? '<div class="reward-item">🎮 ' + r.gameTime + ' gaming</div>' : '')
      + (r.money ? '<div class="reward-item">💰 ' + r.money + '</div>' : '')
      + '</div>';
    if (r.redeemed) {
      html += '<div class="reward-status">✅ Redeemed' + (r.redeemedAt ? ' - ' + new Date(r.redeemedAt).toLocaleDateString() : '') + '</div>';
    } else if (isFather()) {

  html += '</div>';
  return html;

============================================================= */
function childAction() { showToast('🔒 Only Dad can do this!'); playSound('error'); }

function toggleMission(dayNum, skill) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer(); if (!p) return;
  const day = p.days[dayNum-1];
  if (day.completed && !SESSION.editMode) return;
  const m = DAY_MISSIONS[dayNum-1].find(m=>m.id===skill);
  if (!m) return;

  if (day.missions[skill]) {
    day.missions[skill] = false;
    p.exp = Math.max(0, p.exp - m.exp);
    p.coins = Math.max(0, p.coins - m.coins);
  } else {
    day.missions[skill] = true;
    addExp(p, m.exp);
    addCoins(p, m.coins);
    playSound('complete');
    spawnConfetti(3);
  }
  checkAchievements(p);
  savePlayers();
  updateTopBar();
  renderTab('day' + dayNum);
}

function setPvpResult(dayNum, result) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer(); if (!p) return;
  const day = p.days[dayNum-1];
  if (day.completed && !SESSION.editMode) return;
  const pvp = DAY_MISSIONS[dayNum-1].find(m=>m.id==='pvp');
  const prev = day.pvpResult;

  if (prev === 'win') { p.exp = Math.max(0,p.exp-pvp.exp); p.coins = Math.max(0,p.coins-pvp.coins); }
  if (prev === 'lose') { p.exp = Math.max(0,p.exp-5); p.coins = Math.max(0,p.coins-5); }

  day.pvpResult = result;
  if (result === 'win') {
    addExp(p, pvp.exp); addCoins(p, pvp.coins);
    showToast('🏆 WIN! +' + pvp.exp + ' EXP +' + pvp.coins + '🪙');
    unlockAchievement(p, 'clutch_player');
    playSound('achievement');
  } else {
    addExp(p, 5); addCoins(p, 5);
    showToast('💪 Good fight! +5 EXP');
    playSound('coin');
  }
  savePlayers();
  renderTab('day' + dayNum);
}

function onStatChange(e) {
  const p = getPlayer(); if (!p) return;
  if (!isFather()) return;
  const dayNum = parseInt(e.target.dataset.day, 10);
  const skill = e.target.dataset.skill;
  const rawVal = (e.target.value || '').trim();
  const val = parseFloat(rawVal);

  if (rawVal !== '' && (isNaN(val) || val < 0)) {
    showToast('❌ Invalid value!'); playSound('error');
    e.target.value = '';
    return;
  }

  const day = p.days[dayNum-1];
  day.stats[skill] = rawVal;

  const prev = getPrevStat(p, dayNum, skill);
  if (rawVal && prev !== null) {
    const lowerBetter = skill==='speed'||skill==='stamina';
    const improved = lowerBetter ? val<prev : val>prev;
    if (improved && !day.recordsAwarded[skill]) {
      day.recordsAwarded[skill] = true;
      addCoins(p, 15);
      playSound('record');
      showToast('🔥 NEW RECORD! +15🪙');
      if (skill==='speed') unlockAchievement(p,'speed_hunter');
      if (skill==='jump') unlockAchievement(p,'jump_booster');
      if (skill==='stamina') unlockAchievement(p,'iron_energy');
      unlockAchievement(p,'record_breaker');
    }
  }

  const deltaEl = document.getElementById('delta-' + dayNum + '-' + skill);
  if (deltaEl) deltaEl.innerHTML = getDeltaHtml(skill, rawVal, prev);
  savePlayers();
}

function requestEditMode(dayNum) {
  showPasswordModal('Enter admin password to edit:', function() {
    SESSION.editMode = true;
    renderTab('day' + dayNum);
  });
}

function exitEditMode(dayNum) {
  SESSION.editMode = false;
  renderTab('day' + dayNum);
}

function confirmCompleteDay(dayNum) {
  if (!isFather()) { childAction(); return; }
  const p = getPlayer(); if (!p) return;
  const day = p.days[dayNum-1];
  const phys = DAY_MISSIONS[dayNum-1].filter(m=>m.id!=='pvp');
  if (!phys.every(m=>day.missions[m.id])) { showToast('❌ Complete all missions first!'); return; }

  const reward = calcReward(day);
  const rewardMsg = reward.type==='none' ? 'No reward this time - try harder tomorrow!'
    : reward.type==='small' ? '🎮 ' + reward.gameTime + ' gaming + 💰 ' + reward.money + ' earned!'
    : '🏆 ' + reward.gameTime + ' gaming + 💰 ' + reward.money + ' - AMAZING!';
  const rewardIcon = reward.type==='big' ? '🏆' : reward.type==='small' ? '⭐' : '💪';

  openModal('<div class="modal-title ff">✅ COMPLETE DAY ' + dayNum + '?</div>'
    + '<div style="text-align:center;margin-bottom:1.2rem">'
    + '<div style="font-size:3rem;margin-bottom:.5rem">' + rewardIcon + '</div>'
    + '<div style="font-weight:900;font-size:1rem;margin-bottom:.4rem">' + reward.pct + '% completion</div>'
    + '<div style="font-size:.88rem;color:var(--mu);font-weight:700">' + rewardMsg + '</div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">'
    + '<button class="btn btn-secondary" onclick="closeModal()">← Back</button>'
    + '<button class="btn btn-primary" onclick="closeModal();completeDay(' + dayNum + ')">Confirm ✓</button>'
    + '</div>');
}

function completeDay(dayNum) {
  if (!isFather()) return;
  const p = getPlayer(); if (!p) return;
  const day = p.days[dayNum-1];

  addExp(p, 20); addCoins(p, 10);
  day.completed = true;
  day.completedAt = Date.now();
  SESSION.editMode = false;

  const reward = calcReward(day);
  reward.dayNum = dayNum;
  reward.redeemed = false;
  reward.redeemedAt = null;
  if (!p.rewards) p.rewards = [];
  p.rewards.push(reward);

  checkAchievements(p);
  savePlayers();
  spawnConfetti(40);
  playSound('complete');

  if (dayNum === 10) {
    unlockAchievement(p, 'champion');
    setTimeout(function() { showLevelUp('👑','CHAMPION!','You completed the 10 Day Challenge! GOAT status achieved!'); }, 800);
  } else {
    setTimeout(function() { showLevelUp('🏀','DAY ' + dayNum + ' DONE!', (reward.type!=='none'?'Reward earned! ':'') + 'Day ' + (dayNum+1) + ' is now unlocked!'); }, 600);
  }
  renderTab('day' + dayNum);
}

/* =============================================================
   PART 17 - ACHIEVEMENTS
============================================================= */
function unlockAchievement(p, id) {
  if (p.achievements[id]) return;
  p.achievements[id] = Date.now();
  const a = ACHIEVEMENTS.find(a=>a.id===id);
  if (a) { savePlayers(); showAchievementToast(a); playSound('achievement'); }
}

function checkAchievements(p) {
  const done = p.days.filter(d=>d.completed).length;
  if (done >= 1) unlockAchievement(p,'first_day');
  if (done >= 5) unlockAchievement(p,'halfway');
  if (done >= 10) unlockAchievement(p,'champion');
  let streak=0, max=0;
  p.days.forEach(d => { if(d.completed){streak++;max=Math.max(max,streak);}else{streak=0;} });
  if (max>=3) unlockAchievement(p,'streak_3');
  if (max>=5) unlockAchievement(p,'streak_5');
}

// Called from modal button for adding player
window._addPlayerFromModal = function() {
  const inp = document.getElementById('modal-new-name');
  const err = document.getElementById('modal-add-err');
  const n = inp ? inp.value.trim() : '';
  if (!n) { if(err) err.textContent = '❌ Enter a name!'; return; }
  if (ALL_PLAYERS[n]) { if(err) err.textContent = '❌ Already exists!'; return; }
  ALL_PLAYERS[n] = createDefaultPlayer(n);
  savePlayers();
  closeModal();
  renderTab('admin');
  showToast('✅ Player added!');
};

function showAddPlayerModal() {
  openModal('<div class="modal-title ff">➕ ADD PLAYER</div>'
    + '<input type="text" class="new-player-input" id="modal-new-name" placeholder="Enter player name..." maxlength="20">'
    + '<div class="pwd-error" id="modal-add-err"></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">'
    + '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-primary" onclick="_addPlayerFromModal()">Create</button>'
    + '</div>');
}

function confirmDelete(name) {
  if (name === SESSION.currentPlayer) { showToast('❌ Cannot delete current player!'); return; }
  openModal('<div class="modal-title ff">🗑 Delete player?</div>'
    + '<div style="text-align:center;margin-bottom:1rem;font-size:1.1rem;font-weight:900">' + escHtml(name) + '</div>'
    + '<div style="text-align:center;color:var(--mu);font-size:.9rem;font-weight:700;margin-bottom:1.2rem">This cannot be undone!</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">'
    + '<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-danger" id="del-confirm-btn">Delete</button>'
    + '</div>');
  // Attach handler after render
  setTimeout(function() {
    const btn = document.getElementById('del-confirm-btn');
    if (btn) btn.onclick = function() {
      delete ALL_PLAYERS[name];
      savePlayers();
      closeModal();
      renderTab('admin');
      showToast('✅ Deleted!');
    };
  }, 20);
}

function confirmResetPlayer() {
  showPasswordModal('Confirm reset with password:', function() {
    const name = SESSION.currentPlayer;
    if (!name) return;
    ALL_PLAYERS[name] = createDefaultPlayer(name);
    savePlayers();
    renderTab('dashboard');
    updateTopBar();
    showToast('🔄 Player data reset!');
  });
}

function switchPlayer(name) {
  if (!ALL_PLAYERS[name]) { showToast('❌ Player not found!'); return; }
  SESSION.currentPlayer = name;
  SESSION.editMode = false;
  SESSION.currentTab = 'dashboard';
  buildNav();
  renderTab('dashboard');
  updateTopBar();
  closeModal();
  showToast('✅ Switched to ' + name);
}

function confirmLogout() {
  openModal('<div class="modal-title ff">⇄ SWITCH PLAYER?</div>'
    + '<div style="text-align:center;color:var(--mu);font-size:.9rem;font-weight:700;margin-bottom:1.2rem">Return to player select screen.</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem">'
    + '<button class="btn btn-secondary" onclick="closeModal()">Stay</button>'
    + '<button class="btn btn-primary" onclick="closeModal();goToSplash()">Switch →</button>'
    + '</div>');
}

function goToSplash() {
  SESSION.currentPlayer = null; SESSION.role = null; SESSION.editMode = false;
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('splash').style.display = '';
  const pwdInp = document.getElementById('login-pwd');
  const pwdErr = document.getElementById('pwd-error');
  if (pwdInp) pwdInp.value = '';
  if (pwdErr) pwdErr.textContent = '';
  renderPlayerList();
  showStep('welcome');
}

function showExportModal() {
  const json = JSON.stringify(ALL_PLAYERS, null, 2);
  openModal('<div class="modal-title ff">📤 EXPORT DATA</div>'
    + '<div style="font-size:.78rem;color:var(--mu);font-weight:700;margin-bottom:.6rem">Copy this JSON and paste it on your other device to sync.</div>'
    + '<textarea class="sync-textarea" id="export-ta" readonly></textarea>'

setTimeout(function() {
const ta = document.getElementById(‘export-ta’);
if (ta) ta.value = json;
const btn = document.getElementById(‘copy-btn’);
if (btn) btn.onclick = function() {
if (ta) {
ta.select(); ta.setSelectionRange(0,99999);
navigator.clipboard.writeText(ta.value)
.then(function() { showToast(‘✅ Copied to clipboard!’); })
.catch(function() { try { document.execCommand(‘copy’); showToast(‘✅ Copied!’); } catch(e) {} });
}
};
}, 30);
}

function showImportModal() {
openModal(’<div class="modal-title ff">📥 IMPORT DATA</div>’
+ ‘<div style="font-size:.78rem;color:var(--mu);font-weight:700;margin-bottom:.6rem">Paste exported JSON here. Choose merge or replace.</div>’
+ ‘<textarea class="sync-textarea" id="import-ta" placeholder="Paste JSON here..."></textarea>’
+ ‘<div id="import-err" style="color:var(--rd);font-size:.78rem;font-weight:700;margin:.4rem 0;min-height:1em"></div>’
+ ‘<div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-top:.3rem">’
+ ‘<button class="btn btn-secondary" onclick="importData(\'merge\')">🔀 Merge</button>’
+ ‘<button class="btn btn-danger" onclick="importData(\'replace\')">♻️ Replace All</button>’
+ ‘</div>’
+ ‘<div style="font-size:.7rem;color:var(--mu);margin-top:.5rem;font-weight:700">Merge: add new players. Replace: overwrite ALL data.</div>’);
}

function importData(mode) {
const ta = document.getElementById(‘import-ta’);
const err = document.getElementById(‘import-err’);
const raw = ta ? ta.value.trim() : ‘’;
if (!raw) { if(err) err.textContent = ‘❌ Paste data first!’; return; }
let parsed;
try { parsed = JSON.parse(raw); } catch(e) {
if(err) err.textContent = ‘❌ Invalid JSON! Check the data.’;
playSound(‘error’); return;
}
if (!parsed || typeof parsed !== ‘object’ || Array.isArray(parsed)) {
if(err) err.textContent = ‘❌ Invalid format.’; return;
}
// Validate
for (const [k,v] of Object.entries(parsed)) {
if (!v || typeof v.exp !== ‘number’ || !Array.isArray(v.days)) {
if(err) err.textContent = ‘❌ Invalid player data for “’ + escHtml(k) + ‘”’; return;
}
}
if (mode === ‘replace’) { ALL_PLAYERS = parsed; }
else { for (const [k,v] of Object.entries(parsed)) { if (!ALL_PLAYERS[k]) ALL_PLAYERS[k] = v; } }
savePlayers();
closeModal();
renderPlayerList();
showToast(‘✅ Import OK! (’ + Object.keys(parsed).length + ’ players)’);
playSound(‘achievement’);
if (SESSION.currentPlayer && ALL_PLAYERS[SESSION.currentPlayer]) {
renderTab(‘dashboard’); updateTopBar();
} else {
goToSplash();
}
}

let _toastTmr;
function showToast(msg) {
const t = document.getElementById(‘toast’);
if (!t) return;
t.textContent = msg; t.classList.add(‘show’);
clearTimeout(_toastTmr);
_toastTmr = setTimeout(function() { t.classList.remove(‘show’); }, 2300);
}

let _achTmr;
function showAchievementToast(a) {
const t = document.getElementById(‘achievement-toast’);
if (!t) return;
t.innerHTML = a.icon + ’ Achievement: <strong>’ + a.name + ‘</strong>’;
t.classList.add(‘show’);
clearTimeout(_achTmr);
_achTmr = setTimeout(function() { t.classList.remove(‘show’); }, 3000);
}

function showLevelUp(emoji, title, msg) {
const el = (id) => document.getElementById(id);
if (el(‘lu-emoji’)) el(‘lu-emoji’).textContent = emoji;
if (el(‘lu-title’)) el(‘lu-title’).textContent = title;
if (el(‘lu-msg’)) el(‘lu-msg’).textContent = msg;
const ov = el(‘levelup-overlay’);
if (ov) ov.classList.add(‘show’);
}
function closeLevelUp() {
const ov = document.getElementById(‘levelup-overlay’);
if (ov) ov.classList.remove(‘show’);
}

function spawnConfetti(count) {
count = count || 40;
const colors = [’#FF6B00’,’#FFD600’,’#00E676’,’#00C2FF’,’#B44FFF’,’#FF3D5A’];
for (let i=0; i<count; i++) {
const el = document.createElement(‘div’);
el.className = ‘confetti’;
el.style.cssText = ‘left:’ + (Math.random()*100) + ‘vw;top:-10px;background:’ + colors[Math.floor(Math.random()*colors.length)] + ‘;width:’ + (4+Math.random()*8) + ‘px;height:’ + (4+Math.random()*8) + ‘px;animation-duration:’ + (1.2+Math.random()*2) + ‘s;animation-delay:’ + (Math.random()*0.6) + ‘s;’;
document.body.appendChild(el);
setTimeout(function() { el.remove(); }, 3500);
}
}

});
ge(‘btn-role-back’).addEventListener(‘click’, function() { showStep(‘welcome’); });
ge(‘btn-login-child’).addEventListener(‘click’, function() { loginAsChild(); });
ge(‘btn-goto-password’).addEventListener(‘click’, function() { showStep(‘password’); });
