<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bảo Lâm Basketball - Final Config</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --primary: #f97316; 
            --accent: #fbbf24; 
            --bg-dark: #0b0f1a; 
            --bg-card: #161e2d; 
            --text-light: #f8fafc; 
            --text-muted: #94a3b8;
            --success: #10b981; 
            --border: #2d3748;
            --bg-item: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg-dark); color: var(--text-light); 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 10px; display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 450px; }
        .hidden { display: none !important; }
        
        .card { 
            background: var(--bg-card); border-radius: 24px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid var(--border); 
            position: relative; overflow: hidden; 
        }
        
        .lvl-badge { 
            background: linear-gradient(135deg, #6366f1, #a855f7); 
            padding: 4px 12px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; 
        }
        .bar { width: 100%; height: 10px; background: var(--bg-item); border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .fill { height: 100%; background: linear-gradient(90deg, var(--accent), #f59e0b); width: 0%; transition: width 0.5s ease; }
        
        .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .day-box { 
            background: var(--bg-item); aspect-ratio: 1; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer; border: 1px solid transparent; transition: 0.2s; 
        }
        .day-box.active { border-color: var(--primary); background: #2d3748; transform: scale(1.05); }
        .day-box.done { background: var(--success); color: white; }
        .day-box.locked { opacity: 0.3; cursor: not-allowed; }

        .task { 
            display: flex; align-items: center; background: var(--bg-item); 
            padding: 12px; border-radius: 14px; margin-bottom: 8px; border: 1px solid transparent; 
        }
        .task.done { background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.2); }
        .task input { width: 20px; height: 20px; margin-right: 12px; }

        .btn { width: 100%; padding: 15px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; margin: 5px 0; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: var(--border); color: white; }
        .btn-outline { background: transparent; border: 1px solid #475569; color: var(--text-muted); }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
        input[type="number"], input[type="password"] { 
            width: 100%; padding: 12px; border-radius: 10px; 
            border: 1px solid var(--border); background: var(--bg-dark); color: white; 
        }
        
        .rank-text { color: var(--accent); font-weight: bold; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH 1: ĐĂNG NHẬP -->
    <div id="view-start" class="card" style="text-align: center; padding: 40px 20px;">
        <div style="font-size: 4rem;">🏀</div>
        <h1 style="margin: 10px 0;">BẢO LÂM <span style="color:var(--primary)">V6 FRESH</span></h1>
        <p style="color:var(--text-muted); margin-bottom: 25px;">Kỷ luật tạo nên sức mạnh</p>
        <button class="btn btn-p" onclick="goView('player')">VÀO XEM TIẾN TRÌNH</button>
        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 25px;">
            <input type="password" id="admin-code" placeholder="Mã PIN..." style="text-align: center; margin-bottom: 10px;">
            <button class="btn btn-s" onclick="checkAdmin()">QUẢN TRỊ VIÊN</button>
        </div>
    </div>

    <!-- MÀN HÌNH 2: ỨNG DỤNG CHÍNH -->
    <div id="view-main" class="hidden">
        <div class="card" style="text-align: center;">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <div class="lvl-badge" id="ui-lvl">LV. 1</div>
                <div class="rank-text">HUYỀN THOẠI</div>
            </div>
            <div class="bar"><div id="ui-exp" class="fill"></div></div>
            <div style="display: flex; justify-content: space-around; margin-top: 10px; background: var(--bg-item); padding: 10px; border-radius: 12px;">
                <span>🪙 <b id="ui-coins">0</b></span>
                <span>🔥 Day <b id="ui-day">1</b>/10</span>
            </div>
        </div>

        <div class="card">
            <div class="day-grid" id="ui-grid"></div>
        </div>

        <div class="card">
            <h3 id="ui-task-title" style="color:var(--primary); font-size: 1rem; margin-bottom: 15px;">🎯 NHIỆM VỤ</h3>
            <div id="ui-tasks"></div>
        </div>

        <div id="admin-panel" class="card hidden" style="border: 1px solid var(--primary);">
            <h3 style="color:var(--primary); margin-bottom: 15px;">⚡ CẬP NHẬT: NGÀY <span id="ui-sel-day">1</span></h3>
            <div class="input-group"><label>Tốc độ 20m (s):</label><input type="number" id="in-s" step="0.1"></div>
            <div class="input-group"><label>Bật nhảy (cm):</label><input type="number" id="in-j"></div>
            <div class="input-group">
                <label>Tỷ số 1v1 (Con : Bố):</label>
                <div style="display: flex; gap: 10px;"><input type="number" id="in-1v1-c"> : <input type="number" id="in-1v1-b"></div>
            </div>
            <div class="input-group"><label>Chạy bền (m):</label><input type="number" id="in-m"></div>
            <button class="btn btn-p" onclick="saveDay()">XÁC NHẬN HOÀN THÀNH</button>
        </div>

        <button class="btn btn-outline" onclick="logout()">🔒 THOÁT RA MÀN HÌNH CHÍNH</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    /* --- 1. CONFIGURATION --- */
    const firebaseConfig = {
        apiKey: "AIzaSyBC9kRXaY1S-XVtMSg5hOkbX7A00GRoAqg",
        authDomain: "baolam-5d687.firebaseapp.com",
        databaseURL: "https://baolam-5d687-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "baolam-5d687",
        storageBucket: "baolam-5d687.firebasestorage.app",
        messagingSenderId: "141003154965",
        appId: "1:141003154965:web:05b03aa3759feb55bcd01c",
        measurementId: "G-8RYCHK9M61"
    };

    const PIANO_PLAN = ["Piano: Trang 1 đầu", "Piano: Xong trang 1", "Piano: Đầu trang 2", "Piano: Xong trang 2", "Piano: Ôn trang 1-2", "Piano: Đầu trang 3", "Piano: Xong trang 3", "Piano: Ghép toàn bài", "Piano: Tăng tốc", "Piano: BIỂU DIỄN"];

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'user_v6_pro');

    /* --- 2. STATE MANAGEMENT --- */
    window.state = { lvl: 1, exp: 0, coins: 0, currentDay: 1, selectedDay: 1, role: 'player', history: {} };

    const initHistory = () => {
        let history = {};
        for(let i=1; i<=10; i++) {
            history[i] = { tasks: [false, false, false, false], s:"", j:"", v1: ["",""], m:"", done: false };
        }
        return history;
    };

    window.syncCloud = () => set(dataRef, { ...window.state, role: 'player' });

    /* --- 3. DATABASE LISTENERS --- */
    onValue(dataRef, (snap) => {
        const data = snap.val();
        if (data) {
            const currentRole = window.state.role;
            const currentSelected = window.state.selectedDay;
            window.state = data;
            window.state.role = currentRole;
            window.state.selectedDay = currentSelected || data.currentDay;
            render();
        } else {
            window.state.history = initHistory();
            window.syncCloud();
        }
    });

    /* --- 4. ACTION HANDLERS --- */
    window.checkAdmin = () => { 
        if(document.getElementById('admin-code').value === "1234") { 
            window.state.role = 'admin'; 
            goView('admin'); 
        } else alert("Sai mã PIN!"); 
    };

    window.goView = (mode) => { 
        if(mode !== 'admin') window.state.role = 'player';
        document.getElementById('view-start').classList.add('hidden'); 
        document.getElementById('view-main').classList.remove('hidden'); 
        render(); 
    };

    window.logout = () => { 
        window.state.role = 'player'; 
        document.getElementById('admin-code').value = "";
        document.getElementById('view-main').classList.add('hidden'); 
        document.getElementById('view-start').classList.remove('hidden'); 
    };

    window.setDay = (day) => { 
        if(day <= window.state.currentDay || window.state.role === 'admin') { 
            window.state.selectedDay = day; 
            render(); 
        } 
    };

    window.toggleT = (day, index) => { 
        if(window.state.role !== 'admin') return;
        window.state.history[day].tasks[index] = !window.state.history[day].tasks[index]; 
        render(); 
        window.syncCloud(); 
    };

    window.saveDay = () => {
        const selDay = window.state.selectedDay; 
        const dayData = window.state.history[selDay];
        
        dayData.s = document.getElementById('in-s').value; 
        dayData.j = document.getElementById('in-j').value;
        dayData.v1 = [document.getElementById('in-1v1-c').value, document.getElementById('in-1v1-b').value];
        dayData.m = document.getElementById('in-m').value;

        if(!dayData.done) {
            dayData.done = true; 
            window.state.exp += 50; 
            window.state.coins += 20000;
            if(window.state.exp >= window.state.lvl * 100) window.state.lvl++;
            if(selDay == window.state.currentDay && window.state.currentDay < 10) window.state.currentDay++;
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
        window.syncCloud(); 
        alert(`Đã lưu dữ liệu Ngày ${selDay}!`);
    };

    /* --- 5. RENDER ENGINE --- */
    window.render = () => {
        const s = window.state; 
        const sel = s.selectedDay;
        const currentDayData = s.history[sel];

        // Header Stats
        document.getElementById('ui-lvl').innerText = `LV. ${s.lvl}`;
        document.getElementById('ui-coins').innerText = s.coins.toLocaleString();
        document.getElementById('ui-day').innerText = s.currentDay;
        document.getElementById('ui-exp').style.width = (s.exp % 100) + "%";
        
        // Day Grid
        const grid = document.getElementById('ui-grid'); 
        grid.innerHTML = "";
        for(let i=1; i<=10; i++){
            const h = s.history[i];
            const classes = `day-box ${h.done?'done':''} ${sel==i?'active':''} ${(i > s.currentDay && s.role !== 'admin')?'locked':''}`;
            grid.innerHTML += `<div class="${classes}" onclick="setDay(${i})">${i}</div>`;
        }

        // Tasks
        if(!currentDayData.v1) currentDayData.v1 = ["",""];
        document.getElementById('ui-task-title').innerText = `🎯 NHIỆM VỤ NGÀY ${sel}`;
        const taskLabels = ["🏀 Thể lực", `🎹 ${PIANO_PLAN[sel-1]}`, "📚 BTVN", `⚔️ 1v1 (Tỉ số: ${currentDayData.v1[0]||0}-${currentDayData.v1[1]||0})` ];
        
        document.getElementById('ui-tasks').innerHTML = taskLabels.map((name, i) => `
            <div class="task ${currentDayData.tasks[i] ? 'done' : ''}" onclick="toggleT(${sel}, ${i})">
                <input type="checkbox" ${currentDayData.tasks[i] ? 'checked' : ''} readonly> 
                <span>${name}</span>
            </div>
        `).join('');

        // Admin Panel Visibility
        const panel = document.getElementById('admin-panel');
        if(s.role === 'admin') {
            panel.classList.remove('hidden');
            document.getElementById('ui-sel-day').innerText = sel;
            document.getElementById('in-s').value = currentDayData.s; 
            document.getElementById('in-j').value = currentDayData.j;
            document.getElementById('in-1v1-c').value = currentDayData.v1[0]; 
            document.getElementById('in-1v1-b').value = currentDayData.v1[1];
            document.getElementById('in-m').value = currentDayData.m;
        } else {
            panel.classList.add('hidden');
        }
    };
</script>
</body>
</html>
