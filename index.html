<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basketball Power Up</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0D0D1A;
  color: white;
  text-align: center;
  padding: 20px;
}
button {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
}
.child { background: #00C2FF; }
.dad { background: #FF6B00; color: white; }
.hidden { display: none; }
</style>
</head>

<body>

<h1>🏀 Basketball Power Up</h1>

<div id="home">
  <button class="child" onclick="loginChild()">Bao Lam</button>
  <button class="dad" onclick="showPwd()">Bo</button>
</div>

<div id="pwdScreen" class="hidden">
  <input type="password" id="pwd" placeholder="Nhap mat khau">
  <br>
  <button onclick="loginDad()">Dang nhap</button>
</div>

<div id="game" class="hidden">
  <h2 id="welcome"></h2>
  <button onclick="addExp()">+ EXP</button>
  <p id="exp">EXP: 0</p>
</div>

<script>
let exp = 0;
const ADMIN_PWD = "141089";

function loginChild() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  document.getElementById("welcome").innerText = "Xin chao Bao Lam";
}

function showPwd() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("pwdScreen").classList.remove("hidden");
}

function loginDad() {
  const pwd = document.getElementById("pwd").value;
  if (pwd === ADMIN_PWD) {
    document.getElementById("pwdScreen").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    document.getElementById("welcome").innerText = "Xin chao Bo";
  } else {
    alert("Sai mat khau");
  }
}

function addExp() {
  exp += 10;
  document.getElementById("exp").innerText = "EXP: " + exp;
}
</script>

</body>
</html>
