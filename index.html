<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Quest 🎮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;700;800;900&display=swap');

/* ═══ DESIGN TOKENS ═══ */
:root {
–dk:  #0B0D1A;
–dk2: #111325;
–cd:  #181B30;
–cd2: #1F2340;
–cd3: #252948;

–or:  #FF6B00; –orl: #FF9A3C;
–ye:  #FFD600; –yel: #FFF176;
–gr:  #00E676; –grd: #00C853;
–bl:  #29B6F6; –bld: #0288D1;
–pu:  #CE93D8; –pud: #AB47BC;
–rd:  #FF5252;
–pi:  #F48FB1;

–bl-acc: var(–bl);
–pi-acc: var(–pi);

–tx:  #F0F4FF;
–mu:  #7B82A8;
–mu2: #5A6080;

–r:  12px;
–r2: 18px;
–r3: 24px;
–tr: .2s cubic-bezier(.4,0,.2,1);

/* player themes */
–bl-g: linear-gradient(135deg,#29B6F6,#0288D1);
–pi-g: linear-gradient(135deg,#F48FB1,#AB47BC);
–or-g: linear-gradient(135deg,#FF6B00,#FF9A3C);
–gr-g: linear-gradient(135deg,#00E676,#00C853);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
font-family:‘Nunito’,system-ui,sans-serif;
background:var(–dk); color:var(–tx);
min-height:100vh; overflow-x:hidden;
background-image:
radial-gradient(ellipse 70% 40% at 20% -10%, rgba(41,182,246,.08) 0%, transparent 55%),
radial-gradient(ellipse 60% 35% at 80% 110%, rgba(244,143,177,.07) 0%, transparent 55%);
}
.ff { font-family:‘Fredoka One’,cursive; }
button { cursor:pointer; font-family:inherit; }

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(–cd3); border-radius:2px; }

/* ════════════════════════════════════════
LOGIN SCREEN
════════════════════════════════════════ */
#login-screen {
min-height:100vh; display:flex; flex-direction:column;
align-items:center; justify-content:center;
padding:2rem 1.5rem; text-align:center;
overflow-y:auto;
}
.login-logo {
font-size:5rem; animation:float 3s ease-in-out infinite;
filter:drop-shadow(0 0 30px rgba(255,107,0,.6));
margin-bottom:.5rem;
}
.login-title {
font-family:‘Fredoka One’,cursive;
font-size:clamp(2.2rem,8vw,3.8rem);
background:linear-gradient(135deg,var(–or),var(–ye));
background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
animation:shimmer 4s linear infinite; line-height:1; margin-bottom:.3rem;
}
.login-sub {
font-size:.8rem; color:var(–mu); letter-spacing:3px;
text-transform:uppercase; font-weight:800; margin-bottom:2.5rem;
}
.player-grid {
display:grid; grid-template-columns:1fr 1fr; gap:.75rem;
width:100%; max-width:380px; margin-bottom:1.2rem;
}
.player-card {
background:var(–cd); border:2px solid rgba(255,255,255,.08);
border-radius:var(–r2); padding:1.4rem 1rem;
cursor:pointer; transition:all var(–tr); text-align:center;
position:relative; overflow:hidden;
}
.player-card::before {
content:’’; position:absolute; inset:0;
opacity:0; transition:opacity var(–tr);
}
.player-card.bl::before { background:linear-gradient(135deg,rgba(41,182,246,.12),rgba(2,136,209,.08)); }
.player-card.pi::before { background:linear-gradient(135deg,rgba(244,143,177,.12),rgba(171,71,188,.08)); }
.player-card:hover { transform:translateY(-4px); }
.player-card.bl:hover { border-color:var(–bl); box-shadow:0 8px 32px rgba(41,182,246,.2); }
.player-card.pi:hover { border-color:var(–pi); box-shadow:0 8px 32px rgba(244,143,177,.2); }
.player-card:hover::before { opacity:1; }
.player-card-av { font-size:3rem; margin-bottom:.45rem; }
.player-card-name { font-family:‘Fredoka One’,cursive; font-size:1.2rem; margin-bottom:.2rem; }
.player-card-role { font-size:.68rem; color:var(–mu); font-weight:700; letter-spacing:1px; text-transform:uppercase; }

.parent-grid {
display:grid; grid-template-columns:1fr 1fr; gap:.6rem; width:100%; max-width:380px;
}
.parent-btn {
display:flex; align-items:center; gap:.6rem; justify-content:center;
background:var(–cd2); border:1px solid rgba(255,255,255,.07);
border-radius:var(–r); padding:.75rem 1rem;
font-weight:800; font-size:.88rem; color:var(–mu);
transition:all var(–tr);
}
.parent-btn:hover { background:var(–cd3); color:var(–tx); border-color:rgba(255,255,255,.15); }
.parent-btn-icon { font-size:1.3rem; }

/* password modal */
.pwd-overlay {
position:fixed; inset:0; z-index:900;
background:rgba(0,0,0,.8); backdrop-filter:blur(8px);
display:flex; align-items:flex-end; justify-content:center;
opacity:0; pointer-events:none; transition:opacity .25s;
}
.pwd-overlay.open { opacity:1; pointer-events:all; }
.pwd-sheet {
background:var(–cd); border-radius:var(–r3) var(–r3) 0 0;
width:100%; max-width:440px; padding:1.5rem 1.3rem 2rem;
transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.pwd-overlay.open .pwd-sheet { transform:translateY(0); }
.pwd-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:0 auto 1.2rem; }
.pwd-title { font-family:‘Fredoka One’,cursive; font-size:1.3rem; text-align:center; margin-bottom:1rem; }
.pwd-input {
width:100%; padding:.9rem 1rem; background:var(–cd2);
border:2px solid rgba(255,255,255,.08); border-radius:var(–r);
color:var(–tx); font-family:monospace; font-size:1.6rem;
font-weight:900; text-align:center; letter-spacing:.6rem;
outline:none; transition:border-color var(–tr); margin-bottom:.75rem;
}
.pwd-input:focus { border-color:var(–or); }
.pwd-err { color:var(–rd); font-size:.82rem; font-weight:800; text-align:center; min-height:1.2em; margin-bottom:.5rem; }
.btn-primary {
width:100%; padding:.9rem; border:none; border-radius:var(–r);
font-family:‘Fredoka One’,cursive; font-size:1.1rem;
background:linear-gradient(135deg,var(–or),var(–orl));
color:#fff; box-shadow:0 6px 20px rgba(255,107,0,.3);
transition:all var(–tr);
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(255,107,0,.45); }
.btn-primary:active { transform:scale(.97); }
.btn-secondary {
width:100%; padding:.8rem; border:1px solid rgba(255,255,255,.1);
border-radius:var(–r); background:transparent;
color:var(–mu); font-weight:800; font-size:.9rem;
transition:all var(–tr); margin-top:.5rem;
}
.btn-secondary:hover { color:var(–tx); border-color:rgba(255,255,255,.25); }

/* ════════════════════════════════════════
TOPBAR
════════════════════════════════════════ */
#topbar {
position:sticky; top:0; z-index:100;
background:rgba(11,13,26,.95); backdrop-filter:blur(14px);
border-bottom:1px solid rgba(255,255,255,.06);
padding:.6rem .9rem; display:flex; align-items:center; gap:.6rem;
}
.tb-av {
width:38px; height:38px; border-radius:50%;
display:flex; align-items:center; justify-content:center;
font-size:1.2rem; flex-shrink:0; border:2px solid rgba(255,255,255,.12);
}
.tb-info { flex:1; min-width:0; }
.tb-name { font-family:‘Fredoka One’,cursive; font-size:1rem; line-height:1.1; }
.tb-sub  { font-size:.62rem; color:var(–mu); font-weight:700; }
.tb-right { display:flex; align-items:center; gap:.45rem; flex-shrink:0; }
.point-pill {
display:flex; align-items:center; gap:.3rem;
background:rgba(255,214,0,.1); border:1px solid rgba(255,214,0,.2);
border-radius:20px; padding:.24rem .65rem;
font-family:‘Fredoka One’,cursive; font-size:.95rem; color:var(–ye);
}
.exp-wrap { width:72px; }
.exp-lbl  { font-size:.5rem; color:var(–mu); font-weight:700; text-transform:uppercase; }
.exp-bar  { height:5px; background:var(–cd3); border-radius:3px; overflow:hidden; margin-top:2px; }
.exp-fill { height:100%; border-radius:3px; transition:width .8s ease; }
.tb-role  {
padding:.2rem .55rem; border-radius:20px; font-size:.58rem;
font-weight:900; text-transform:uppercase; letter-spacing:1px; flex-shrink:0;
}
.tb-role.child-bl { background:rgba(41,182,246,.15); color:var(–bl); border:1px solid rgba(41,182,246,.25); }
.tb-role.child-pi { background:rgba(244,143,177,.15); color:var(–pi); border:1px solid rgba(244,143,177,.25); }
.tb-role.me  { background:rgba(206,147,216,.15); color:var(–pu); border:1px solid rgba(206,147,216,.25); }
.tb-role.dad { background:rgba(255,107,0,.15); color:var(–orl); border:1px solid rgba(255,107,0,.25); }
.icon-btn {
width:32px; height:32px; border-radius:9px; background:var(–cd);
border:1px solid rgba(255,255,255,.07); display:flex; align-items:center;
justify-content:center; font-size:.95rem; transition:all var(–tr); color:var(–mu);
}
.icon-btn:hover { background:var(–cd2); color:var(–tx); }

/* ════════════════════════════════════════
BOTTOM NAV
════════════════════════════════════════ */
#bottom-nav {
position:fixed; bottom:0; left:0; right:0; z-index:100;
background:rgba(11,13,26,.97); backdrop-filter:blur(14px);
border-top:1px solid rgba(255,255,255,.06);
display:flex; align-items:center; justify-content:space-around;
padding:.5rem .5rem .8rem;
}
.bnav-btn {
display:flex; flex-direction:column; align-items:center; gap:.18rem;
flex:1; padding:.3rem; border:none; background:transparent;
color:var(–mu); font-size:.55rem; font-weight:800;
text-transform:uppercase; letter-spacing:.5px; transition:all var(–tr);
}
.bnav-btn.active { color:var(–or); }
.bnav-icon { font-size:1.35rem; transition:transform var(–tr); }
.bnav-btn.active .bnav-icon { transform:scale(1.2); }

/* ════════════════════════════════════════
CONTENT AREA
════════════════════════════════════════ */
#content { padding:.9rem; padding-bottom:5.5rem; }

/* ── SHARED COMPONENTS ── */
.sec {
font-size:.62rem; font-weight:900; letter-spacing:3px;
text-transform:uppercase; color:var(–mu); margin-bottom:.65rem;
display:flex; align-items:center; gap:.5rem;
}
.sec::after { content:’’; flex:1; height:1px; background:rgba(255,255,255,.05); }
.card {
background:var(–cd); border-radius:var(–r2);
padding:1.1rem; border:1px solid rgba(255,255,255,.05); margin-bottom:.75rem;
}

/* progress bar */
.prog-bar { height:8px; background:var(–cd3); border-radius:4px; overflow:hidden; }
.prog-fill { height:100%; border-radius:4px; transition:width .8s ease; }

/* percent badge */
.pct {
display:inline-block; padding:.18rem .55rem; border-radius:20px;
font-size:.68rem; font-weight:900;
}
.pct-fail   { background:rgba(255,82,82,.15);   color:var(–rd); }
.pct-ok     { background:rgba(41,182,246,.15);  color:var(–bl); }
.pct-good   { background:rgba(0,230,118,.15);   color:var(–gr); }
.pct-perfect{ background:linear-gradient(135deg,rgba(255,214,0,.2),rgba(255,107,0,.15)); color:var(–ye); border:1px solid rgba(255,214,0,.3); }

/* ════════════════════════════════════════
DASHBOARD (child)
════════════════════════════════════════ */
.hero-card {
border-radius:20px; padding:1.3rem;
margin-bottom:.9rem; text-align:center;
position:relative; overflow:hidden;
}
.hero-card::before {
content:’’; position:absolute; inset:0;
background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);
}
.hero-avatar  { font-size:3.5rem; margin-bottom:.4rem; }
.hero-name    { font-family:‘Fredoka One’,cursive; font-size:2rem; line-height:1.1; margin-bottom:.2rem; }
.hero-level   { font-size:.72rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; opacity:.7; margin-bottom:.8rem; }
.exp-hero-lbl { display:flex; justify-content:space-between; font-size:.7rem; font-weight:700; color:rgba(255,255,255,.6); margin-bottom:.3rem; }
.exp-hero-bar { height:12px; border-radius:6px; background:rgba(0,0,0,.25); overflow:hidden; }
.exp-hero-fill{ height:100%; border-radius:6px; transition:width .9s ease; }

/* daily progress strip */
.day-strip {
background:var(–cd); border-radius:var(–r2); padding:1rem;
margin-bottom:.75rem;
}
.day-strip-top {
display:flex; align-items:center; justify-content:space-between; margin-bottom:.7rem;
}
.day-strip-title { font-family:‘Fredoka One’,cursive; font-size:1rem; }
.day-strip-date  { font-size:.7rem; color:var(–mu); font-weight:700; }

/* stats row */
.stats-row { display:flex; gap:.5rem; margin-bottom:.75rem; }
.stat-box {
flex:1; background:var(–cd2); border-radius:var(–r);
padding:.75rem .5rem; text-align:center;
}
.stat-box-n { font-family:‘Fredoka One’,cursive; font-size:1.8rem; line-height:1; }
.stat-box-l { font-size:.62rem; color:var(–mu); font-weight:800; text-transform:uppercase; margin-top:.15rem; }

/* ════════════════════════════════════════
TASK CARDS (child view)
════════════════════════════════════════ */
.task-card {
background:var(–cd); border-radius:var(–r2);
padding:.9rem 1rem; margin-bottom:.5rem;
display:flex; align-items:center; gap:.8rem;
border:1px solid rgba(255,255,255,.05);
transition:all var(–tr);
}
.task-card.done  { background:rgba(0,230,118,.05); border-color:rgba(0,230,118,.18); }
.task-card.scored { border-color:rgba(255,214,0,.2); }
.task-status-ico { font-size:1.5rem; flex-shrink:0; }
.task-diff {
width:5px; height:36px; border-radius:3px; flex-shrink:0;
}
.task-info { flex:1; min-width:0; }
.task-name { font-weight:900; font-size:.9rem; margin-bottom:.12rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-desc { font-size:.7rem; color:var(–mu); font-weight:700; }
.task-pts  {
flex-shrink:0; text-align:right;
font-family:‘Fredoka One’,cursive; font-size:1.1rem;
}
.task-pts-lbl { font-size:.58rem; color:var(–mu); font-weight:700; margin-top:.08rem; }
.quality-tag {
font-size:.6rem; font-weight:900; padding:.12rem .45rem;
border-radius:20px; margin-top:.18rem; white-space:nowrap;
}

/* ════════════════════════════════════════
TASK MANAGEMENT (parent)
════════════════════════════════════════ */
.task-manage-card {
background:var(–cd); border-radius:var(–r2);
padding:.9rem 1rem; margin-bottom:.5rem;
border:1px solid rgba(255,255,255,.05);
}
.task-manage-hdr {
display:flex; align-items:flex-start; gap:.7rem; margin-bottom:.55rem;
}
.task-manage-info { flex:1; }
.task-manage-name { font-weight:900; font-size:.92rem; margin-bottom:.12rem; }
.task-manage-meta { font-size:.7rem; color:var(–mu); font-weight:700; display:flex; gap:.55rem; flex-wrap:wrap; }
.task-manage-actions { display:flex; gap:.4rem; }
.btn-sm {
padding:.42rem .75rem; border-radius:9px; font-size:.75rem; font-weight:800;
border:none; transition:all var(–tr);
}
.btn-score { background:rgba(0,230,118,.15); color:var(–gr); }
.btn-score:hover { background:rgba(0,230,118,.25); }
.btn-del   { background:rgba(255,82,82,.1);  color:var(–rd); }
.btn-del:hover { background:rgba(255,82,82,.2); }
.btn-edit  { background:rgba(255,214,0,.1);  color:var(–ye); }
.btn-edit:hover { background:rgba(255,214,0,.2); }
.btn-green-solid { background:var(–gr-g); color:#000; }
.btn-orange-solid { background:var(–or-g); color:#fff; }

/* assignment chips */
.assign-chips { display:flex; gap:.35rem; flex-wrap:wrap; }
.chip {
padding:.18rem .55rem; border-radius:20px; font-size:.62rem; font-weight:900;
white-space:nowrap;
}
.chip-bl { background:rgba(41,182,246,.15); color:var(–bl); border:1px solid rgba(41,182,246,.2); }
.chip-pi { background:rgba(244,143,177,.15); color:var(–pi); border:1px solid rgba(244,143,177,.2); }
.chip-diff-1 { background:rgba(0,230,118,.12); color:var(–gr); }
.chip-diff-2 { background:rgba(41,182,246,.12); color:var(–bl); }
.chip-diff-3 { background:rgba(255,107,0,.12); color:var(–orl); }
.chip-diff-4 { background:rgba(255,82,82,.12); color:var(–rd); }

/* ════════════════════════════════════════
CREATE TASK FORM
════════════════════════════════════════ */
.form-group { margin-bottom:.8rem; }
.form-label { display:block; font-size:.68rem; font-weight:900; text-transform:uppercase; letter-spacing:1px; color:var(–mu); margin-bottom:.35rem; }
.form-input, .form-select, .form-textarea {
width:100%; padding:.75rem .9rem; background:var(–cd2);
border:1px solid rgba(255,255,255,.08); border-radius:var(–r);
color:var(–tx); font-family:inherit; font-weight:700; font-size:.9rem;
outline:none; transition:border-color var(–tr);
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
border-color:var(–or); box-shadow:0 0 0 3px rgba(255,107,0,.1);
}
.form-select { appearance:none; cursor:pointer; }
.form-select option { background:var(–cd2); }
.form-textarea { resize:vertical; min-height:70px; line-height:1.5; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:.6rem; }
.toggle-group { display:flex; gap:.4rem; }
.toggle-opt {
flex:1; padding:.55rem; border-radius:9px; border:2px solid rgba(255,255,255,.08);
background:transparent; color:var(–mu); font-weight:800; font-size:.78rem;
transition:all var(–tr); text-align:center;
}
.toggle-opt.sel-bl { border-color:var(–bl); background:rgba(41,182,246,.12); color:var(–bl); }
.toggle-opt.sel-pi { border-color:var(–pi); background:rgba(244,143,177,.12); color:var(–pi); }
.toggle-opt.sel-or { border-color:var(–or); background:rgba(255,107,0,.12); color:var(–orl); }
.toggle-opt.sel-gr { border-color:var(–gr); background:rgba(0,230,118,.12); color:var(–gr); }

/* ════════════════════════════════════════
SCORE PANEL
════════════════════════════════════════ */
.score-task-info {
background:var(–cd2); border-radius:var(–r); padding:.8rem;
margin-bottom:1rem; border-left:3px solid var(–or);
}
.quality-grid {
display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.9rem;
}
.quality-opt {
padding:.7rem; border:2px solid rgba(255,255,255,.08); border-radius:var(–r);
background:transparent; text-align:center; cursor:pointer; transition:all var(–tr);
}
.quality-opt:hover { border-color:rgba(255,255,255,.2); }
.quality-opt.sel-lazy   { border-color:var(–mu2); background:rgba(123,130,168,.1); color:var(–mu); }
.quality-opt.sel-ok     { border-color:var(–bl); background:rgba(41,182,246,.1); color:var(–bl); }
.quality-opt.sel-good   { border-color:var(–gr); background:rgba(0,230,118,.1); color:var(–gr); }
.quality-opt.sel-great  { border-color:var(–ye); background:rgba(255,214,0,.1); color:var(–ye); }
.quality-opt-name  { font-family:‘Fredoka One’,cursive; font-size:1rem; margin-bottom:.18rem; }
.quality-opt-mult  { font-size:.7rem; font-weight:800; opacity:.75; }
.quality-opt-pts   { font-size:.8rem; font-weight:900; margin-top:.15rem; }
.preview-pts       { text-align:center; padding:.8rem; background:var(–cd2); border-radius:var(–r); }
.preview-pts-num   { font-family:‘Fredoka One’,cursive; font-size:2rem; }

/* ════════════════════════════════════════
REPORT (parent)
════════════════════════════════════════ */
.report-player-card {
border-radius:var(–r2); padding:1.1rem; margin-bottom:.8rem;
border:1px solid rgba(255,255,255,.07);
}
.report-player-hdr {
display:flex; align-items:center; gap:.75rem; margin-bottom:.8rem;
}
.report-av { font-size:2rem; }
.report-player-name { font-family:‘Fredoka One’,cursive; font-size:1.2rem; }
.report-player-sub  { font-size:.7rem; color:var(–mu); font-weight:700; margin-top:.08rem; }
.report-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; }
.report-stat { background:var(–cd2); border-radius:var(–r); padding:.65rem .5rem; text-align:center; }
.report-stat-n { font-family:‘Fredoka One’,cursive; font-size:1.4rem; line-height:1; }
.report-stat-l { font-size:.58rem; color:var(–mu); font-weight:800; text-transform:uppercase; margin-top:.12rem; }

/* pending score row */
.pending-row {
display:flex; align-items:center; gap:.7rem;
background:var(–cd); border-radius:var(–r); padding:.75rem;
margin-bottom:.4rem; border:1px solid rgba(255,255,255,.05);
}
.pending-info { flex:1; }
.pending-name  { font-weight:900; font-size:.88rem; }
.pending-meta  { font-size:.68rem; color:var(–mu); font-weight:700; margin-top:.08rem; }

/* ════════════════════════════════════════
OVERLAY / MODAL
════════════════════════════════════════ */
.overlay-bg {
position:fixed; inset:0; z-index:500;
background:rgba(0,0,0,.75); backdrop-filter:blur(6px);
display:flex; align-items:flex-end; justify-content:center;
opacity:0; pointer-events:none; transition:opacity .25s;
}
.overlay-bg.open { opacity:1; pointer-events:all; }
.overlay-sheet {
background:var(–cd); border-radius:var(–r3) var(–r3) 0 0;
width:100%; max-width:480px; max-height:90vh; overflow-y:auto;
padding:1.4rem 1.2rem 2rem;
transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.overlay-bg.open .overlay-sheet { transform:translateY(0); }
.overlay-handle { width:40px; height:4px; background:rgba(255,255,255,.15); border-radius:2px; margin:0 auto 1.2rem; }
.overlay-title { font-family:‘Fredoka One’,cursive; font-size:1.35rem; margin-bottom:1rem; }

/* ════════════════════════════════════════
LEVEL UP TOAST
════════════════════════════════════════ */
#lu-overlay {
position:fixed; inset:0; z-index:800;
background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center;
opacity:0; pointer-events:none; transition:opacity .3s;
}
#lu-overlay.show { opacity:1; pointer-events:all; }
.lu-card {
background:var(–cd); border-radius:var(–r3);
padding:2.5rem 2rem; text-align:center; max-width:320px; width:90%;
border:2px solid var(–or); box-shadow:0 0 80px rgba(255,107,0,.2);
transform:scale(0); transition:transform .4s cubic-bezier(.4,0,.2,1);
}
#lu-overlay.show .lu-card { transform:scale(1); }
.lu-emoji { font-size:4rem; display:block; margin-bottom:.7rem; animation:float 1s ease-in-out infinite; }
.lu-title { font-family:‘Fredoka One’,cursify; font-size:2rem; background:linear-gradient(135deg,var(–or),var(–ye)); background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; animation:shimmer 3s linear infinite; margin-bottom:.4rem; }
.lu-msg   { color:var(–mu); font-size:.9rem; font-weight:700; margin-bottom:1.4rem; }

/* toast */
#toast {
position:fixed; bottom:5rem; left:50%;
transform:translateX(-50%) translateY(10px);
background:var(–cd); border:1px solid rgba(255,107,0,.25);
border-radius:30px; padding:.55rem 1.1rem;
font-weight:800; font-size:.83rem; z-index:700;
opacity:0; transition:all .3s; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* confetti */
.confetti-pc {
position:fixed; pointer-events:none; z-index:900;
border-radius:2px; animation:cfal linear forwards;
}

/* ════════════════════════════════════════
KEYFRAMES
════════════════════════════════════════ */
@keyframes float   { 0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)} }
@keyframes shimmer { 0%{background-position:0%}100%{background-position:200%} }
@keyframes pop     { 0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)} }
@keyframes cfal    { 0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
@keyframes pulse   { 0%,100%{opacity:.6}50%{opacity:1} }
</style>

</head>
<body>

<!-- ════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════ -->

<div id="login-screen">
  <div class="login-logo">🎮</div>
  <div class="login-title ff">Family Quest</div>
  <div class="login-sub">Hệ thống nhiệm vụ gia đình</div>

  <div class="player-grid">
    <div class="player-card bl" onclick="loginChild('baolam')">
      <div class="player-card-av">🏀</div>
      <div class="player-card-name" style="color:var(--bl)">Bảo Lâm</div>
      <div class="player-card-role">Người chơi 1</div>
    </div>
    <div class="player-card pi" onclick="loginChild('baolinh')">
      <div class="player-card-av">⭐</div>
      <div class="player-card-name" style="color:var(--pi)">Bảo Linh</div>
      <div class="player-card-role">Người chơi 2</div>
    </div>
  </div>

  <div class="parent-grid">
    <button class="parent-btn" onclick="showPwdSheet('me')">
      <span class="parent-btn-icon">👩</span>

</div>

<!-- Password Sheet -->

<div class="pwd-overlay" id="pwd-overlay">
  <div class="pwd-sheet">

    <div class="pwd-title" id="pwd-title">🔐 Nhập mật khẩu</div>
    <input type="password" inputmode="numeric" class="pwd-input" id="pwd-input" placeholder="••••••" maxlength="6" autocomplete="off">

    <button class="btn-primary" onclick="submitPwd()">Xác nhận →</button>

</div>

<!-- ════════════════════════════════════════
     GAME SCREEN
════════════════════════════════════════ -->

<div id="game-screen" style="display:none">
  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-av" id="tb-av">🎮</div>
    <div class="tb-info">
      <div class="tb-name" id="tb-name">-</div>
      <div class="tb-sub"  id="tb-sub">-</div>
    </div>
    <div class="tb-right">
      <div class="point-pill" id="tb-pts" style="display:none">💎 <span id="tb-pts-val">0</span></div>
      <div class="exp-wrap"   id="tb-exp" style="display:none">
        <div class="exp-lbl">EXP</div>
        <div class="exp-bar"><div class="exp-fill" id="tb-exp-fill" style="width:0%"></div></div>
      </div>
      <div class="tb-role" id="tb-role">-</div>
      <div class="icon-btn" id="btn-logout" title="Đăng xuất">⇄</div>
    </div>

  <!-- CONTENT -->

  <div id="content"></div>

  <!-- BOTTOM NAV -->

  <div id="bottom-nav" style="display:none">
    <button class="bnav-btn" id="bnav-home" onclick="renderTab('home')">
      <span class="bnav-icon">🏠</span>Trang chủ
    </button>
    <button class="bnav-btn" id="bnav-tasks" onclick="renderTab('tasks')">
      <span class="bnav-icon">📋</span>Nhiệm vụ
    </button>
    <button class="bnav-btn" id="bnav-report" onclick="renderTab('report')">
      <span class="bnav-icon">📊</span>Báo cáo
    </button>
    <button class="bnav-btn" id="bnav-manage" onclick="renderTab('manage')" style="display:none">
      <span class="bnav-icon">⚙️</span>Quản lý
    </button>
  </div>
</div>

<!-- Main overlay -->

<div class="overlay-bg" id="main-overlay" onclick="overlayBgClick(event)">
  <div class="overlay-sheet">
    <div class="overlay-handle"></div>
    <div id="overlay-body"></div>
  </div>
</div>

<!-- Level up overlay -->

<div id="lu-overlay">
  <div class="lu-card">
    <span class="lu-emoji" id="lu-emoji">⭐</span>
    <div class="lu-title ff" id="lu-title">LEVEL UP!</div>
    <div class="lu-msg"  id="lu-msg">Bạn đã lên cấp!</div>
    <button class="btn-primary" onclick="closeLU()" style="margin-top:.5rem">🎉 Tuyệt vời!</button>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   CONFIG & CONSTANTS
═══════════════════════════════════════════════════════ */
var PWD_ME  = '888330';
var PWD_DAD = '004164';
var LS_KEY  = 'fq_v1_data';

var PLAYERS = {
  baolam:  { name:'Bảo Lâm', avatar:'🏀', theme:'bl', target:110 },
  baolinh: { name:'Bảo Linh', avatar:'⭐', theme:'pi', target:70  },
};

var DIFF_CONFIG = {
  1: { label:'Dễ',    pts:10, exp:5,  color:'var(--gr)',  chip:'chip-diff-1' },
  2: { label:'Trung', pts:20, exp:10, color:'var(--bl)',  chip:'chip-diff-2' },
  3: { label:'Khó',   pts:40, exp:20, color:'var(--orl)', chip:'chip-diff-3' },
  4: { label:'Boss',  pts:80, exp:40, color:'var(--rd)',  chip:'chip-diff-4' },
};

var QUALITY_CONFIG = {
  lazy:  { label:'Qua loa',  mult:0.5, icon:'😑', cls:'sel-lazy'  },
  ok:    { label:'Đạt',      mult:1.0, icon:'👍', cls:'sel-ok'    },
  good:  { label:'Tốt',      mult:1.2, icon:'😊', cls:'sel-good'  },
  great: { label:'Xuất sắc', mult:1.5, icon:'🌟', cls:'sel-great' },
};

var LEVELS = [
  {lv:1, title:'Mầm non',    icon:'🌱', expReq:0   },
  {lv:2, title:'Học trò',    icon:'📚', expReq:50  },
  {lv:3, title:'Chiến binh', icon:'⚔️', expReq:150 },
  {lv:4, title:'Anh hùng',   icon:'🦸', expReq:300 },
  {lv:5, title:'Siêu sao',   icon:'⭐', expReq:500 },
  {lv:6, title:'Huyền thoại',icon:'🔥', expReq:750 },
  {lv:7, title:'Vô địch',    icon:'🏆', expReq:1050},
];

/* ═══════════════════════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════════════════════ */
var DB = { tasks:[], ledger:[], users:{} };

function saveDB() { try { localStorage.setItem(LS_KEY, JSON.stringify(DB)); } catch(e){} }
function loadDB() {
  try {
    var raw = localStorage.getItem(LS_KEY);
    if (raw) { var p = JSON.parse(raw); if (p && p.tasks) DB = p; }
  } catch(e) {}
  if (!DB.users.baolam)  DB.users.baolam  = { points:0, exp:0 };
  if (!DB.users.baolinh) DB.users.baolinh = { points:0, exp:0 };
  if (!DB.tasks)   DB.tasks   = [];
  if (!DB.ledger)  DB.ledger  = [];
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().slice(0,10); }
function formatDate(iso) {
  var d = new Date(iso + 'T00:00:00');
  return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
}

/* ── TASKS ── */
function createTask(data) {
  var t = {
    id: uid(), createdAt: Date.now(),
    title: data.title, desc: data.desc || '',
    difficulty: parseInt(data.difficulty),
    assignedTo: data.assignedTo,   // 'baolam' | 'baolinh' | 'both'
    date: data.date || today(),
    status: 'pending',             // pending | scored
    submissions: {},               // { userId: {quality, pts, exp, scoredBy, scoredAt, note} }
  };
  DB.tasks.unshift(t);
  saveDB();
  return t;
}

function deleteTask(id) {
  DB.tasks = DB.tasks.filter(function(t){ return t.id !== id; });
  saveDB();
}

function scoreTask(taskId, userId, quality, note) {
  var task = DB.tasks.find(function(t){ return t.id === taskId; });
  if (!task) return;

  var cfg   = DIFF_CONFIG[task.difficulty];
  var qcfg  = QUALITY_CONFIG[quality];
  var pts   = Math.round(cfg.pts * qcfg.mult);
  var exp   = cfg.exp; // EXP never multiplied

  task.submissions[userId] = {
    quality: quality, pts: pts, exp: exp,
    scoredBy: SESSION.role, scoredAt: Date.now(), note: note || '',
  };

  // Update user wallet
  DB.users[userId].points += pts;
  DB.users[userId].exp    += exp;

  // Ledger entry
  DB.ledger.push({
    id: uid(), userId: userId, taskId: taskId,
    type:'earn', pts: pts, exp: exp,
    reason: task.title, quality: quality,
    at: Date.now(),
  });

  // Update task status (scored if all assigned users have submission)
  var assigned = getAssignedUsers(task);
  var allScored = assigned.every(function(u){ return task.submissions[u]; });
  if (allScored) task.status = 'scored';

  saveDB();
  checkLevelUp(userId);
  return { pts: pts, exp: exp };
}

function getAssignedUsers(task) {
  if (task.assignedTo === 'both') return ['baolam','baolinh'];
  return [task.assignedTo];
}

function getTasksForUser(userId, date) {
  var d = date || today();
  return DB.tasks.filter(function(t) {
    return t.date === d && getAssignedUsers(t).indexOf(userId) >= 0;
  });
}

/* ── LEVEL ── */
function getLvObj(userId) {
  var exp = DB.users[userId].exp;
  var cur = LEVELS[0];
  for (var i=0;i<LEVELS.length;i++) {
    if (exp >= LEVELS[i].expReq) cur = LEVELS[i];
    else break;
  }
  return cur;
}
function getNextLvObj(userId) {
  var cur = getLvObj(userId);
  return LEVELS[Math.min(cur.lv, LEVELS.length-1)] || null;
}
function getExpInLv(userId) {
  var cur = getLvObj(userId), next = getNextLvObj(userId);
  if (!next || cur.lv === next.lv) return 0;
  return DB.users[userId].exp - cur.expReq;
}
function getExpToNext(userId) {
  var cur = getLvObj(userId), next = getNextLvObj(userId);
  if (!next || cur.lv === next.lv) return 1;
  return next.expReq - cur.expReq;
}
function getExpPct(userId) {
  return Math.min(100, Math.round((getExpInLv(userId)/getExpToNext(userId))*100));
}

var _prevLevels = {};
function checkLevelUp(userId) {
  var prevLv = _prevLevels[userId] || getLvObj(userId).lv;
  var curLv  = getLvObj(userId).lv;
  if (curLv > prevLv) {
    var obj = getLvObj(userId);
    showLU(obj.icon, 'LEVEL UP!', PLAYERS[userId].name + ' đã lên ' + obj.title + '!');
    confetti(50);
  }
  _prevLevels[userId] = curLv;
}

/* ── DAY SCORE % ── */
function calcDayPct(userId, date) {
  var d     = date || today();
  var tasks = getTasksForUser(userId, d);
  if (!tasks.length) return null;

  var maxPts = tasks.reduce(function(a,t){ return a + DIFF_CONFIG[t.difficulty].pts * 1.5; }, 0);
  var earned = tasks.reduce(function(a,t){
    var sub = t.submissions[userId];
    return a + (sub ? sub.pts : 0);
  }, 0);

  return Math.round((earned / maxPts) * 100);
}

function pctClass(pct) {
  if (pct === null) return 'pct-ok';
  if (pct < 50) return 'pct-fail';
  if (pct < 78) return 'pct-ok';
  if (pct < 100) return 'pct-good';
  return 'pct-perfect';
}
function pctLabel(pct) {
  if (pct === null) return '-';
  if (pct < 50) return 'Cần cố gắng';
  if (pct < 78) return 'Đạt';
  if (pct < 100) return 'Tốt!';
  return 'Hoàn hảo! ✨';
}

/* ═══════════════════════════════════════════════════════
   SESSION
═══════════════════════════════════════════════════════ */
var SESSION = { role: null, userId: null, tab: 'home', pwdTarget: null };

function loginChild(userId) {
  SESSION.role = 'child'; SESSION.userId = userId;
  startGameScreen();
}

function loginParent(role) {
  SESSION.role = role; SESSION.userId = null;
  startGameScreen();
}

function startGameScreen() {
  g('login-screen').style.display = 'none';
  g('game-screen').style.display  = 'block';
  updateTopBar();
  setupNav();
  renderTab('home');
}

/* ═══════════════════════════════════════════════════════
   TOPBAR & NAV
═══════════════════════════════════════════════════════ */
function updateTopBar() {
  var r = SESSION.role, uid = SESSION.userId;

  if (r === 'child') {
    var pl = PLAYERS[uid];
    var lv = getLvObj(uid);
    var bgs = { bl:'var(--bl-g)', pi:'var(--pi-g)' };
    g('tb-av').style.background = bgs[pl.theme];
    g('tb-av').textContent = pl.avatar;
    g('tb-name').textContent = pl.name;
    g('tb-sub').textContent  = lv.icon + ' Lv.' + lv.lv + ' ' + lv.title;
    g('tb-pts-val').textContent = DB.users[uid].points;
    g('tb-pts').style.display = 'flex';
    g('tb-exp').style.display = 'block';
    g('tb-exp-fill').style.width = getExpPct(uid) + '%';
    g('tb-exp-fill').style.background = pl.theme === 'bl' ? 'linear-gradient(90deg,var(--bl),var(--gr))' : 'linear-gradient(90deg,var(--pi),var(--pu))';
    g('tb-role').textContent = '🏀 Player';
    g('tb-role').className   = 'tb-role child-' + pl.theme;
  } else if (r === 'me') {
    g('tb-av').style.background = 'linear-gradient(135deg,var(--pu),var(--pi))';
    g('tb-av').textContent = '👩';
    g('tb-name').textContent = 'Mẹ';
    g('tb-sub').textContent  = 'Chấm điểm & theo dõi';
    g('tb-pts').style.display = 'none';
    g('tb-exp').style.display = 'none';
    g('tb-role').textContent = '⭐ Mẹ';
    g('tb-role').className   = 'tb-role me';
  } else {
    g('tb-av').style.background = 'linear-gradient(135deg,var(--or),var(--orl))';
    g('tb-av').textContent = '👨';
    g('tb-name').textContent = 'Bố';
    g('tb-sub').textContent  = 'Quản lý hệ thống';
    g('tb-pts').style.display = 'none';
    g('tb-exp').style.display = 'none';
    g('tb-role').textContent = '🔧 Admin';
    g('tb-role').className   = 'tb-role dad';
  }
}

function setupNav() {
  var r = SESSION.role;
  g('bottom-nav').style.display = 'flex';

  // show/hide manage tab
  var manageBtn = g('bnav-manage');
  manageBtn.style.display = (r === 'dad') ? '' : 'none';

  // tasks tab label
  g('bnav-tasks').querySelectorAll('.bnav-icon')[0].textContent = (r === 'child') ? '📋' : '✅';
  var lbl = g('bnav-tasks').lastChild;
  lbl.textContent = (r === 'child') ? 'Nhiệm vụ' : 'Chấm điểm';
}

function renderTab(tab) {
  SESSION.tab = tab;
  ['home','tasks','report','manage'].forEach(function(t) {
    var btn = g('bnav-' + t);
    if (btn) btn.classList.toggle('active', t === tab);
  });

  var area = g('content');
  if      (tab === 'home')   area.innerHTML = buildHome();
  else if (tab === 'tasks')  area.innerHTML = buildTasks();
  else if (tab === 'report') area.innerHTML = buildReport();
  else if (tab === 'manage') area.innerHTML = buildManage();
}

/* ═══════════════════════════════════════════════════════
   HOME TAB
═══════════════════════════════════════════════════════ */
function buildHome() {
  var r = SESSION.role;
  if (r === 'child')  return buildChildHome();
  if (r === 'me')     return buildParentHome('me');
  return buildParentHome('dad');
}

/* ── Child Home ── */
function buildChildHome() {
  var uid  = SESSION.userId;
  var pl   = PLAYERS[uid];
  var lv   = getLvObj(uid);
  var nxtlv= getNextLvObj(uid);
  var user = DB.users[uid];
  var pct  = calcDayPct(uid);
  var tasks= getTasksForUser(uid, today());

  var themeColor = pl.theme === 'bl'
    ? 'linear-gradient(135deg,rgba(41,182,246,.15),rgba(2,136,209,.08))'
    : 'linear-gradient(135deg,rgba(244,143,177,.15),rgba(171,71,188,.08))';
  var themeBdr = pl.theme === 'bl' ? 'rgba(41,182,246,.25)' : 'rgba(244,143,177,.25)';
  var expGrad  = pl.theme === 'bl' ? 'linear-gradient(90deg,var(--bl),var(--gr))' : 'linear-gradient(90deg,var(--pi),var(--pu))';
  var accentCol= pl.theme === 'bl' ? 'var(--bl)' : 'var(--pi)';

  var html = '<div class="hero-card" style="background:' + themeColor + ';border:1px solid ' + themeBdr + ';margin-bottom:.9rem">'
    + '<div class="hero-avatar">' + pl.avatar + '</div>'
    + '<div class="hero-name" style="color:' + accentCol + '">' + pl.name + '</div>'
    + '<div class="hero-level">' + lv.icon + ' Lv.' + lv.lv + ' - ' + lv.title + '</div>'
    + '<div class="exp-hero-lbl"><span>EXP ' + getExpInLv(uid) + ' / ' + getExpToNext(uid) + '</span>'
    + (nxtlv && nxtlv.lv !== lv.lv ? '<span>Lv.' + nxtlv.lv + ' ' + nxtlv.icon + ' tiếp theo</span>' : '<span>MAX LEVEL 🔥</span>')
    + '</div>'
    + '<div class="exp-hero-bar"><div class="exp-hero-fill" style="width:' + getExpPct(uid) + '%;background:' + expGrad + '"></div></div>'
    + '</div>';

  // stats row
  html += '<div class="stats-row">'
    + statBox('💎', user.points, 'Điểm', 'var(--ye)')
    + statBox('⚡', user.exp,    'EXP',  accentCol)
    + statBox('📋', tasks.length, 'Nhiệm vụ', 'var(--mu)')
    + '</div>';

  // today's progress
  html += '<div class="sec">HÔM NAY - ' + formatDate(today()) + '</div>';
  if (pct !== null) {
    var pcls = pctClass(pct);
    html += '<div class="day-strip">'
      + '<div class="day-strip-top">'
      + '<div class="day-strip-title">📅 Tiến độ hôm nay</div>'
      + '<span class="pct ' + pcls + '">' + pct + '% - ' + pctLabel(pct) + '</span>'
      + '</div>'
      + '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%;background:' + (pct >= 78 ? 'linear-gradient(90deg,var(--gr),var(--grd))' : 'linear-gradient(90deg,var(--or),var(--ye))') + '"></div></div>'
      + '</div>';
  }

  // recent tasks (top 3)
  if (tasks.length) {
    html += tasks.slice(0,3).map(function(t){ return buildTaskCard(t, uid); }).join('');
    if (tasks.length > 3) {
      html += '<div style="text-align:center;padding:.6rem;font-size:.8rem;color:var(--mu);font-weight:700;cursor:pointer" onclick="renderTab(\'tasks\')">'
        + 'Xem thêm ' + (tasks.length-3) + ' nhiệm vụ →</div>';
    }
  } else {
    html += emptyState('📭', 'Chưa có nhiệm vụ hôm nay', 'Bố sẽ giao nhiệm vụ sớm thôi!');
  }

  return html;
}

function statBox(icon, val, lbl, color) {

/* ── Child Tasks ── */
function buildChildTasks() {
  var uid   = SESSION.userId;
  var tasks = getTasksForUser(uid, today());
  var pct   = calcDayPct(uid);

  var html = '<div class="sec">NHIỆM VỤ HÔM NAY - ' + formatDate(today()) + '</div>';

  if (pct !== null) {
    var pcls = pctClass(pct);
    html += '<div class="day-strip" style="margin-bottom:.75rem">'
      + '<div class="day-strip-top"><div class="day-strip-title">% Hoàn thành</div>'
      + '<span class="pct ' + pcls + '">' + pct + '%</span></div>'
      + '<div class="prog-bar" style="margin-top:.35rem"><div class="prog-fill" style="width:' + pct + '%;background:linear-gradient(90deg,var(--gr),var(--grd))"></div></div>'
      + '</div>';
  }

  if (!tasks.length) {
    return html + emptyState('📭','Chưa có nhiệm vụ hôm nay','Bố sẽ giao nhiệm vụ sớm!');
  }

  var done    = tasks.filter(function(t){ return t.submissions[uid]; }).length;
  var pending = tasks.filter(function(t){ return !t.submissions[uid]; });
  var scored  = tasks.filter(function(t){ return  t.submissions[uid]; });

  if (pending.length) {
    html += '<div class="sec">CHƯA HOÀN THÀNH (' + pending.length + ')</div>';
    pending.forEach(function(t){ html += buildTaskCard(t, uid); });
  }
  if (scored.length) {
    html += '<div class="sec" style="margin-top:.5rem">ĐÃ CHẤM ĐIỂM (' + scored.length + ')</div>';
    scored.forEach(function(t){ html += buildTaskCard(t, uid); });
  }

  return html;
}

function buildTaskCard(task, userId) {
  var sub   = task.submissions[userId];
  var cfg   = DIFF_CONFIG[task.difficulty];
  var isDone= !!sub;
  var qcfg  = sub ? QUALITY_CONFIG[sub.quality] : null;

  var statusIcon = isDone ? '✅' : '⬜';
  var cardClass  = isDone ? 'task-card scored' : 'task-card';

  return '<div class="' + cardClass + '">'
    + '<span class="task-status-ico">' + statusIcon + '</span>'
    + '<div class="task-diff" style="background:' + cfg.color + '"></div>'
    + '<div class="task-info">'
    + '<div class="task-name">' + h(task.title) + '</div>'
    + '<div class="task-desc">' + h(task.desc || cfg.label + ' - ' + cfg.pts + ' điểm tối đa') + '</div>'
    + (qcfg ? '<span class="quality-tag" style="background:rgba(255,214,0,.1);color:var(--ye)">' + qcfg.icon + ' ' + qcfg.label + '</span>' : '')
    + '</div>'
    + '<div class="task-pts">'
    + '<div style="color:' + (isDone?'var(--gr)':'var(--ye)') + '">' + (isDone ? sub.pts : cfg.pts * 1.5) + '</div>'
    + '<div class="task-pts-lbl">' + (isDone ? 'điểm nhận' : 'điểm tối đa') + '</div>'
    + (isDone ? '<div class="task-pts-lbl" style="color:var(--bl)">+' + sub.exp + ' EXP</div>' : '')
    + '</div>'
    + '</div>';
}

/* ── Score Panel (parent) ── */
function buildScorePanel() {
  var today_ = today();
  var allTasks = DB.tasks.filter(function(t){ return t.date === today_; });
  var pending  = allTasks.filter(function(t){
    return getAssignedUsers(t).some(function(u){ return !t.submissions[u]; });
  });
  var done = allTasks.filter(function(t){
    return getAssignedUsers(t).every(function(u){ return t.submissions[u]; });
  });

  var html = '<div class="sec">CHẤM ĐIỂM HÔM NAY</div>';

  if (pending.length) {
    pending.forEach(function(t) {
      var assigned = getAssignedUsers(t);
      var unscored = assigned.filter(function(u){ return !t.submissions[u]; });
      html += '<div class="task-manage-card">'
        + '<div class="task-manage-hdr">'
        + '<div class="task-manage-info">'
        + '<div class="task-manage-name">' + h(t.title) + '</div>'
        + '<div class="task-manage-meta">'
        + '<span class="chip ' + DIFF_CONFIG[t.difficulty].chip + '">' + DIFF_CONFIG[t.difficulty].label + '</span>'
        + unscored.map(function(u){ return '<span class="chip chip-' + PLAYERS[u].theme + '">' + PLAYERS[u].avatar + ' ' + PLAYERS[u].name + '</span>'; }).join('')
        + '</div>'
        + '</div>'
        + '<button class="btn-sm btn-score" onclick="openScoreSheet(\'' + t.id + '\')">Chấm ✏️</button>'
        + '</div></div>';
    });
  } else {
    html += emptyState('🎉','Tất cả đã được chấm!','Không còn task nào chờ chấm hôm nay.');
  }

  if (done.length) {
    html += '<div class="sec" style="margin-top:.5rem">ĐÃ CHẤM (' + done.length + ')</div>';
    done.forEach(function(t) {
      html += '<div class="task-manage-card" style="opacity:.6">'
        + '<div class="task-manage-name" style="font-size:.88rem">✅ ' + h(t.title) + '</div>'
        + '</div>';

  }

  return html;
}

var pts  = Math.round(basePts * qcfg.mult);
return ‘<div class="quality-opt" id="qopt-' + qk + '" onclick="selectQuality(\'' + qk + '\',' + basePts + ')">’
+ ‘<div class="quality-opt-name">’ + qcfg.icon + ’ ’ + qcfg.label + ‘</div>’
+ ‘<div class="quality-opt-mult">x’ + qcfg.mult + ‘</div>’
+ ‘<div class="quality-opt-pts" style="color:var(--ye)">’ + pts + ’ điểm</div>’
+ ‘</div>’;
}).join(’’);
}

function selectScoringUser(userId) {
_scoringUser = userId;
var unscored = getAssignedUsers(DB.tasks.find(function(t){ return t.id === _scoreTaskId; })).filter(function(u){ return !DB.tasks.find(function(t){ return t.id===_scoreTaskId; }).submissions[u]; });
unscored.forEach(function(u) {
var btn = document.querySelector(’#score-user-tog [onclick=“selectScoringUser('’ + u + ‘')”]’);
if (btn) { btn.className = ’toggle-opt ’ + (u === userId ? ‘sel-’ + PLAYERS[u].theme : ‘’); }
});
_selectedQuality = null;
var task = DB.tasks.find(function(t){ return t.id === _scoreTaskId; });
var cfg  = DIFF_CONFIG[task.difficulty];
var grid = g(‘quality-grid’); if (grid) grid.innerHTML = buildQualityOpts(cfg.pts);
}
window.selectScoringUser = selectScoringUser;

function selectQuality(qk, basePts) {
_selectedQuality = qk;
Object.keys(QUALITY_CONFIG).forEach(function(k) {
var el = g(‘qopt-’ + k);
if (el) el.className = ‘quality-opt’ + (k === qk ? ’ sel-’ + QUALITY_CONFIG[k].cls.replace(‘sel-’,’’) : ‘’);
});
var pts  = Math.round(basePts * QUALITY_CONFIG[qk].mult);
var wrap = g(‘preview-pts-wrap’);
var num  = g(‘preview-pts-num’);
if (wrap) wrap.style.display = ‘block’;
var _previewTask = DB.tasks.find(function(t){return t.id===_scoreTaskId;});
var _previewExp  = _previewTask ? DIFF_CONFIG[_previewTask.difficulty].exp : 0;
if (num)  num.textContent = ‘+’ + pts + ’ diem  +’ + _previewExp + ’ EXP’;
}
window.selectQuality = selectQuality;

function submitScore() {
if (!_selectedQuality) { toast(‘❌ Chọn chất lượng!’); return; }
var note   = (g(‘score-note’).value || ‘’).trim();
var result = scoreTask(_scoreTaskId, _scoringUser, _selectedQuality, note);
closeOverlay();
toast(‘💾 Đã chấm: +’ + result.pts + ’ điểm, +’ + result.exp + ’ EXP’);
updateTopBar();
renderTab(SESSION.tab);
}
window.submitScore = submitScore;

function openScoreAll() { renderTab(‘tasks’); }
window.openScoreAll = openScoreAll;

function confirmDeleteTask(taskId) {
var task = DB.tasks.find(function(t){ return t.id === taskId; });
if (!task) return;
openOverlay(’<div class="overlay-title ff">🗑 Xoá nhiệm vụ?</div>’
+ ‘<div class="score-task-info"><div style="font-weight:900">’ + h(task.title) + ‘</div></div>’
+ ‘<div style="font-size:.85rem;color:var(--mu);font-weight:700;text-align:center;margin-bottom:1.2rem">Hành động này không thể hoàn tác!</div>’
+ ‘<button class="btn-primary" style="background:linear-gradient(135deg,var(--rd),#c62a47)" onclick="doDeleteTask(\'' + taskId + '\')">Xoá</button>’
+ ‘<button class="btn-secondary" onclick="closeOverlay()">Huỷ</button>’);
}
window.confirmDeleteTask = confirmDeleteTask;

function doDeleteTask(taskId) {
deleteTask(taskId);
closeOverlay();
toast(‘🗑 Đã xoá nhiệm vụ’);
renderTab(SESSION.tab);
}
window.doDeleteTask = doDeleteTask;

/* ═══════════════════════════════════════════════════════
PASSWORD FLOW
═══════════════════════════════════════════════════════ */
function showPwdSheet(role) {
SESSION.pwdTarget = role;
g(‘pwd-title’).textContent = role === ‘me’ ? ‘👩 Mẹ - Nhập mật khẩu’ : ‘👨 Bố - Nhập mật khẩu’;
g(‘pwd-input’).value = ‘’;
g(‘pwd-err’).textContent = ‘’;
g(‘pwd-overlay’).classList.add(‘open’);
setTimeout(function(){ g(‘pwd-input’).focus(); }, 350);
}
function closePwdSheet() { g(‘pwd-overlay’).classList.remove(‘open’); }
function submitPwd() {
var val  = g(‘pwd-input’).value;
var role = SESSION.pwdTarget;
var correct = role === ‘me’ ? PWD_ME : PWD_DAD;
if (val === correct) {
closePwdSheet();
loginParent(role);
} else {
g(‘pwd-err’).textContent = ‘❌ Sai mật khẩu. Thử lại!’;
g(‘pwd-input’).value = ‘’;
g(‘pwd-input’).focus();
}
}
window.submitPwd = submitPwd;
window.closePwdSheet = closePwdSheet;

// auto-submit on 6 chars
document.addEventListener(‘input’, function(e) {
if (e.target.id === ‘pwd-input’ && e.target.value.length === 6) submitPwd();
});
document.addEventListener(‘keydown’, function(e) {
if (e.key === ‘Enter’ && g(‘pwd-overlay’).classList.contains(‘open’)) submitPwd();
if (e.key === ‘Escape’) { closePwdSheet(); closeOverlay(); closeLU(); }
});

/* ═══════════════════════════════════════════════════════
LEVEL UP & FX
═══════════════════════════════════════════════════════ */
function showLU(icon, title, msg) {
g(‘lu-emoji’).textContent = icon;
g(‘lu-title’).textContent = title;
g(‘lu-msg’).textContent   = msg;
g(‘lu-overlay’).classList.add(‘show’);
}
function closeLU() { g(‘lu-overlay’).classList.remove(‘show’); }
window.closeLU = closeLU;

var _tt;
function toast(msg) {
var t = g(‘toast’); if (!t) return;
t.textContent = msg; t.classList.add(‘show’);
clearTimeout(_tt); _tt = setTimeout(function(){ t.classList.remove(‘show’); }, 2400);
}

function confetti(n) {
var cols = [’#FF6B00’,’#FFD600’,’#00E676’,’#29B6F6’,’#CE93D8’,’#FF5252’];
for (var i=0;i<n;i++) {
var el = document.createElement(‘div’); el.className = ‘confetti-pc’;
el.style.cssText = ‘left:’ + (Math.random()*100) + ‘vw;top:-10px;background:’ + cols[Math.floor(Math.random()*cols.length)] + ‘;width:’ + (4+Math.random()*8) + ‘px;height:’ + (4+Math.random()*8) + ‘px;animation-duration:’ + (1.5+Math.random()*2) + ‘s;animation-delay:’ + (Math.random()*.5) + ‘s;’;
document.body.appendChild(el);
setTimeout(function(){ el.remove(); }, 4000);
}
}

/* ═══════════════════════════════════════════════════════
MISC HELPERS
═══════════════════════════════════════════════════════ */
function g(id)   { return document.getElementById(id); }
function h(s)    { return String(s).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’); }

function emptyState(ico, title, sub) {
return ‘<div class="card" style="text-align:center;padding:2rem 1rem">’
+ ‘<div style="font-size:2.8rem;margin-bottom:.5rem">’ + ico + ‘</div>’
+ ‘<div style="font-weight:900;font-size:1rem;margin-bottom:.3rem">’ + title + ‘</div>’
+ ‘<div style="font-size:.8rem;color:var(--mu);font-weight:700">’ + sub + ‘</div>’
+ ‘</div>’;
}

/* logout */
g(‘btn-logout’).addEventListener(‘click’, function() {
SESSION.role = null; SESSION.userId = null;
g(‘game-screen’).style.display = ‘none’;
g(‘login-screen’).style.display = ‘flex’;
});

];
