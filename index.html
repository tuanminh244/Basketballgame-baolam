<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Basketball Power Up</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@700;800;900&display=swap');
:root {
  --or:#FF6B00;--orl:#FF9A3C;--ye:#FFD600;
  --dk:#0D0D1A;--dkr:#080810;--cd:#161628;--cd2:#1E1E35;
  --bl:#00C2FF;--gr:#00E676;--pu:#B44FFF;--rd:#FF3D5A;
  --tx:#F0F0FF;--mu:#8888AA;
  --r:14px;--ease:.22s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nunito',system-ui,sans-serif;
  background:var(--dkr);color:var(--tx);min-height:100vh;overflow-x:hidden;
  background-image:radial-gradient(ellipse 90% 50% at 50% -10%,rgba(255,107,0,.12) 0%,transparent 60%);
}
.ff{font-family:'Black Han Sans',Impact,sans-serif;}

/* ── SPLASH ── */
#splash{
min-height:100vh;display:flex;flex-direction:column;
align-items:center;justify-content:center;
padding:2rem 1.5rem;text-align:center;
overflow-x:hidden;overflow-y:auto;
}
.s-ball{font-size:4rem;animation:bounce 1.3s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(255,107,0,.7));margin-bottom:.6rem;}
.s-title{
font-family:‘Black Han Sans’,Impact,sans-serif;
font-size:clamp(2rem,9vw,3.5rem);line-height:1;letter-spacing:-1px;margin-bottom:.3rem;
background:linear-gradient(135deg,var(–or),var(–ye),var(–or));background-size:200%;
-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;
}
.s-sub{font-size:.8rem;color:var(–mu);letter-spacing:3px;text-transform:uppercase;font-weight:800;margin-bottom:1.8rem;}
.s-label{font-size:.7rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(–orl);margin-bottom:.8rem;}

/* 2 big user buttons */
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:380px;}
.user-btn{
background:var(–cd);border:2px solid rgba(255,255,255,.09);border-radius:18px;
padding:1.6rem 1rem;cursor:pointer;transition:all var(–ease);text-align:center;
color:var(–tx);font-family:inherit;
}
.user-btn:hover,.user-btn:active{transform:translateY(-3px);}
.user-btn.child:hover,.user-btn.child:active{border-color:var(–bl);background:rgba(0,194,255,.1);}
.user-btn.dad:hover,.user-btn.dad:active{border-color:var(–or);background:rgba(255,107,0,.1);}
.user-btn-icon{font-size:2.8rem;margin-bottom:.5rem;}
.user-btn-name{font-weight:900;font-size:1.05rem;margin-bottom:.25rem;}
.user-btn-desc{font-size:.7rem;color:var(–mu);font-weight:700;line-height:1.4;}

/* password screen */
#screen-pwd{display:none;width:100%;max-width:380px;}
.pwd-input{
width:100%;padding:1rem;background:var(–cd);border:2px solid rgba(255,255,255,.1);
border-radius:var(–r);color:var(–tx);font-size:1.5rem;font-weight:900;
text-align:center;letter-spacing:.5rem;font-family:monospace;outline:none;
transition:border-color var(–ease);margin-bottom:1rem;
}
.pwd-input:focus{border-color:var(–or);}
.pwd-err{color:var(–rd);font-size:.85rem;font-weight:800;min-height:1.2em;margin-bottom:.6rem;text-align:center;}
.btn-back-link{
background:none;border:none;color:var(–mu);font-size:.85rem;font-weight:800;
cursor:pointer;padding:.5rem 0;margin-bottom:1.2rem;display:block;font-family:inherit;
}
.btn-back-link:hover{color:var(–tx);}

/* ── COMMON BUTTONS ── */
.btn{
display:block;width:100%;padding:.9rem 1rem;border:none;border-radius:var(–r);
font-family:inherit;font-weight:900;font-size:1rem;cursor:pointer;
transition:all var(–ease);text-align:center;
}
.btn:active{transform:scale(.97);}
.btn-pr{background:linear-gradient(135deg,var(–or),var(–orl));color:#fff;box-shadow:0 6px 24px rgba(255,107,0,.35);}
.btn-pr:hover{box-shadow:0 10px 32px rgba(255,107,0,.55);transform:translateY(-2px);}
.btn-sc{background:var(–cd2);color:var(–tx);border:1px solid rgba(255,255,255,.08);}
.btn-sc:hover{background:var(–cd);}
.btn-ok{background:linear-gradient(135deg,var(–gr),#00BFA5);color:#000;}
.btn-ok:hover{box-shadow:0 8px 24px rgba(0,230,118,.3);transform:translateY(-2px);}
.btn-danger{background:linear-gradient(135deg,var(–rd),#c62a47);color:#fff;}
.btn-sm{padding:.5rem .85rem;font-size:.78rem;width:auto;display:inline-flex;align-items:center;gap:.3rem;}
.btn-ghost{background:transparent;color:var(–mu);border:1px solid rgba(255,255,255,.08);}
.btn-ghost:hover{color:var(–tx);}

/* ── TOPBAR ── */
#topbar{
position:sticky;top:0;z-index:100;
background:rgba(8,8,16,.96);backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,107,0,.18);
padding:.6rem .9rem;display:flex;align-items:center;gap:.55rem;
}
.tb-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.tb-info{flex:1;min-width:0;}
.tb-name{font-weight:900;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-lv{font-size:.62rem;color:var(–orl);font-weight:800;}
.tb-right{display:flex;align-items:center;gap:.45rem;flex-shrink:0;}
.coin-pill{display:flex;align-items:center;gap:.28rem;background:var(–cd);border-radius:20px;padding:.25rem .55rem;font-weight:900;font-size:.82rem;border:1px solid rgba(255,214,0,.15);}
.exp-mini{width:68px;}
.exp-mini-lbl{font-size:.52rem;color:var(–mu);font-weight:800;text-transform:uppercase;}
.exp-mini-bar{height:5px;background:var(–cd2);border-radius:3px;overflow:hidden;margin-top:2px;}
.exp-mini-fill{height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:3px;transition:width .7s ease;}
.role-badge{display:inline-flex;align-items:center;gap:.2rem;padding:.18rem .5rem;border-radius:20px;font-size:.58rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
.role-badge.father{background:rgba(255,107,0,.15);color:var(–orl);border:1px solid rgba(255,107,0,.25);}
.role-badge.child{background:rgba(0,194,255,.12);color:var(–bl);border:1px solid rgba(0,194,255,.2);}
.icon-btn{width:32px;height:32px;border-radius:9px;background:var(–cd);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:.95rem;cursor:pointer;transition:all var(–ease);color:var(–mu);}
.icon-btn:hover{background:var(–cd2);color:var(–tx);}

/* ── NAV ── */
#nav-bar{display:flex;overflow-x:auto;gap:.32rem;padding:.6rem .9rem;background:var(–dk);border-bottom:1px solid rgba(255,255,255,.05);scrollbar-width:none;}
#nav-bar::-webkit-scrollbar{display:none;}
.nav-tab{flex-shrink:0;padding:.4rem .75rem;border-radius:20px;font-weight:900;font-size:.73rem;cursor:pointer;border:none;background:var(–cd2);color:var(–mu);transition:all var(–ease);white-space:nowrap;}
.nav-tab.active{background:var(–or);color:#fff;}
.nav-tab.done{background:rgba(0,230,118,.12);color:var(–gr);}
.nav-tab.done.active{background:var(–gr);color:#000;}

/* ── CONTENT ── */
#content{padding:.9rem;padding-bottom:5rem;}
.sec{font-size:.63rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:var(–orl);margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem;}
.sec::after{content:’’;flex:1;height:1px;background:rgba(255,255,255,.05);}
.card{background:var(–cd);border-radius:18px;padding:1.2rem;border:1px solid rgba(255,255,255,.05);margin-bottom:.8rem;}
.card-glow{border-color:rgba(255,107,0,.2);background:linear-gradient(135deg,rgba(255,107,0,.06),rgba(180,79,255,.04));}

/* ── DASHBOARD ── */
.hero{background:linear-gradient(135deg,rgba(255,107,0,.14),rgba(180,79,255,.08));border:1px solid rgba(255,107,0,.22);border-radius:20px;padding:1.3rem;margin-bottom:.9rem;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:‘🏀’;position:absolute;font-size:7rem;opacity:.05;right:-1rem;top:-1rem;pointer-events:none;}
.hero-badge{display:inline-block;background:linear-gradient(135deg,var(–or),var(–ye));color:#000;font-weight:900;font-size:.68rem;padding:.2rem .65rem;border-radius:20px;letter-spacing:2px;text-transform:uppercase;margin-bottom:.45rem;}
.hero-name{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.9rem;margin-bottom:.2rem;}
.hero-sub{color:var(–orl);font-size:.8rem;font-weight:800;margin-bottom:.9rem;}
.exp-lbl{display:flex;justify-content:space-between;font-size:.7rem;font-weight:800;color:var(–mu);margin-bottom:.32rem;}
.exp-bar{height:13px;background:rgba(255,255,255,.07);border-radius:7px;overflow:hidden;}
.exp-fill{height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:7px;transition:width .9s ease;}
.skills-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.52rem;margin-bottom:.9rem;}
.skill-c{background:var(–cd2);border-radius:13px;padding:.8rem .55rem;text-align:center;border:1px solid rgba(255,255,255,.04);}
.skill-icon{font-size:1.65rem;margin-bottom:.22rem;}
.skill-nm{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(–mu);margin-bottom:.3rem;}
.skill-num{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.4rem;line-height:1;}
.skill-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:.35rem;overflow:hidden;}
.skill-fill{height:100%;border-radius:2px;transition:width .7s ease;}
.stats3{display:flex;justify-content:space-around;text-align:center;gap:.5rem;margin-bottom:1rem;}
.stat-big-num{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:2.2rem;line-height:1;}
.stat-big-lbl{font-size:.62rem;color:var(–mu);font-weight:800;text-transform:uppercase;margin-top:.18rem;}
.prog-bar{height:9px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(–or),var(–ye));border-radius:5px;transition:width .8s ease;}

/* ── DAY VIEW ── */
.day-hd{border-radius:18px;padding:1.1rem 1.3rem;margin-bottom:.9rem;position:relative;overflow:hidden;}
.day-hd::after{content:attr(data-day);position:absolute;right:.7rem;top:50%;transform:translateY(-50%);font-family:‘Black Han Sans’,Impact,sans-serif;font-size:4.5rem;color:rgba(255,255,255,.08);pointer-events:none;}
.day-label{font-size:.62rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;opacity:.8;margin-bottom:.18rem;}
.day-title{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.55rem;line-height:1.1;}
.day-sub{font-size:.8rem;opacity:.75;margin-top:.18rem;}
.mission{background:var(–cd);border-radius:13px;padding:.88rem;margin-bottom:.48rem;display:flex;align-items:center;gap:.75rem;border:1px solid rgba(255,255,255,.05);transition:all var(–ease);cursor:pointer;}
.mission.done{background:rgba(0,230,118,.06);border-color:rgba(0,230,118,.2);}
.mission:hover:not(.done){background:rgba(255,255,255,.03);}
.m-check{width:26px;height:26px;border-radius:7px;border:2px solid rgba(255,255,255,.14);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all var(–ease);}
.mission.done .m-check{background:var(–gr);border-color:var(–gr);}
.m-icon{font-size:1.35rem;}
.m-info{flex:1;}
.m-name{font-weight:900;font-size:.9rem;}
.m-desc{font-size:.7rem;color:var(–mu);margin-top:.1rem;}
.m-reward{background:rgba(255,214,0,.1);border:1px solid rgba(255,214,0,.2);border-radius:7px;padding:.15rem .45rem;font-size:.65rem;font-weight:900;color:var(–ye);white-space:nowrap;flex-shrink:0;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.4rem;}
.stat-g label{display:block;font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(–mu);margin-bottom:.25rem;}
.stat-inp{width:100%;padding:.55rem .35rem;background:var(–cd2);border:1px solid rgba(255,255,255,.07);border-radius:9px;color:var(–tx);font-family:inherit;font-weight:900;font-size:.95rem;text-align:center;outline:none;transition:border-color var(–ease);}
.stat-inp:focus{border-color:var(–or);}
.stat-inp:disabled{opacity:.4;cursor:not-allowed;}
.stat-unit{font-size:.58rem;color:var(–mu);text-align:center;margin-top:.15rem;}
.stat-delta{font-size:.62rem;font-weight:800;text-align:center;margin-top:.12rem;min-height:.9em;}
.dg{color:var(–gr);}.db{color:var(–rd);}.dn{color:var(–mu);}
.pvp-c{background:linear-gradient(135deg,rgba(180,79,255,.12),rgba(0,194,255,.08));border:1px solid rgba(180,79,255,.22);border-radius:15px;padding:1rem;margin-bottom:.5rem;}
.pvp-t{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1rem;margin-bottom:.45rem;}
.pvp-d{font-size:.8rem;color:var(–mu);margin-bottom:.85rem;}
.pvp-grid{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;}
.pvp-btn{padding:.65rem;border:2px solid transparent;border-radius:11px;font-weight:900;font-size:.88rem;cursor:pointer;transition:all var(–ease);font-family:inherit;}
.pvp-win{background:var(–gr);color:#000;}
.pvp-lose{background:var(–cd2);color:var(–mu);border-color:rgba(255,255,255,.08);}
.pvp-win.sel{box-shadow:0 0 0 3px rgba(0,230,118,.4);transform:scale(1.02);}
.pvp-lose.sel{color:var(–tx);border-color:rgba(255,255,255,.25);}
.pvp-btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-complete{width:100%;padding:.9rem;border:none;border-radius:13px;font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.2rem;cursor:pointer;transition:all var(–ease);margin-top:.28rem;background:linear-gradient(135deg,var(–or),var(–orl));color:#fff;box-shadow:0 6px 20px rgba(255,107,0,.32);}
.btn-complete:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,107,0,.5);}
.btn-complete:disabled{opacity:.45;cursor:not-allowed;transform:none;}
.btn-complete.done{background:linear-gradient(135deg,var(–gr),#00BFA5);box-shadow:0 6px 20px rgba(0,230,118,.28);cursor:default;}
.edit-bar{display:flex;align-items:center;justify-content:space-between;background:rgba(255,107,0,.07);border:1px solid rgba(255,107,0,.18);border-radius:11px;padding:.55rem .85rem;margin-bottom:.65rem;}
.edit-lbl{font-size:.75rem;font-weight:800;color:var(–orl);}
.locked-tip{font-size:.7rem;color:var(–mu);font-weight:700;text-align:center;margin-top:.28rem;}

/* ── CHARTS ── */
.chart-c{background:var(–cd);border-radius:15px;padding:.9rem;margin-bottom:.75rem;border:1px solid rgba(255,255,255,.05);}
.chart-t{font-weight:900;font-size:.8rem;margin-bottom:.6rem;}
.mini-chart{height:85px;display:flex;align-items:flex-end;gap:3px;padding:0 .25rem;}
.bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bv{font-size:.52rem;font-weight:900;white-space:nowrap;}
.bb{width:100%;border-radius:3px 3px 0 0;min-height:4px;}
.bl{font-size:.55rem;color:var(–mu);font-weight:800;}
.log-row{display:flex;align-items:center;gap:.7rem;background:var(–cd2);border-radius:11px;padding:.6rem .85rem;margin-bottom:.38rem;}
.log-num{width:28px;height:28px;border-radius:7px;background:var(–cd);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.82rem;flex-shrink:0;}
.log-num.done{background:var(–gr);color:#000;}
.log-title{font-weight:900;font-size:.83rem;margin-bottom:.08rem;}
.log-stats{font-size:.72rem;color:var(–mu);font-weight:700;}

/* ── BADGES ── */
.badges-g{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.badge-c{background:var(–cd2);border-radius:13px;padding:.8rem .55rem;text-align:center;border:1px solid rgba(255,255,255,.04);transition:all var(–ease);}
.badge-c.unlocked{background:rgba(255,214,0,.07);border-color:rgba(255,214,0,.28);}
.badge-ico{font-size:1.9rem;margin-bottom:.25rem;filter:grayscale(1);opacity:.28;transition:all var(–ease);}
.badge-c.unlocked .badge-ico{filter:grayscale(0);opacity:1;}
.badge-nm{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(–mu);}
.badge-c.unlocked .badge-nm{color:var(–ye);}
.badge-ds{font-size:.56rem;color:var(–mu);margin-top:.15rem;}

/* ── REWARDS ── */
.rw-c{background:var(–cd);border-radius:15px;padding:1rem;margin-bottom:.6rem;border:1px solid rgba(255,255,255,.05);}
.rw-c.redeemed{opacity:.55;}
.rw-c.big{border-color:rgba(255,214,0,.25);background:rgba(255,214,0,.04);}
.rw-c.small{border-color:rgba(0,194,255,.2);background:rgba(0,194,255,.03);}
.rw-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.55rem;}
.rw-day{font-size:.62rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(–mu);}
.rw-badge{padding:.18rem .55rem;border-radius:20px;font-size:.62rem;font-weight:900;text-transform:uppercase;}
.rw-badge.big{background:rgba(255,214,0,.15);color:var(–ye);}
.rw-badge.small{background:rgba(0,194,255,.12);color:var(–bl);}
.rw-items{display:flex;gap:.5rem;margin-bottom:.7rem;flex-wrap:wrap;}
.rw-item{display:flex;align-items:center;gap:.3rem;background:var(–cd2);border-radius:9px;padding:.38rem .65rem;font-weight:800;font-size:.83rem;}
.rw-status{font-size:.72rem;color:var(–gr);font-weight:800;}

/* ── ADMIN ── */
.admin-sec{margin-bottom:1.1rem;}
.pm-row{display:flex;align-items:center;gap:.7rem;background:var(–cd);border-radius:13px;padding:.75rem .95rem;margin-bottom:.42rem;border:1px solid rgba(255,255,255,.05);}
.pm-name{flex:1;font-weight:900;}
.pm-stats{font-size:.7rem;color:var(–mu);font-weight:700;}
.sync-ta{width:100%;min-height:110px;background:var(–cd2);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:var(–tx);font-family:monospace;font-size:.73rem;padding:.7rem;resize:vertical;outline:none;line-height:1.5;}
.sync-ta:focus{border-color:var(–or);}

/* ── BOSS ── */
.boss-wrap{text-align:center;padding:1.5rem 0;}
.boss-trophy{font-size:5rem;animation:bounce 1.5s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,214,0,.5));}
.boss-title{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:clamp(1.7rem,6.5vw,2.8rem);margin:.5rem 0 .28rem;background:linear-gradient(135deg,var(–or),var(–ye));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;}
.boss-sub{color:var(–mu);font-size:.92rem;font-weight:800;margin-bottom:1.4rem;}
.cmp-row{display:grid;grid-template-columns:1fr auto 1fr;gap:.38rem;margin-bottom:.7rem;align-items:center;}
.cmp-cell{background:var(–cd);border-radius:13px;padding:.85rem;text-align:center;}
.cmp-cell.win{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);}
.cmp-cell.lose{background:rgba(255,61,90,.06);border:1px solid rgba(255,61,90,.15);}
.cmp-lbl{font-size:.58rem;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(–mu);margin-bottom:.28rem;}
.cmp-val{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.35rem;}
.cmp-vs{font-weight:900;color:var(–orl);font-size:.8rem;text-align:center;}
.boss-quote{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.15rem;color:var(–ye);margin:1.4rem 0;line-height:1.4;}
.fsr{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:1px solid rgba(255,255,255,.05);}
.fsr:last-child{border-bottom:none;}

/* ── MODAL ── */
#modal-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
#modal-bg.open{opacity:1;pointer-events:all;}
#modal-box{background:var(–cd);border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:1.4rem 1.1rem;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#modal-bg.open #modal-box{transform:translateY(0);}
.m-handle{width:40px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 1.1rem;}
.m-title{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:1.35rem;margin-bottom:1rem;text-align:center;}

/* ── OVERLAYS ── */
#lu-ov{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
#lu-ov.show{opacity:1;pointer-events:all;}
.lu-card{background:var(–cd);border-radius:22px;padding:2.3rem 1.8rem;text-align:center;max-width:310px;width:90%;border:2px solid var(–or);box-shadow:0 0 70px rgba(255,107,0,.22);transform:scale(0);transition:transform .4s cubic-bezier(.4,0,.2,1);}
#lu-ov.show .lu-card{transform:scale(1);}
.lu-e{font-size:3.8rem;display:block;margin-bottom:.75rem;animation:bounce 1s ease-in-out infinite;}
.lu-t{font-family:‘Black Han Sans’,Impact,sans-serif;font-size:2rem;background:linear-gradient(135deg,var(–or),var(–ye));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite;margin-bottom:.38rem;}
.lu-m{color:var(–mu);font-size:.9rem;font-weight:700;margin-bottom:1.4rem;}
#ach-toast{position:fixed;bottom:5.3rem;left:50%;transform:translateX(-50%) translateY(18px);background:linear-gradient(135deg,rgba(255,214,0,.15),rgba(255,107,0,.1));border:1px solid rgba(255,214,0,.3);border-radius:30px;padding:.55rem 1.1rem;font-weight:900;font-size:.83rem;z-index:400;opacity:0;transition:all .3s;white-space:nowrap;backdrop-filter:blur(8px);}
#ach-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast{position:fixed;bottom:4.8rem;left:50%;transform:translateX(-50%) translateY(8px);background:var(–cd);border:1px solid rgba(255,107,0,.25);border-radius:30px;padding:.5rem 1rem;font-weight:800;font-size:.83rem;z-index:399;opacity:0;transition:all .3s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── FX ── */
.confetti{position:fixed;pointer-events:none;z-index:800;border-radius:2px;animation:cfal linear forwards;}
#sync-dot{width:7px;height:7px;border-radius:50%;background:var(–mu);flex-shrink:0;transition:background .4s;}
#sync-dot.syncing{background:var(–ye);animation:pulse 1s ease-in-out infinite;}
#sync-dot.synced{background:var(–gr);}
#sync-dot.error{background:var(–rd);}

@keyframes bounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-20px) scale(1.07);}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes cfal{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>

</head>

function saveAll() {

  fbPush();
}
function loadAll() {
  try {
    var raw = localStorage.getItem(LS_KEY);

  } catch(e) {}
}
function saveSett() { try { localStorage.setItem(LS_SET, JSON.stringify(SETTINGS)); } catch(e) {} }
function loadSett() { try { var s = JSON.parse(localStorage.getItem(LS_SET)||'{}'); SETTINGS = Object.assign(SETTINGS, s); } catch(e) {} }

/* ══════════════════════════════════════════════════════════

══════════════════════════════════════════════════════════ */
var _syncing = false;
function syncDot(s) {
  var d = document.getElementById('sync-dot'); if (!d) return;
  d.className = s === 'ok' ? 'synced' : s === 'busy' ? 'syncing' : s === 'err' ? 'error' : '';
}
function fbPush() {
  if (!FB_URL || _syncing) return;
  _syncing = true; syncDot('busy');
  fetch(FB_URL.replace(/\/$/,'') + FB_PATH + '.json', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(PLAYERS)})
    .then(function(r){ _syncing=false; syncDot(r.ok?'ok':'err'); })
    .catch(function(){ _syncing=false; syncDot('err'); });
}
function fbPull() {
  if (!FB_URL) return;
  syncDot('busy');
  fetch(FB_URL.replace(/\/$/,'') + FB_PATH + '.json')
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && typeof data === 'object' && !Array.isArray(data)) {
        Object.keys(data).forEach(function(k){ if (data[k] && typeof data[k].exp === 'number') PLAYERS[k] = data[k]; });
        localStorage.setItem(LS_KEY, JSON.stringify(PLAYERS));
        seedPlayers(); syncDot('ok');
      }
    })
    .catch(function(){ syncDot('err'); });
}

    }),

}

function isDAD() { return SESSION.role === 'father'; }
function g(id)   { return document.getElementById(id); }
function h(s)    { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function lv(p)    { p=p||P(); return Math.min(10, Math.floor(p.exp / EXP_PER_LV)); }
function lvT(p)   { return LV_TITLES[lv(p||P())]; }
function expIn(p) { p=p||P(); return p.exp % EXP_PER_LV; }
function expPct(p){ p=p||P(); return (expIn(p) / EXP_PER_LV) * 100; }
function skillLv(p, sk) { return Math.min(10, p.days.filter(function(d){ return d.missions[sk]; }).length); }

function addExp(p, n) {
  var prev = lv(p); p.exp += n; updateTopBar();
  if (lv(p) > prev) { snd('levelup'); setTimeout(function(){ showLU('⚡','LEVEL '+lv(p)+'!','You are now a '+lvT(p)+'!'); }, 600); }
}
function addCoins(p, n) { p.coins += n; snd('coin'); updateTopBar(); }

function prevStat(p, dayNum, sk) {
  for (var i=dayNum-2; i>=0; i--) { var v=parseFloat(p.days[i].stats[sk]); if (!isNaN(v) && v>0) return v; }
  return null;
}
function deltaHtml(sk, val, prev) {
  if (!val || prev===null || isNaN(parseFloat(val))) return '';
  var cur=parseFloat(val), diff=cur-prev, lb=sk==='speed'||sk==='stamina';
  var good=lb?diff<0:diff>0, sign=diff>0?'+':'';
  var cls=diff===0?'dn':good?'dg':'db', tag=diff===0?'=':good?'RECORD!':'lower';
  return '<span class="'+cls+'">'+sign+diff.toFixed(1)+' '+tag+'</span>';
}

/* ══════════════════════════════════════════════════════════
   REWARD
══════════════════════════════════════════════════════════ */
function calcRw(day) {
  var pd=['speed','jump','stamina'].filter(function(s){ return day.missions[s]; }).length;
  var pct=Math.round((pd/3)*80 + (day.pvpResult!==null?1:0)*20);
  if (pct<70) return {type:'none',pct:pct,gameTime:null,money:null};
  if (pct<90) return {type:'small',pct:pct,gameTime:'30 min',money:'20.000d'};
  return {type:'big',pct:pct,gameTime:'1 hour',money:'50.000d'};
}

/* ══════════════════════════════════════════════════════════
   SOUND
══════════════════════════════════════════════════════════ */
var _ac = null;
function ac() { if (!_ac) try { _ac = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){} return _ac; }
function tone(f,d,t,g) {
  if (!SETTINGS.sound) return;
  try {
    var ctx=ac(); if(!ctx) return;
    var o=ctx.createOscillator(), gn=ctx.createGain();
    o.connect(gn); gn.connect(ctx.destination);
    o.type=t||'sine'; o.frequency.setValueAtTime(f,ctx.currentTime);
    gn.gain.setValueAtTime(g||.3,ctx.currentTime);
    gn.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start(); o.stop(ctx.currentTime+d);
  } catch(e){}
}
function snd(t) {
  if (!SETTINGS.sound) return;
  if (t==='coin')   { tone(880,.1); setTimeout(function(){ tone(1100,.1); },80); }
  if (t==='levelup'){ [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){ tone(f,.2); },i*120); }); }
  if (t==='ach')    { [659,784,1047].forEach(function(f,i){ setTimeout(function(){ tone(f,.25,'square',.2); },i*100); }); }
  if (t==='done')   { [523,659,784].forEach(function(f,i){ setTimeout(function(){ tone(f,.3,'sine',.25); },i*80); }); }
  if (t==='click')  { tone(440,.05,'square',.1); }
  if (t==='rec')    { tone(880,.15); setTimeout(function(){ tone(1320,.2); },100); }
  if (t==='err')    { tone(200,.15,'sawtooth',.2); }
}
function toggleSound() {
  SETTINGS.sound = !SETTINGS.sound; saveSett();
  g('sound-btn').textContent = SETTINGS.sound ? '🔊' : '🔇';
  toast(SETTINGS.sound ? '🔊 Sound ON' : '🔇 Sound OFF');

function buildNav() {

  if (isDAD()) tabs.push({id:'admin',label:'⚙️ Admin'});
  for (var i=0;i<10;i++) tabs.push({id:'day'+(i+1),label:'D'+(i+1),di:i});
  g('nav-bar').innerHTML = tabs.map(function(t){
    var cls='nav-tab';
    if (t.di!==undefined && p && p.days[t.di] && p.days[t.di].completed) cls+=' done';
    if (SESSION.tab===t.id) cls+=' active';

}

function renderTab(id) {
  SESSION.tab = id; SESSION.editMode = false;
  buildNav(); snd('click');
  var area = g('content'), p = P(); if (!p) return;
  if (id==='dashboard') area.innerHTML = buildDash(p);
  else if (id==='progress') area.innerHTML = buildProg(p);
  else if (id==='badges')   area.innerHTML = buildBadges(p);
  else if (id==='rewards')  area.innerHTML = buildRewards(p);
  else if (id==='admin')    area.innerHTML = buildAdmin();
  else if (id.indexOf('day')===0) {

    area.innerHTML = buildDay(p,dn);
    area.querySelectorAll('.stat-inp').forEach(function(el){ el.addEventListener('change', onStatChange); });
  }
}

/* ══════════════════════════════════════════════════════════
   DAY VIEW
══════════════════════════════════════════════════════════ */
function buildDay(p, dn) {
  var di=dn-1, day=p.days[di], theme=DAY_THEMES[di], ms=DAY_MISSIONS[di];
  var done=p.days.filter(function(d){return d.completed;}).length;
  if (dn>done+1) return '<div class="day-hd" data-day="'+dn+'" style="background:linear-gradient(135deg,#1e1e30,#2a2a3a)"><div class="day-label">DAY '+dn+'</div><div class="day-title ff">🔒 LOCKED</div><div style="font-size:.8rem;color:rgba(255,255,255,.5);margin-top:.18rem">Complete Day '+(dn-1)+' to unlock!</div></div><div style="text-align:center;padding:3rem 1rem;color:var(--mu)"><div style="font-size:4rem;margin-bottom:1rem">🔐</div><div style="font-weight:900;font-size:1.05rem;margin-bottom:.38rem">Keep grinding!</div><div style="font-size:.86rem">Finish the previous day to unlock.</div></div>';
  if (dn===10 && day.completed && !SESSION.editMode) return buildBoss(p);
  var phys=ms.filter(function(m){return m.id!=='pvp';});
  var pdone=phys.filter(function(m){return day.missions[m.id];}).length;
  var pvp=ms.find(function(m){return m.id==='pvp';});
  var canC=pdone===phys.length, cl=!isDAD();
  var html='<div class="day-hd" data-day="'+dn+'" style="background:'+theme.color+'">'
    +'<div class="day-label">'+(dn===10?'👑 FINAL BOSS - ':'')+'DAY '+dn+' / 10</div>'
    +'<div class="day-title ff">'+theme.title+'</div>'
    +'<div class="day-sub">'+theme.sub+'</div>'
    +'</div>';
  if (day.completed && isDAD() && !SESSION.editMode) {
    html+='<div class="edit-bar"><span class="edit-lbl">✅ Day completed</span>'
      +'<button type="button" class="btn btn-ghost btn-sm" onclick="reqEdit('+dn+')">✏️ Edit</button></div>';
  }
  if (SESSION.editMode) {
    html+='<div class="edit-bar" style="border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.07)">'
      +'<span class="edit-lbl" style="color:var(--rd)">✏️ EDIT MODE</span>'
      +'<button type="button" class="btn btn-ghost btn-sm" onclick="exitEdit('+dn+')">Done</button></div>';
  }
  html+='<div class="sec">MISSIONS</div>';
  phys.forEach(function(m){ html+=mCard(m,day,dn,cl); });
  var sd=cl||(day.completed&&!SESSION.editMode&&!isDAD());
  html+='<div class="sec" style="margin-top:.88rem">TODAY\'S STATS</div><div class="card"><div class="stats-grid">'
    +statInput(p,dn,'speed','⚡','sec',sd&&!(isDAD()&&SESSION.editMode))
    +statInput(p,dn,'jump','🦘','cm',sd&&!(isDAD()&&SESSION.editMode))
    +statInput(p,dn,'stamina','🔁','min',sd&&!(isDAD()&&SESSION.editMode))
    +'</div>'+(!isDAD()?'<div class="locked-tip">🔒 Stats entered by Dad</div>':'')+'</div>';
  html+='<div class="sec">1V1 BATTLE</div>'+pvpCard(pvp,day,dn,cl);
  if (!day.completed) {
    if (cl) html+='<button type="button" class="btn-complete" onclick="childAction()">🔒 Ask Dad to complete</button>';
    else if (!canC) html+='<button type="button" class="btn-complete" onclick="toast(\'Complete all missions first!\')">⚡ FINISH MISSIONS FIRST</button>';
    else html+='<button type="button" class="btn-complete" onclick="confirmComplete('+dn+')">🔥 COMPLETE DAY '+dn+'</button>';
  } else {
    html+='<button type="button" class="btn-complete done" disabled>✅ DAY '+dn+' COMPLETE!</button>';
  }
  return html;
}
function mCard(m, day, dn, cl) {
  var done=!!day.missions[m.id];
  var fn=cl?'childAction()':'toggleM('+dn+',\''+m.id+'\')';
  return '<div class="mission'+(done?' done':'')+'" onclick="'+fn+'">'
    +'<div class="m-check">'+(done?'✓':'')+'</div>'
    +'<div class="m-icon">'+m.icon+'</div>'
    +'<div class="m-info"><div class="m-name">'+m.name+'</div><div class="m-desc">'+m.desc+'</div></div>'
    +'<div class="m-reward">+'+m.exp+' EXP</div>'
    +'</div>';
}
function statInput(p, dn, sk, icon, unit, dis) {
  var day=p.days[dn-1], val=day.stats[sk]||'', prev=prevStat(p,dn,sk);

function pvpCard(pvp, day, dn, cl) {
  var res=day.pvpResult, dis=cl?'disabled':'';

/* ══════════════════════════════════════════════════════════
   PROGRESS
══════════════════════════════════════════════════════════ */
function buildProg(p) {
  var sv=p.days.map(function(d){var v=parseFloat(d.stats.speed);return isNaN(v)||v<=0?null:v;});
  var jv=p.days.map(function(d){var v=parseFloat(d.stats.jump);return isNaN(v)||v<=0?null:v;});
  var tv=p.days.map(function(d){var v=parseFloat(d.stats.stamina);return isNaN(v)||v<=0?null:v;});
  var html='<div class="sec">PERFORMANCE CHARTS</div>'
    +chart('⚡ Sprint Speed (sec)',sv,'var(--or)',true)
    +chart('🦘 Vertical Jump (cm)',jv,'var(--bl)',false)
    +chart('🔁 Stamina (min)',tv,'var(--gr)',true)
    +'<div class="sec" style="margin-top:.5rem">DAY LOG</div>';
  p.days.forEach(function(d,i){
    html+='<div class="log-row">'
      +'<div class="log-num'+(d.completed?' done':'')+'">'+( d.completed?'✓':(i+1))+'</div>'
      +'<div style="flex:1"><div class="log-title">'+DAY_THEMES[i].title+'</div>'
      +'<div class="log-stats">'+(d.stats.speed?'⚡'+d.stats.speed+'s':'⚡-')+(d.stats.jump?' - 🦘'+d.stats.jump+'cm':' - 🦘-')+(d.stats.stamina?' - 🔁'+d.stats.stamina+'min':' - 🔁-')+'</div></div>'
      +'<div style="font-size:.76rem;font-weight:800;color:'+(d.completed?'var(--gr)':'var(--mu)')+'">'+( d.completed?'✅':'-')+'</div>'
      +'</div>';
  });
  return html;
}
function chart(title, vals, color, lb) {
  var filt=vals.filter(function(v){return v!==null;});
  if (!filt.length) return '<div class="chart-c"><div class="chart-t">'+title+'</div><div style="text-align:center;color:var(--mu);font-size:.78rem;padding:.7rem">No data yet!</div></div>';
  var mx=Math.max.apply(null,filt), mn=Math.min.apply(null,filt), rng=mx-mn||1;
  var bars='';
  vals.forEach(function(v,i){
    if (v===null){bars+='<div class="bw"><div style="flex:1"></div><div class="bl">D'+(i+1)+'</div></div>';return;}
    var pidx=filt.indexOf(v), pvArr=filt.slice(0,pidx), pv=pvArr.length?pvArr[pvArr.length-1]:undefined;
    var good=pv!==undefined&&(lb?v<pv:v>pv);
    var pct=lb?1-(v-mn)/rng:(v-mn)/rng, ht=Math.max(8,Math.min(88,pct*100));
    bars+='<div class="bw"><div class="bv">'+v+'</div><div class="bb" style="height:'+ht+'%;background:'+(good?'var(--gr)':color)+'"></div><div class="bl">D'+(i+1)+'</div></div>';
  });
  return '<div class="chart-c"><div class="chart-t">'+title+'</div><div class="mini-chart">'+bars+'</div></div>';
}

function buildRewards(p) {

function rwCard(r) {

    if (r.redeemed) html+='<div class="rw-status">✅ Redeemed'+(r.redeemedAt?' - '+new Date(r.redeemedAt).toLocaleDateString():'')+' </div>';
    else if (isDAD()) html+='<button type="button" class="btn btn-ok btn-sm" onclick="redeemRw('+r.dayNum+')">🎁 Redeem Now</button>';
    else html+='<div style="font-size:.75rem;color:var(--mu);font-weight:700">🔒 Ask Dad to redeem!</div>';

function redeemRw(dn) {

}

function childAction() { toast('🔒 Only Dad can do this!'); snd('err'); }

function toggleM(dn, sk) {
  if (!isDAD()) { childAction(); return; }
  var p=P(), day=p.days[dn-1]; if (day.completed && !SESSION.editMode) return;
  var m=DAY_MISSIONS[dn-1].find(function(m){return m.id===sk;}); if (!m) return;
  if (day.missions[sk]) {
    day.missions[sk]=false; p.exp=Math.max(0,p.exp-m.exp); p.coins=Math.max(0,p.coins-m.coins);
  } else {
    day.missions[sk]=true; addExp(p,m.exp); addCoins(p,m.coins); snd('done'); confetti(3);
  }
  checkAch(p); saveAll(); updateTopBar(); renderTab('day'+dn);
}

function setPvp(dn, res) {
  if (!isDAD()) { childAction(); return; }
  var p=P(), day=p.days[dn-1]; if (day.completed && !SESSION.editMode) return;
  var pvp=DAY_MISSIONS[dn-1].find(function(m){return m.id==='pvp';}), prev=day.pvpResult;
  if (prev==='win') { p.exp=Math.max(0,p.exp-pvp.exp); p.coins=Math.max(0,p.coins-pvp.coins); }
  if (prev==='lose') { p.exp=Math.max(0,p.exp-5); p.coins=Math.max(0,p.coins-5); }
  day.pvpResult=res;
  if (res==='win') { addExp(p,pvp.exp); addCoins(p,pvp.coins); toast('🏆 WIN! +'+pvp.exp+' EXP +'+pvp.coins+'🪙'); unlock(p,'clutch_player'); snd('ach'); }
  else { addExp(p,5); addCoins(p,5); toast('💪 Good fight! +5 EXP'); snd('coin'); }
  saveAll(); renderTab('day'+dn);
}

function onStatChange(e) {
  if (!isDAD()) return;
  var dn=parseInt(e.target.dataset.day,10), sk=e.target.dataset.skill, raw=(e.target.value||'').trim(), val=parseFloat(raw);
  if (raw!=='' && (isNaN(val)||val<0)) { toast('❌ Invalid value!'); snd('err'); e.target.value=''; return; }
  var p=P(), day=p.days[dn-1]; day.stats[sk]=raw;
  var prev=prevStat(p,dn,sk);
  if (raw && prev!==null) {
    var lb=sk==='speed'||sk==='stamina', imp=lb?val<prev:val>prev;
    if (imp && !day.recordsAwarded[sk]) {
      day.recordsAwarded[sk]=true; addCoins(p,15); snd('rec'); toast('🔥 NEW RECORD! +15🪙');
      if (sk==='speed') unlock(p,'speed_hunter');
      if (sk==='jump')  unlock(p,'jump_booster');
      if (sk==='stamina') unlock(p,'iron_energy');
      unlock(p,'record_breaker');
    }
  }
  var de=g('dt-'+dn+'-'+sk); if (de) de.innerHTML=deltaHtml(sk,raw,prev);
  saveAll();
}

function reqEdit(dn) {
  showPwdModal('Enter admin password to edit:', function(){
    SESSION.editMode=true; renderTab('day'+dn);
  });
}
function exitEdit(dn) { SESSION.editMode=false; renderTab('day'+dn); }

function confirmComplete(dn) {
  if (!isDAD()) { childAction(); return; }
  var p=P(), day=p.days[dn-1];
  var phys=DAY_MISSIONS[dn-1].filter(function(m){return m.id!=='pvp';});
  if (!phys.every(function(m){return day.missions[m.id];})) { toast('❌ Complete all missions first!'); return; }
  var rw=calcRw(day);
  var rmsg=rw.type==='none'?'No reward this time.':rw.type==='small'?'🎮 '+rw.gameTime+' + 💰 '+rw.money+' earned!':'🏆 '+rw.gameTime+' + 💰 '+rw.money+' - AMAZING!';
  openModal('<div class="m-title ff">✅ COMPLETE DAY '+dn+'?</div>'
    +'<div style="text-align:center;margin-bottom:1.1rem">'
    +'<div style="font-size:2.8rem;margin-bottom:.45rem">'+(rw.type==='big'?'🏆':rw.type==='small'?'⭐':'💪')+'</div>'
    +'<div style="font-weight:900;font-size:.97rem;margin-bottom:.38rem">'+rw.pct+'% completion</div>'
    +'<div style="font-size:.85rem;color:var(--mu);font-weight:700">'+rmsg+'</div>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.55rem">'
    +'<button type="button" class="btn btn-sc" onclick="closeModal()">← Back</button>'
    +'<button type="button" class="btn btn-pr" onclick="closeModal();completeDay('+dn+')">Confirm ✓</button>'
    +'</div>');
}
function completeDay(dn) {
  if (!isDAD()) return;
  var p=P(), day=p.days[dn-1];
  addExp(p,20); addCoins(p,10);
  day.completed=true; day.completedAt=Date.now(); SESSION.editMode=false;
  var rw=calcRw(day); rw.dayNum=dn; rw.redeemed=false; rw.redeemedAt=null;
  if (!p.rewards) p.rewards=[]; p.rewards.push(rw);
  checkAch(p); saveAll(); confetti(40); snd('done');
  if (dn===10) { unlock(p,'champion'); setTimeout(function(){ showLU('👑','CHAMPION!','You completed the 10 Day Challenge! GOAT!'); },800); }
  else { setTimeout(function(){ showLU('🏀','DAY '+dn+' DONE!',(rw.type!=='none'?'Reward earned! ':'')+'Day '+(dn+1)+' is now unlocked!'); },600); }
  renderTab('day'+dn);
}

/* ══════════════════════════════════════════════════════════
   ACHIEVEMENTS
══════════════════════════════════════════════════════════ */
function unlock(p, id) {
  if (p.achievements[id]) return;
  p.achievements[id]=Date.now();
  var a=ACHIEVEMENTS.find(function(a){return a.id===id;});
  if (a) { saveAll(); achToast(a); snd('ach'); }
}
function checkAch(p) {
  var done=p.days.filter(function(d){return d.completed;}).length;
  if (done>=1) unlock(p,'first_day'); if (done>=5) unlock(p,'halfway'); if (done>=10) unlock(p,'champion');
  var str=0, mx=0;
  p.days.forEach(function(d){ if(d.completed){str++;mx=Math.max(mx,str);}else{str=0;} });
  if (mx>=3) unlock(p,'streak_3'); if (mx>=5) unlock(p,'streak_5');
}

function doImport(mode) {
var ta=g(‘imp-ta’), err=g(‘imp-err’), raw=ta?ta.value.trim():’’;
if (!raw) { if(err) err.textContent=‘❌ Paste data first!’; return; }
var parsed; try { parsed=JSON.parse(raw); } catch(e) { if(err) err.textContent=‘❌ Invalid JSON!’; snd(‘err’); return; }
if (!parsed||typeof parsed!==‘object’||Array.isArray(parsed)) { if(err) err.textContent=‘❌ Invalid format.’; return; }
for (var k in parsed) { if (!parsed[k]||typeof parsed[k].exp!==‘number’||!Array.isArray(parsed[k].days)) { if(err) err.textContent=‘❌ Bad data for “’+h(k)+’”’; return; } }
if (mode===‘replace’) { PLAYERS=parsed; }
else { for (var k2 in parsed) { if (!PLAYERS[k2]) PLAYERS[k2]=parsed[k2]; } }
seedPlayers(); saveAll(); closeModal();
toast(‘✅ Import OK! (’+Object.keys(parsed).length+’ players)’); snd(‘ach’);
if (SESSION.player && PLAYERS[SESSION.player]) { renderTab(‘dashboard’); updateTopBar(); } else { goSplash(); }
}

_tt=setTimeout(function(){ t.classList.remove(‘show’); },2300);
}
function achToast(a) {

t.innerHTML=a.icon+’ Achievement: <strong>’+a.name+’</strong>’;
t.classList.add(‘show’); clearTimeout(_at);
_at=setTimeout(function(){ t.classList.remove(‘show’); },3000);
}
function showLU(e, t, m) {
g(‘lu-e’).textContent=e; g(‘lu-t’).textContent=t; g(‘lu-m’).textContent=m;
g(‘lu-ov’).classList.add(‘show’);
}

function confetti(n) {
n=n||40;
var cols=[’#FF6B00’,’#FFD600’,’#00E676’,’#00C2FF’,’#B44FFF’,’#FF3D5A’];
for (var i=0;i<n;i++) {
var el=document.createElement(‘div’); el.className=‘confetti’;
el.style.cssText=‘left:’+(Math.random()*100)+‘vw;top:-10px;background:’+cols[Math.floor(Math.random()*cols.length)]+’;width:’+(4+Math.random()*8)+‘px;height:’+(4+Math.random()*8)+‘px;animation-duration:’+(1.2+Math.random()*2)+‘s;animation-delay:’+(Math.random()*.6)+‘s;’;
document.body.appendChild(el); setTimeout(function(){ el.remove(); },3500);
}
}
