<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCucj5cdrP8kAKLuMAPRpBD7o_xLFFcJFM",
    authDomain: "level-nimbus-443009-i3.firebaseapp.com",
    projectId: "level-nimbus-443009-i3",
    storageBucket: "level-nimbus-443009-i3.firebasestorage.app",
    messagingSenderId: "103072084205",
    appId: "1:103072084205:web:7f348a01bc8622d7c01ce4"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const functions = getFunctions(app, "asia-southeast1");

  const api = {
    login: httpsCallable(functions, 'authLogin'),
    getProfile: httpsCallable(functions, 'getUserProfile'),
    getTasks: httpsCallable(functions, 'getTodayTasks'),
    submitTask: httpsCallable(functions, 'submitTask'),
    approveTask: httpsCallable(functions, 'approveTask'),
    approveBulkTasks: httpsCallable(functions, 'approveBulkTasks'),
    rejectTask: httpsCallable(functions, 'rejectTask')
  };

  const State = {
      user: null,
      role: null,
      profile: null,
      children: [],
      selectedChildId: null,
      tasks: [],
      taskLocks: new Set(),
      bulkLock: false,
      qualityMap: {}
  };

  const Utils = {
    uuid: () => crypto.randomUUID(),
    showToast: (msg, type = "success") => {
      const el = document.createElement('div'); el.className = `toast ${type}`; el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    },
    setLock: (locked) => {
      document.getElementById('global-lock').classList.toggle('hidden', !locked);
    },
    handleApiError: (err) => {
      console.error(err);
      
      const errorCode = err.code ? err.code.replace('functions/', '') : '';

      if (errorCode === 'unavailable') {
        Utils.showToast("Cannot connect to server. Please check deployment.", "error");
      } else if (errorCode === 'unauthenticated') {
        Utils.showToast("Session expired. Please login again.", "warning");
      } else if (errorCode === 'aborted') {
        document.getElementById('sync-banner').classList.remove('hidden');
        Utils.showToast("Data conflict. Please refresh.", "warning");
      } else if (errorCode === 'failed-precondition') {
        Utils.showToast(err.message || "Action not allowed at this time.", "warning");
      } else if (errorCode === 'already-exists') {
        Utils.showToast("Action already in progress, please wait.", "warning");
      } else {
        Utils.showToast(err.message || "Unexpected error", "error");
      }
    }
  };

  const UI = {
    setView(id) { document.querySelectorAll('.card:not(.task-item)').forEach(c => c.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); },
    renderProfile() {
      document.getElementById('ui-welcome').textContent = `Hello, ${State.user?.displayName || 'User'}`;
      document.getElementById('ui-role').textContent = `Role: ${State.role}`;
      if (State.profile) {
        document.getElementById('ui-stats').innerHTML = `
          <div class="stat-box"><div class="stat-value">${State.profile.points || 0}</div><div class="stat-label">Points</div></div>
          <div class="stat-box"><div class="stat-value">${State.profile.level || 1}</div><div class="stat-label">Level</div></div>
          <div class="stat-box"><div class="stat-value">${State.profile.current_streak || 0}</div><div class="stat-label">Streak</div></div>
        `;
      }
    },
    renderTasks() {
      const container = document.getElementById('task-container');
      container.innerHTML = '';
      
      let pendingCount = 0;

      if (!State.tasks.length) {
          container.innerHTML = '<p class="text-muted">No tasks available.</p>';
      } else {
          State.tasks.forEach(task => {
              if (task.status === 'PENDING_APPROVAL') pendingCount++;
              const isLocked = State.taskLocks.has(task.id) || State.bulkLock;
              
              const item = document.createElement('div');
              item.className = `task-item ${isLocked ? 'loading' : ''}`;
              item.id = `task-${task.id}`;
              item.innerHTML = `
              <div class="flex-between">
                  <strong>${task.snapshot?.title || 'Task'}</strong>
                  <span class="badge badge-${task.status}">${task.status.replace('_', ' ')}</span>
              </div>
              <div id="actions-${task.id}" class="flex-gap" style="margin-top: 12px;"></div>
              `;
              container.appendChild(item);

              const actions = item.querySelector(`#actions-${task.id}`);
              
              if (State.role === 'player' && ['TODO', 'REJECTED'].includes(task.status)) {
                  const btn = document.createElement('button'); btn.className = 'btn-success'; btn.textContent = 'Submit';
                  btn.disabled = isLocked;
                  btn.onclick = () => Handlers.executeTaskAction(task.id, api.submitTask, { log_id: task.id, version: task.version, idempotency_key: Utils.uuid() });
                  actions.appendChild(btn);
              } 
              else if (State.role !== 'player' && task.status === 'PENDING_APPROVAL') {
                  if (!State.qualityMap[task.id]) {
                      State.qualityMap[task.id] = "PASS";
                  }

                  const select = document.createElement('select');
                  select.disabled = isLocked;
                  select.innerHTML = `<option value="PASS">Pass</option><option value="GOOD">Good</option><option value="EXCELLENT">Excellent</option>`;
                  select.value = State.qualityMap[task.id];
                  select.onchange = (e) => { State.qualityMap[task.id] = e.target.value; };
                  
                  const btnApprove = document.createElement('button'); btnApprove.className = 'btn-success'; btnApprove.textContent = 'Approve';
                  btnApprove.disabled = isLocked;
                  btnApprove.onclick = () => {
                      const quality = State.qualityMap[task.id];
                      Handlers.executeTaskAction(task.id, api.approveTask, { log_id: task.id, quality_rating: quality, version: task.version, idempotency_key: Utils.uuid() });
                  };
                  
                  const btnReject = document.createElement('button'); btnReject.className = 'btn-danger btn-outline'; btnReject.textContent = 'Reject';
                  btnReject.disabled = isLocked;
                  btnReject.onclick = () => {
                      const reason = prompt("Reason:"); if(!reason) return;
                      Handlers.executeTaskAction(task.id, api.rejectTask, { log_id: task.id, reason, version: task.version, idempotency_key: Utils.uuid() });
                  };
                  
                  actions.append(select, btnApprove, btnReject);
              }
          });
      }

      const btnBulk = document.getElementById('btn-bulk-approve');
      btnBulk.disabled = State.bulkLock;
      if (State.role !== 'player' && pendingCount > 1) {
          btnBulk.classList.remove('hidden');
      } else {
          btnBulk.classList.add('hidden');
      }
    }
  };

  const Handlers = {
    async refreshAll() {
        document.getElementById('sync-banner').classList.add('hidden');
        await Promise.all([this.loadProfile(), this.loadTasks()]);
    },
    async loadProfile() {
      try { State.profile = (await api.getProfile()).data.data; UI.renderProfile(); } 
      catch (e) { Utils.handleApiError(e); }
    },
    async loadTasks() {
      try {
        const payload = State.role !== 'player' ? { assignee_id: State.selectedChildId } : {};
        if (State.role !== 'player' && !State.selectedChildId) return;
        
        State.tasks = (await api.getTasks(payload)).data.data.tasks;
        UI.renderTasks();
      } catch (e) { Utils.handleApiError(e); }
    },
    async executeTaskAction(taskId, apiCall, payload) {
      if (State.bulkLock) {
          Utils.showToast("Bulk operation in progress", "warning");
          return;
      }
      if (State.taskLocks.has(taskId)) return;
      
      State.taskLocks.add(taskId);
      UI.renderTasks(); 
      
      try {
        await apiCall(payload);
        Utils.showToast("Success");
        await this.loadTasks(); 
      } catch (e) {
        Utils.handleApiError(e);
      } finally {
        State.taskLocks.delete(taskId);
        UI.renderTasks(); 
      }
    },
    async bulkApprove() {
        if (State.bulkLock) return;
        
        const pending = State.tasks.filter(t => t.status === 'PENDING_APPROVAL');
        if (!pending.length) return;

        const task_ids = [];
        const version_map = {};
        const quality_map = {};

        for (const task of pending) {
            const q = State.qualityMap[task.id];
            if (!q) {
                Utils.showToast("Missing quality rating for one or more tasks.", "error");
                return;
            }
            task_ids.push(task.id);
            version_map[task.id] = task.version;
            quality_map[task.id] = q;
        }

        State.bulkLock = true;
        UI.renderTasks();

        try {
           const res = await api.approveBulkTasks({
                task_ids, version_map, quality_map, idempotency_key: Utils.uuid()
            });
            if (res.data.data.tasks.length !== task_ids.length) {
                Utils.showToast("Some tasks failed. Please refresh.", "warning");
            } else {
                Utils.showToast("All tasks approved");
            }
            await this.loadTasks();
        } catch(e) {
            Utils.handleApiError(e);
        } finally {
            State.bulkLock = false;
            UI.renderTasks();
        }
    }
  };

  document.getElementById('form-login').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login-submit');
      btn.disabled = true;
      Utils.setLock(true);
      try {
          const username = document.getElementById('username').value;
          const pin = document.getElementById('pin').value;
          const res = await api.login({ username, pin });
          await signInWithCustomToken(auth, res.data.data.token);
      } catch (e) { 
          Utils.handleApiError(e); 
      } finally { 
          btn.disabled = false;
          Utils.setLock(false);
      }
  };
  
  document.getElementById('btn-logout').onclick = () => signOut(auth);
  document.getElementById('btn-refresh-player').onclick = () => Handlers.refreshAll();
  document.getElementById('btn-refresh-parent').onclick = () => Handlers.refreshAll();
  document.getElementById('btn-bulk-approve').onclick = () => Handlers.bulkApprove();
  document.getElementById('child-select').onchange = (e) => { State.selectedChildId = e.target.value; Handlers.refreshAll(); };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      State.user = user;
      State.role = (await user.getIdTokenResult()).claims.role || 'player';
      UI.setView('view-dashboard');
      document.getElementById('parent-controls').classList.toggle('hidden', State.role === 'player');
      document.getElementById('btn-refresh-player').classList.toggle('hidden', State.role !== 'player');
      
      Handlers.refreshAll();
      if (State.role !== 'player') {
          try {
            const snap = await getDocs(query(collection(db, "users"), where("role", "==", "player")));
            const sel = document.getElementById('child-select'); sel.innerHTML = '<option value="">Select Child</option>';
            snap.docs.forEach(d => sel.add(new Option(d.data().username, d.id)));
          } catch (e) {
            console.error("Failed to load children", e);
          }
      }
    } else {
      State.profile = null; State.tasks = []; UI.setView('view-login');
    }
  });
</script>
